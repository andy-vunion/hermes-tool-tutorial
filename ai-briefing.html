<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日AI简报 — 曼尼投研工具箱</title>
<style>
:root{
  --bg:#0a0e1a;--card:#111827;--border:#1e293b;--text:#e2e8f0;--muted:#94a3b8;
  --gold:#d4a853;--blue:#3b82f6;--green:#10b981;--red:#ef4444;--purple:#8b5cf6;
  --orange:#f59e0b;--reading:680px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);line-height:1.8;font-size:16px}

/* Top bar */
.top{position:sticky;top:0;z-index:100;background:rgba(10,14,26,.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:14px}
.top a{color:var(--muted);text-decoration:none;font-size:13px;transition:.2s}
.top a:hover{color:var(--text)}
.top .logo{font-weight:800;font-size:18px;background:linear-gradient(135deg,var(--gold),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* Main */
.main{max-width:800px;margin:0 auto;padding:40px 24px 80px}

/* Hero */
.hero{padding:10px 0 32px;margin-bottom:40px;border-bottom:1px solid var(--border)}
.hero h1{font-size:36px;font-weight:800;background:linear-gradient(135deg,var(--gold),var(--orange),var(--red));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.hero .sub{color:var(--muted);font-size:15px}
.hero .nums{display:flex;gap:28px;margin-top:16px}
.hero .nums span{font-size:12px;color:var(--muted)}
.hero .nums b{font-size:18px;color:var(--text);display:block}

/* Deep Read */
.dr{margin-bottom:48px;max-width:var(--reading)}
.dr-num{font-size:72px;font-weight:900;color:var(--gold);opacity:.12;line-height:1;margin-bottom:-28px;pointer-events:none;user-select:none}
.dr h2{font-size:22px;font-weight:800;color:var(--text);line-height:1.35;margin-bottom:20px}

.takeaways{counter-reset:takeaway;margin-bottom:20px}
.takeaway{counter-increment:takeaway;display:flex;gap:14px;padding:12px 0;border-bottom:1px solid rgba(30,41,59,.6)}
.takeaway:before{content:'0'counter(takeaway);font-size:18px;font-weight:800;color:var(--gold);opacity:.5;flex-shrink:0;min-width:28px;line-height:1.4}
.takeaway p{font-size:14px;color:var(--muted);line-height:1.7}

.bignums{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin:20px 0}
.bignum{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;transition:.2s}
.bignum:hover{border-color:var(--blue);transform:translateY(-1px)}
.bignum .bn-val{font-size:20px;font-weight:800;color:var(--blue);line-height:1.2;margin-bottom:4px}
.bignum .bn-desc{font-size:11px;color:var(--muted);line-height:1.5}

.why{background:linear-gradient(135deg,rgba(59,130,246,.06),rgba(139,92,246,.04));border:1px solid rgba(59,130,246,.2);border-radius:10px;padding:18px 22px;margin:20px 0}
.why .w-label{font-size:10px;color:var(--blue);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.why li,.why p{font-size:13px;color:var(--muted);margin:3px 0 3px 16px;line-height:1.7}

.block{margin:18px 0;padding:0}
.block h4{font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;font-weight:600}
.block.hn h4{color:#ff6620}.block.hn{background:rgba(255,102,0,.03);border-left:2px solid rgba(255,102,0,.3);padding:14px 18px;border-radius:0 8px 8px 0}
.block.sig h4{color:var(--gold)}.block.sig{background:rgba(212,168,83,.03);border-left:2px solid rgba(212,168,83,.3);padding:14px 18px;border-radius:0 8px 8px 0}
.block p,.block li{font-size:13px;color:var(--muted);line-height:1.8}
.block li{margin:2px 0 2px 16px}

.qs{margin:32px 0;max-width:var(--reading)}
.qs h3{font-size:16px;font-weight:700;color:var(--orange);margin-bottom:14px}
.qgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.qcard{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;transition:.2s}
.qcard:hover{border-color:var(--orange)}
.qcard h4{font-size:13px;font-weight:600;color:var(--orange);margin-bottom:8px}
.qcard li{font-size:12px;color:var(--muted);margin:2px 0 2px 14px;line-height:1.7}

.jdg{max-width:var(--reading);margin:40px 0;background:linear-gradient(135deg,rgba(212,168,83,.06),rgba(248,81,73,.03));border:1px solid rgba(212,168,83,.25);border-radius:12px;padding:24px 28px}
.jdg .j-label{font-size:10px;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.jdg .j-core{font-size:17px;font-weight:800;color:var(--gold);line-height:1.6;margin-bottom:14px}
.jdg p,.jdg li{font-size:13px;color:var(--muted);line-height:1.8}
.jdg strong{color:var(--text)}

.src{max-width:var(--reading);font-size:11px;color:var(--muted);padding-top:16px;margin-top:32px;border-top:1px solid var(--border)}

.ft{text-align:center;padding:60px 20px;border-top:1px solid var(--border);color:var(--muted);font-size:12px}
.ft a{color:var(--gold);text-decoration:none}

.issue-date{font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:20px;display:flex;align-items:center;gap:8px}
.issue-date:before{content:'';display:block;width:8px;height:8px;border-radius:50%;background:var(--gold)}

.history-btn{display:block;text-align:center;padding:16px;margin:40px 0;background:var(--card);border:1px solid var(--border);border-radius:12px;color:var(--gold);text-decoration:none;font-size:15px;font-weight:600;transition:.2s}
.history-btn:hover{border-color:var(--gold);background:rgba(212,168,83,.05)}

@media(max-width:768px){
  .hero h1{font-size:28px}
  .dr-num{font-size:48px;margin-bottom:-18px}
  .dr h2{font-size:18px}
  .bignums{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
  .qgrid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="top">
  <span class="logo">📰 品味AI</span>
  <a href="index.html">← 返回工具箱</a>
</div>

<div class="main" id="content"></div>

<a href="briefings.html" class="history-btn main" style="display:block;max-width:800px;margin:0 auto 40px;">📚 查看全部历史简报 →</a>

<footer class="ft">
  <p>品味AI每天简报 · <a href="index.html">曼尼投研工具箱</a> · 每周二/四/六自动更新</p>
</footer>

<script>
const BRIEFINGS = JSON.parse(`[{"date": "2026-05-30", "candidate_count": 12, "deep_count": 3, "quick_count": 3, "judgment": "", "sources": "Anthropic官方、Codersera、36氪、The Guardian、BBC、Data Center Frontier、投资界、Yahoo Finance*", "tags": ["AI安全/治理", "Agent", "Claude/Anthropic", "Google", "Meta", "Microsoft", "OpenAI", "基础设施", "融资/IPO"], "deep_reads": [{"title": "**一句话核心**：Anthropic在Opus 4.7发布仅41天后推出4.8，定价不变但引入Dynamic Workflows（数百个并行子Agent自动协作），这是Agent编程从\\\"单兵作战\\\"到\\\"军团协作\\\"的范式转折。", "one_liner": "", "key_numbers": ["SWE-bench Pro 69.2%（4.7: 64.3%，GPT-5.5: 58.6%）—— 代理编码领先所有对手", "GDPval Elo 1890，领先GPT-5.5 121分", "Fast模式价格：$10/$50 per 1M tokens，比4.7的Fast模式便宜3倍", "标准价格不变：$5输入/$25输出 per 1M", "最小缓存prompt降至1024 tokens → 短system prompt的Agent循环也可享90%缓存折扣", "Anthropic ARR已突破450亿美元（5个月前90亿），$900B估值，即将IPO"], "sections": {"_intro": "", "关键数字": "- SWE-bench Pro 69.2%（4.7: 64.3%，GPT-5.5: 58.6%）—— 代理编码领先所有对手\\n- GDPval Elo 1890，领先GPT-5.5 121分\\n- Fast模式价格：$10/$50 per 1M tokens，比4.7的Fast模式便宜3倍\\n- 标准价格不变：$5输入/$25输出 per 1M\\n- 最小缓存prompt降至1024 tokens → 短system prompt的Agent循环也可享90%缓存折扣\\n- Anthropic ARR已突破450亿美元（5个月前90亿），$900B估值，即将IPO", "连接性分析": "- Hermes本身是Agent平台 → Dynamic Workflows的多Agent协作模式是直接竞品参考\\n- 1M context + 1024 token缓存阈值 → Agent循环成本大幅下降，直接影响我们的推理成本估算\\n- Anthropic IPO意味着行业进入\\\"盈利验证期\\\"，不再是叙事驱动\\n\\n---"}}, {"title": "**一句话核心**：AI商业化正从\\\"赚用户注意力\\\"转向\\\"替企业省工资\\\"，Anthropic 5个月ARR从90亿→450亿，而C端付费转化率不到5%，这是结构性分水岭而非临时波动。", "one_liner": "", "key_numbers": ["Anthropic ARR：90亿（1月）→ 450亿（5月），5倍增长", "企业客户年支出>$100万：500家（2月）→ 1000+家（5月）", "ChatGPT Plus付费转化率 <5%", "企业客户平均ROI 3.7倍，最高超10倍", "2026 Q1 企业AI融资 +210%，C端AI融资 -35%", "40%+ C端AI创始人转向企业赛道"], "sections": {"_intro": "", "关键数字": "- Anthropic ARR：90亿（1月）→ 450亿（5月），5倍增长\\n- 企业客户年支出>$100万：500家（2月）→ 1000+家（5月）\\n- ChatGPT Plus付费转化率 <5%\\n- 企业客户平均ROI 3.7倍，最高超10倍\\n- 2026 Q1 企业AI融资 +210%，C端AI融资 -35%\\n- 40%+ C端AI创始人转向企业赛道", "连接性分析": "- Hermes的产品定位天然偏向企业/开发者工具，这波B端红利直接利好\\n- \\\"赚工资的钱\\\"逻辑：如果一个Agent能替代1个初级程序员（年成本$80K），企业愿意付$5K/月\\n- 定价策略参考：不要和免费替代品打价格战，要做不可替代的workflow集成\\n\\n---"}}, {"title": "**一句话核心**：美国司法部（DOJ）要求Google不得通过优先预装方式推广其AI助手，这是全球首个针对AI搜索/助手的反垄断裁决，可能重塑整个AI分发格局。", "one_liner": "", "key_numbers": ["禁止Google以默认预装方式推广AI助手", "禁止独家协议封锁竞品入口", "影响范围：Android、Chrome、Google搜索的所有AI功能", "微软Bing/Apple Intelligence可能受益"], "sections": {"_intro": "", "关键数字": "- 禁止Google以默认预装方式推广AI助手\\n- 禁止独家协议封锁竞品入口\\n- 影响范围：Android、Chrome、Google搜索的所有AI功能\\n- 微软Bing/Apple Intelligence可能受益", "连接性分析": "- AI搜索/Agent的分发渠道将更加碎片化\\n- 利好独立Agent平台（如Hermes），降低被大厂捆绑封杀的风险\\n- 长期看，Agent入口会像浏览器一样成为兵家必争之地\\n\\n---"}}], "quick_reads": [{"title": "Meta Llama 4 开源策略", "items": ["Llama 4 Behemoth 2T参数训练中", "Meta坚持开源路线，对标闭源旗舰", "开源模型在企业市场渗透加速"]}, {"title": "微软 Copilot 企业渗透", "items": ["Copilot企业版Q1增长超过预期", "Office 365 Copilot嵌入率提升", "企业AI助手市场加速整合"]}, {"title": "AI基础设施投资", "items": ["全球数据中心投资2026年预计$350B+", "电力供应成为新的瓶颈", "液冷/核电成为新热点"]}]}, {"date": "2026-05-27", "candidate_count": 10, "deep_count": 3, "quick_count": 2, "judgment": "", "sources": "OpenAI官方、TechCrunch、36氪、Reuters、Bloomberg", "deep_reads": [{"title": "OpenAI发布GPT-5.5，推理能力大幅提升", "one_liner": "GPT-5.5在多项基准测试中超越前代20%+，但定价策略引发开发者社区争议", "key_numbers": ["MMLU-Pro 92.1%", "推理成本比GPT-5降低40%", "API价格：$2.5/$10 per 1M tokens"]}]}]}`);

function render() {
  if (!BRIEFINGS.length) {
    document.getElementById('content').innerHTML = '<div style="text-align:center;padding:60px;color:var(--muted)">📭 暂无简报数据</div>';
    return;
  }
  const latest = BRIEFINGS.slice().reverse()[0];
  let h = `<div class="hero"><h1>每日AI简报</h1><p class="sub">最新一期：${latest.date} · ${latest.candidate_count}篇候选 · ${latest.deep_count}篇精读</p></div>`;
  
  // Issue header
  h += `<div class="issue-date">${latest.date} · ${latest.candidate_count}篇候选 · ${latest.deep_count}篇精读</div>`;
  
  // Deep reads
  latest.deep_reads.forEach((dr, i) => {
    const o = (i + 1).toString().padStart(2, '0');
    h += `<div class="dr"><div class="dr-num">${o}</div><h2>${dr.title.replace(/\*\*/g, '').replace(/:$/,'')}</h2>`;
    
    // Key numbers
    const kn = (dr.key_numbers || []).filter(x => x.length > 5);
    if (kn.length) {
      h += `<div class="bignums">`;
      kn.forEach(n => {
        const parts = n.split(/[：:—–-]/, 2);
        h += `<div class="bignum"><div class="bn-val">${parts[0].trim()}</div><div class="bn-desc">${parts[1] ? parts[1].trim() : ''}</div></div>`;
      });
      h += `</div>`;
    }
    
    // Sections
    const secs = dr.sections || {};
    for (const [k, v] of Object.entries(secs)) {
      if (k === '_intro') continue;
      if (k.includes('关键') || k.includes('数字')) continue;
      let cls = 'block';
      if (k.includes('讨论')) cls = 'block hn';
      else if (k.includes('连接')) cls = 'why';
      else if (k.includes('战略') || k.includes('信号')) cls = 'block sig';
      
      let content = v;
      if (content) {
        const lines = content.split('\n').filter(l => l.trim());
        if (lines.some(l => l.trim().startsWith('- '))) {
          const items = lines.filter(l => l.trim().startsWith('- ')).map(l => `<li>${l.trim().substring(2)}</li>`).join('');
          const others = lines.filter(l => !l.trim().startsWith('- ')).map(l => `<p>${l.trim()}</p>`).join('');
          content = others + '<ul style="list-style:none;padding:0">' + items + '</ul>';
        } else {
          content = lines.map(l => `<p>${l.trim()}</p>`).join('');
        }
      }
      const label = k.includes('连接') ? '🔗 Why This Matters' : k.includes('讨论') ? '💬 Discussion' : k.includes('战略') ? '🎯 Strategic Signals' : k;
      h += `<div class="${cls}"><h4>${label}</h4>${content}</div>`;
    }
    h += `</div>`;
  });
  
  // Quick reads
  if (latest.quick_reads && latest.quick_reads.length) {
    h += `<div class="qs"><h3>🥈 速览</h3><div class="qgrid">`;
    latest.quick_reads.forEach(qr => {
      h += `<div class="qcard"><h4>${qr.title}</h4><ul>${qr.items.map(it => `<li>${it}</li>`).join('')}</ul></div>`;
    });
    h += `</div></div>`;
  }
  
  // Judgment
  if (latest.judgment) {
    const p = latest.judgment.split(/具体行动|行动建议/);
    h += `<div class="jdg"><div class="j-label">🧭 The Call</div><div class="j-core">${p[0]}</div>`;
    if (p[1]) h += `${p[1].replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>')}`;
    h += `</div>`;
  }
  
  if (latest.sources) h += `<div class="src">📡 ${latest.sources}</div>`;
  
  document.getElementById('content').innerHTML = h;
}

render();
</script>
</body>
</html>
