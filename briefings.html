<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>品味AI · 每天简报</title>
<style>
:root{
  --bg:#0d1117;--card:#161b22;--border:#30363d;--text:#e6edf3;--muted:#7d8590;
  --gold:#d4a853;--blue:#58a6ff;--green:#3fb950;--red:#f85149;--purple:#bc8cff;--orange:#f59e0b;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.75;font-size:15px}

/* Top bar */
.topbar{position:sticky;top:0;z-index:100;background:rgba(13,17,23,.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.topbar a{color:var(--muted);text-decoration:none;font-size:13px;transition:.2s}
.topbar a:hover{color:var(--text)}
.topbar .brand{font-weight:700;font-size:16px;background:linear-gradient(135deg,var(--gold),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar input{flex:1;min-width:200px;padding:8px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;outline:none;max-width:400px}
.topbar input:focus{border-color:var(--blue)}
.topbar .stat{font-size:12px;color:var(--muted)}
.topbar .stat b{color:var(--text)}

/* Layout */
.layout{display:flex;max-width:1300px;margin:0 auto}
.sidebar{width:240px;flex-shrink:0;border-right:1px solid var(--border);padding:20px 16px;position:sticky;top:57px;height:calc(100vh - 57px);overflow-y:auto}
.main{flex:1;padding:32px 48px 80px;max-width:calc(100% - 240px);overflow-x:hidden}

/* Sidebar */
.sidebar h3{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:20px 0 10px}
.sidebar h3:first-child{margin-top:0}
.tag-cloud{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:16px}
.tag{font-size:11px;padding:4px 10px;border-radius:10px;cursor:pointer;border:1px solid var(--border);color:var(--muted);transition:all .15s;white-space:nowrap}
.tag:hover{border-color:var(--muted)}
.tag.on{background:rgba(88,166,255,.12);color:var(--blue);border-color:rgba(88,166,255,.3)}
.timeline{list-style:none}
.timeline li{padding:7px 10px;border-radius:6px;cursor:pointer;font-size:12px;color:var(--muted);transition:all .15s;margin-bottom:1px;display:flex;justify-content:space-between}
.timeline li:hover{background:rgba(255,255,255,.03);color:var(--text)}
.timeline li.on{background:rgba(212,168,83,.06);color:var(--gold);font-weight:600}

/* Hero */
.hero{padding:20px 0 40px;border-bottom:1px solid var(--border);margin-bottom:48px}
.hero h1{font-size:40px;font-weight:800;background:linear-gradient(135deg,var(--gold),var(--orange),var(--red));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.hero .sub{color:var(--muted);font-size:15px}
.hero .meta{display:flex;gap:24px;margin-top:18px;flex-wrap:wrap}
.hero .meta span{font-size:12px;color:var(--muted)}
.hero .meta b{color:var(--text);font-size:15px}

/* ---- BRIEFING CARD ---- */
.briefing{margin-bottom:56px}
.b-date{font-size:22px;font-weight:700;color:var(--gold);margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.b-date .b-tags{display:flex;gap:5px;flex-wrap:wrap;margin-left:auto}
.b-tag{font-size:10px;padding:2px 8px;border-radius:8px;background:rgba(212,168,83,.08);color:var(--gold);border:1px solid rgba(212,168,83,.15)}

/* ---- DEEP READ ---- */
.deep-read{margin-bottom:40px}
.dr-header{display:flex;align-items:baseline;gap:10px;margin-bottom:20px}
.dr-num{font-size:36px;font-weight:800;color:var(--gold);opacity:.4;line-height:1;flex-shrink:0;min-width:40px}
.dr-header h2{font-size:22px;font-weight:700;color:var(--text);line-height:1.3}

/* Thesis block */
.thesis{background:var(--bg);border-left:3px solid var(--gold);padding:16px 20px;margin-bottom:20px;border-radius:0 8px 8px 0}
.thesis .t-label{font-size:10px;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.thesis p{font-size:15px;line-height:1.85;color:var(--text)}

/* Stat cards */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;transition:all .2s}
.stat-card:hover{border-color:var(--blue)}
.stat-card .s-num{font-size:20px;font-weight:700;color:var(--blue);margin-bottom:4px;line-height:1.2}
.stat-card .s-desc{font-size:12px;color:var(--muted);line-height:1.5}

/* Section blocks */
.dr-section{margin-bottom:18px}
.dr-section h4{font-size:12px;color:var(--orange);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;font-weight:600}
.dr-section p,.dr-section li{font-size:14px;color:var(--muted);line-height:1.8}
.dr-section li{margin:2px 0 2px 20px}
.dr-section strong{color:var(--text)}

/* HN discussion */
.hn-discussion{background:rgba(255,102,0,.04);border:1px solid rgba(255,102,0,.15);border-radius:10px;padding:16px 20px;margin-bottom:18px}
.hn-discussion h4{font-size:12px;color:#ff6620;margin-bottom:8px}
.hn-discussion li{font-size:13px;color:var(--muted);margin:4px 0 4px 16px;line-height:1.7}

/* Connection callout */
.connection{background:linear-gradient(135deg,rgba(88,166,255,.06),rgba(139,92,246,.04));border:1px solid rgba(88,166,255,.2);border-radius:10px;padding:18px 22px;margin-bottom:18px}
.connection h4{font-size:12px;color:var(--blue);margin-bottom:8px}
.connection li{font-size:13px;color:var(--muted);margin:4px 0 4px 16px;line-height:1.7}

/* Strategy signals */
.strategy{background:rgba(212,168,83,.04);border:1px solid rgba(212,168,83,.15);border-radius:10px;padding:16px 20px;margin-bottom:18px}
.strategy h4{font-size:12px;color:var(--gold);margin-bottom:8px}
.strategy li{font-size:13px;color:var(--muted);margin:4px 0 4px 16px;line-height:1.7}

/* ---- QUICK READS ---- */
.quick-section{margin-bottom:32px}
.quick-section h3{font-size:18px;font-weight:700;color:var(--orange);margin-bottom:16px}
.quick-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.quick-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px;transition:all .2s}
.quick-card:hover{border-color:var(--orange)}
.quick-card h4{font-size:14px;font-weight:600;color:var(--orange);margin-bottom:10px}
.quick-card li{font-size:12px;color:var(--muted);margin:3px 0 3px 16px;line-height:1.7}

/* ---- JUDGMENT ---- */
.judgment{margin:32px 0;background:linear-gradient(135deg,rgba(212,168,83,.08),rgba(248,81,73,.04));border:1px solid rgba(212,168,83,.3);border-radius:14px;padding:24px 28px}
.judgment .j-label{font-size:11px;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.judgment .j-core{font-size:16px;font-weight:700;color:var(--gold);line-height:1.7;margin-bottom:16px}
.judgment .j-body{font-size:14px;color:var(--muted);line-height:1.9}
.judgment .j-body strong{color:var(--text)}
.judgment .j-body li{margin:4px 0 4px 20px}

/* ---- SOURCES ---- */
.b-sources{font-size:12px;color:var(--muted);padding-top:12px;border-top:1px solid var(--border);margin-top:24px}

/* Footer */
.footer{text-align:center;padding:60px 24px;border-top:1px solid var(--border);color:var(--muted);font-size:13px;clear:both}
.footer a{color:var(--gold);text-decoration:none}

/* Empty */
.empty{text-align:center;padding:100px 20px;color:var(--muted)}

/* Responsive */
@media(max-width:900px){
  .layout{flex-direction:column}
  .sidebar{width:100%;height:auto;position:static;border-right:none;border-bottom:1px solid var(--border);padding:14px}
  .main{max-width:100%;padding:20px 16px 60px}
  .hero h1{font-size:28px}
  .stats-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}
  .quick-grid{grid-template-columns:1fr}
}
</style>
</head>

      // Key numbers as stat cards
      const kn=dr.key_numbers||[];
      const knLen=kn.filter(x=>x.length>5).length;
      if(knLen>0){
        h+=`<div class="stats-grid">`;
        kn.forEach(n=>{
          if(n.length<5)return;
          // Try to split into number + description
          const parts=n.split(/[：:—–-]/,2);
          const num=parts[0].trim();
          const desc=parts[1]?parts[1].trim():'';
          h+=`<div class="stat-card"><div class="s-num">${num}</div><div class="s-desc">${desc}</div></div>`;
        });
        h+=`</div>`;
      }

      // Section content (connection, discussion, strategy)
      const secs=dr.sections||{};
      for(const [k,v] of Object.entries(secs)){
        if(k==='_intro')continue;
        if(k.includes('关键')||k.includes('数字'))continue;
        
        let cls='dr-section';
        if(k.includes('HN')||k.includes('讨论'))cls='hn-discussion';
        else if(k.includes('连接'))cls='connection';
        else if(k.includes('战略')||k.includes('信号'))cls='strategy';
        
        // Format content: strip bullet points, keep structure
        let content=v;
        if(content){
          // Convert bullet points to list items
          const lines=content.split('\n').filter(l=>l.trim());
          if(lines.some(l=>l.trim().startsWith('- '))){
            const items=lines.filter(l=>l.trim().startsWith('- ')).map(l=>`<li>${l.trim().substring(2)}</li>`).join('');
            const others=lines.filter(l=>!l.trim().startsWith('- ')).map(l=>`<p>${l.trim()}</p>`).join('');
            content=others+`<ul style="list-style:none;padding:0">${items}</ul>`;
          }else{
            content=lines.map(l=>`<p>${l.trim()}</p>`).join('');
          }
        }
        
        h+=`<div class="${cls}"><h4>${k}</h4>${content}</div>`;
      }

      h+=`</div>`;
    });

    // Quick reads
    if(b.quick_reads&&b.quick_reads.length>0){
      h+=`<div class="quick-section"><h3>🥈 速览</h3><div class="quick-grid">`;
      b.quick_reads.forEach(qr=>{
        h+=`<div class="quick-card"><h4>${qr.title}</h4><ul>${qr.items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;
      });
      h+=`</div></div>`;
    }

    // Judgment
    if(b.judgment){
      // Split judgment into core + body
      const jParts=b.judgment.split(/具体行动|行动建议/);
      h+=`<div class="judgment">
        <div class="j-label">🧭 今日判断</div>
        <div class="j-core">${jParts[0]}</div>`;
      if(jParts[1]){
        h+=`<div class="j-body">${jParts[1].replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>')}</div>`;
      }
      h+=`</div>`;
    }

    if(b.sources)h+=`<div class="b-sources">📡 ${b.sources}</div>`;
    h+=`</div>`;
  });

  document.getElementById('main').innerHTML=h;
}
render();
</script>
</body>
</html>
