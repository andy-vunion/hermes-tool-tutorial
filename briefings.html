<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>品味AI · 每天简报</title>
<style>
:root{
  --bg:#0d1117;--card:#161b22;--border:#30363d;--text:#e6edf3;--muted:#7d8590;
  --gold:#d4a853;--blue:#58a6ff;--green:#3fb950;--red:#f85149;--purple:#bc8cff;--orange:#f59e0b;
  --w:700px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.75;font-size:15px}

/*  ──  Top Bar  ──  */
.topbar{position:sticky;top:0;z-index:100;background:rgba(13,17,23,.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.topbar a{color:var(--muted);text-decoration:none;font-size:13px}
.topbar a:hover{color:var(--text)}
.topbar .brand{font-weight:700;font-size:16px;background:linear-gradient(135deg,var(--gold),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar input{flex:1;min-width:200px;padding:8px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;outline:none;max-width:400px}
.topbar input:focus{border-color:var(--blue)}
.topbar .stat{font-size:12px;color:var(--muted)}
.topbar .stat b{color:var(--text)}

/*  ──  Layout  ──  */
.layout{display:flex;max-width:1300px;margin:0 auto;min-height:calc(100vh - 57px)}

/*  ──  Sidebar  ──  */
.sidebar{width:260px;flex-shrink:0;border-right:1px solid var(--border);padding:20px 16px;overflow-y:auto;position:sticky;top:57px;height:calc(100vh - 57px)}
.sidebar h3{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.tag-cloud{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px}
.tag{font-size:11px;padding:4px 10px;border-radius:12px;cursor:pointer;border:1px solid var(--border);color:var(--muted);transition:all .15s;white-space:nowrap}
.tag:hover{border-color:var(--muted)}
.tag.on{background:rgba(88,166,255,.12);color:var(--blue);border-color:rgba(88,166,255,.3)}
.timeline{list-style:none}
.timeline li{padding:8px 12px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--muted);transition:all .15s;margin-bottom:2px;display:flex;justify-content:space-between}
.timeline li:hover{background:rgba(255,255,255,.03);color:var(--text)}
.timeline li.on{background:rgba(212,168,83,.08);color:var(--gold);font-weight:600}
.timeline li .tl-count{font-size:11px;color:var(--muted)}

/*  ──  Main Content  ──  */
.main{flex:1;padding:32px 40px 80px;max-width:calc(100% - 260px)}
.hero{padding:20px 0 40px;border-bottom:1px solid var(--border);margin-bottom:40px}
.hero h1{font-size:36px;font-weight:800;background:linear-gradient(135deg,var(--gold),var(--orange),var(--red));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.hero p{color:var(--muted);font-size:15px}
.hero .meta{display:flex;gap:20px;margin-top:16px;flex-wrap:wrap}
.hero .meta span{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:4px}
.hero .meta b{color:var(--text)}

/*  ──  Briefing Card  ──  */
.b-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;margin-bottom:32px}
.b-card:hover{border-color:rgba(212,168,83,.3)}
.b-date{font-size:22px;font-weight:700;color:var(--gold);margin-bottom:28px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.b-date .b-tags{display:flex;gap:6px;flex-wrap:wrap}
.b-date .b-tag{font-size:10px;padding:2px 8px;border-radius:8px;background:rgba(212,168,83,.1);color:var(--gold);border:1px solid rgba(212,168,83,.2)}

/*  ──  Typography  ──  */
h2{font-size:20px;font-weight:700;color:var(--gold);margin:32px 0 16px;padding-top:16px;border-top:1px solid var(--border)}
h3{font-size:16px;font-weight:700;color:var(--orange);margin:24px 0 10px}
h4{font-size:14px;font-weight:600;color:var(--blue);margin:16px 0 6px}
p{margin:6px 0}
li{margin:3px 0 3px 20px;color:var(--muted)}
strong{color:var(--text);font-weight:600}
code{background:rgba(88,166,255,.1);color:var(--blue);padding:2px 6px;border-radius:4px;font-size:13px;font-family:'JetBrains Mono',Consolas,monospace}

/*  ──  Deep Read  ──  */
.deep-read{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:20px}
.deep-read h3{margin:0 0 12px;font-size:17px;color:var(--gold)}
.deep-read .dr-numbers{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0}
.deep-read .dr-num{font-size:12px;padding:3px 10px;background:rgba(88,166,255,.08);border:1px solid rgba(88,166,255,.15);border-radius:8px;color:var(--blue)}

/*  ──  Quick Reads  ──  */
.quick-reads{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:16px}
.quick-card{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:16px}
.quick-card h4{font-size:14px;color:var(--orange);margin-bottom:8px}
.quick-card li{font-size:12px;margin:3px 0 3px 16px}

/*  ──  Judgment  ──  */
.judgment{background:linear-gradient(135deg,rgba(212,168,83,.06),rgba(245,158,11,.03));border:1px solid rgba(212,168,83,.25);border-radius:12px;padding:20px 24px;margin-top:24px}
.judgment .j-label{font-size:11px;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.judgment p{font-size:14px;line-height:1.8}
.judgment strong{color:var(--gold)}

/*  ──  Sources  ──  */
.sources{font-size:12px;color:var(--muted);margin-top:20px;padding-top:12px;border-top:1px solid var(--border)}

/*  ──  Empty  ──  */
.empty{text-align:center;padding:80px 20px;color:var(--muted);font-size:15px}

/*  ──  Footer  ──  */
.footer{text-align:center;padding:60px 24px;border-top:1px solid var(--border);color:var(--muted);font-size:13px;clear:both}
.footer a{color:var(--gold);text-decoration:none}

/*  ──  Responsive  ──  */
@media(max-width:900px){
  .layout{flex-direction:column}
  .sidebar{width:100%;height:auto;position:static;border-right:none;border-bottom:1px solid var(--border);padding:16px}
  .main{max-width:100%;padding:24px 16px 60px}
  .b-card{padding:24px 18px}
  .hero h1{font-size:26px}
  .quick-reads{grid-template-columns:1fr}
  .topbar input{max-width:200px}
}
</style>
</head>
<body>

<div class="topbar">
  <span class="brand">📰 品味AI</span>
  <a href="index.html">← 工具箱</a>
  <input type="text" id="search" placeholder="🔍 搜索简报内容..." oninput="render()">
  <span class="stat" id="topStats"></span>
</div>

<div class="layout">
  <aside class="sidebar">
    <h3>🏷 标签筛选</h3>
    <div class="tag-cloud" id="tags"></div>
    <h3>📅 历史简报</h3>

  </aside>
  <main class="main" id="main"></main>
</div>

<footer class="footer">
  <p>品味AI每天简报 · <a href="index.html">曼尼投研工具箱</a> · 每周二/四/六自动更新</p>
</footer>

let searchQuery = '';
let activeTag = null;

// Build tag index
const allTags = {};
BRIEFINGS.forEach(b => {
  b.tags.forEach(t => {
    allTags[t] = (allTags[t]||0) + 1;
  });
});
const topTags = Object.entries(allTags).sort((a,b)=>b[1]-a[1]).slice(0,20);

function render() {
  searchQuery = document.getElementById('search').value.toLowerCase();
  
  // Filter
  let filtered = BRIEFINGS;
  if (activeTag) filtered = filtered.filter(b => b.tags.includes(activeTag));
  if (searchQuery) {
    filtered = filtered.filter(b => JSON.stringify(b).toLowerCase().includes(searchQuery));
  }
  
  // Stats
  const totalCandidates = BRIEFINGS.reduce((s,b)=>s+b.candidate_count,0);
  const totalDeep = BRIEFINGS.reduce((s,b)=>s+b.deep_count,0);
  const totalQuick = BRIEFINGS.reduce((s,b)=>s+b.quick_count,0);
  document.getElementById('topStats').innerHTML = 
    `<b>${BRIEFINGS.length}</b>期 · <b>${totalCandidates}</b>候选 · <b>${totalDeep}</b>精读 · <b>${totalQuick}</b>速览`;
  
  // Tags
  document.getElementById('tags').innerHTML = topTags.map(([t,c]) => 
    `<span class="tag${activeTag===t?' on':''}" onclick="activeTag=activeTag===t?null:t;render()">${t} <span style="font-size:10px;opacity:.6">${c}</span></span>`
  ).join('');
  
  // Timeline
  document.getElementById('timeline').innerHTML = BRIEFINGS.map(b => 
    `<li class="${filtered.includes(b)?'':'hidden'}" onclick="document.getElementById('b-${b.date}').scrollIntoView({behavior:'smooth'})">
      ${b.date}<span class="tl-count">${b.deep_count}精读</span>
    </li>`
  ).join('');
  
  // Main content
  if (filtered.length === 0) {
    document.getElementById('main').innerHTML = '<div class="empty">📭 没有匹配的简报</div>';
    return;
  }
  
  let html = `<div class="hero">
    <h1>品味AI每天简报</h1>
    <p>AI产业动态深度解读 · 品味五条筛选 · 行动级别判断 · 每周二/四/六更新</p>
    <div class="meta">
      <span>📋 <b>${totalCandidates}</b> 篇候选文章</span>
      <span>🥇 <b>${totalDeep}</b> 篇深度精读</span>
      <span>📡 <b>${BRIEFINGS.length}</b> 期简报</span>
      <span>🏷 <b>${topTags.length}</b> 个标签</span>
    </div>
  </div>`;
  
  filtered.slice().reverse().forEach(b => {
    html += `<div class="b-card" id="b-${b.date}">
      <div class="b-date">
        📅 ${b.date}
        <div class="b-tags">${b.tags.map(t=>`<span class="b-tag">${t}</span>`).join('')}</div>
      </div>`;
    
    // Deep reads
    if (b.deep_reads.length > 0) {
      html += '<h2>🥇 精读</h2>';
      b.deep_reads.forEach(dr => {
        html += `<div class="deep-read">
          <h3>${dr.title}</h3>
          ${dr.one_liner ? `<p style="font-size:14px;color:var(--text);line-height:1.8;margin-bottom:12px"><strong>核心：</strong>${dr.one_liner}</p>` : ''}
          ${dr.key_numbers.length > 0 ? `<div class="dr-numbers">${dr.key_numbers.map(n=>`<span class="dr-num">${n}</span>`).join('')}</div>` : ''}
        </div>`;
      });
    }
    
    // Quick reads
    if (b.quick_reads.length > 0) {
      html += '<h2>🥈 速览</h2><div class="quick-reads">';
      b.quick_reads.forEach(qr => {
        html += `<div class="quick-card">
          <h4>${qr.title}</h4>
          <ul>${qr.items.map(i=>`<li>${i}</li>`).join('')}</ul>
        </div>`;
      });
      html += '</div>';
    }
    
    // Judgment
    if (b.judgment) {
      html += `<div class="judgment">
        <div class="j-label">🧭 今日判断</div>
        <p><strong>核心判断：</strong>${b.judgment}</p>
      </div>`;
    }
    
    // Sources
    if (b.sources) {
      html += `<div class="sources">📡 信源：${b.sources}</div>`;
    }
    
    html += '</div>';
  });
  
  document.getElementById('main').innerHTML = html;
}

render();
</script>
</body>
</html>
