<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>品味AI简报 · Blog</title>
<style>
:root{
  --bg:#0d1117;--card:#161b22;--border:#30363d;--text:#e6edf3;--muted:#7d8590;
  --gold:#d4a853;--blue:#58a6ff;--green:#3fb950;--red:#f85149;--purple:#bc8cff;
  --orange:#f59e0b;--reading:680px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.8;font-size:16px}

/* ── TOP BAR ── */
.top{position:sticky;top:0;z-index:100;background:rgba(13,17,23,.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:14px}
.top a{color:var(--muted);text-decoration:none;font-size:13px;transition:.2s}
.top a:hover{color:var(--text)}
.top .logo{font-weight:800;font-size:18px;background:linear-gradient(135deg,var(--gold),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.top input{width:240px;padding:7px 12px;background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;outline:none}
.top input:focus{border-color:var(--blue)}
.top .stat{font-size:11px;color:var(--muted);margin-left:auto}
.top .stat b{color:var(--text)}

/* ── LAYOUT ── */
.wrap{max-width:1200px;margin:0 auto;display:flex}
.side{width:200px;flex-shrink:0;border-right:1px solid var(--border);padding:24px 18px;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto}
.main{flex:1;padding:40px 60px 100px;max-width:calc(100% - 200px)}

.side h3{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin:20px 0 8px}.side h3:first-child{margin-top:0}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px}
.tag{font-size:10px;padding:3px 8px;border-radius:8px;cursor:pointer;border:1px solid var(--border);color:var(--muted);transition:.15s;white-space:nowrap}
.tag:hover{border-color:var(--muted)}
.tag.on{background:rgba(88,166,255,.12);color:var(--blue);border-color:rgba(88,166,255,.3)}
.tl{list-style:none}
.tl li{padding:6px 8px;border-radius:5px;cursor:pointer;font-size:12px;color:var(--muted);margin-bottom:1px;display:flex;justify-content:space-between;transition:.15s}
.tl li:hover{background:rgba(255,255,255,.03);color:var(--text)}

/* ── HERO ── */
.hero{padding:10px 0 32px;margin-bottom:48px;border-bottom:1px solid var(--border)}
.hero h1{font-size:42px;font-weight:800;background:linear-gradient(135deg,var(--gold),var(--orange),var(--red));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.hero .sub{color:var(--muted);font-size:15px}
.hero .nums{display:flex;gap:28px;margin-top:16px}
.hero .nums span{font-size:12px;color:var(--muted)}
.hero .nums b{font-size:18px;color:var(--text);display:block}

/* ── BLOG POST CARD ── */
.blog-post{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:32px 36px;margin-bottom:32px;transition:all .25s;position:relative}
.blog-post:hover{border-color:rgba(88,166,255,.25);box-shadow:0 4px 24px rgba(0,0,0,.3);transform:translateY(-2px)}

/* Sticky date header */
.blog-date{position:sticky;top:52px;z-index:10;background:linear-gradient(180deg,var(--card) 60%,transparent);padding:0 0 16px 0;margin:-32px -36px 24px -36px;padding:32px 36px 20px 36px;backdrop-filter:blur(8px);border-bottom:1px solid var(--border)}
.blog-date-inner{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.blog-date .date-badge{font-size:14px;font-weight:700;color:var(--text);background:rgba(88,166,255,.1);border:1px solid rgba(88,166,255,.2);border-radius:20px;padding:4px 14px}
.blog-date .date-meta{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.blog-date .date-meta .sep{opacity:.3}
.blog-date .rt{font-size:11px;color:var(--muted);background:rgba(212,168,83,.08);border-radius:10px;padding:2px 10px;display:inline-flex;align-items:center;gap:4px}
.blog-date .tags-row{display:flex;gap:4px;margin-left:auto;flex-wrap:wrap}
.blog-date .itag{font-size:9px;padding:2px 7px;border-radius:6px;background:rgba(212,168,83,.06);color:var(--gold);border:1px solid rgba(212,168,83,.12)}

/* ── DEEP READ ── */
.dr{margin-bottom:56px;max-width:var(--reading)}
.dr-num{font-size:72px;font-weight:900;color:var(--gold);opacity:.12;line-height:1;margin-bottom:-28px;pointer-events:none;user-select:none}
.dr h2{font-size:24px;font-weight:800;color:var(--text);line-height:1.35;margin-bottom:24px}

/* Key Takeaways (CB Insights style) */
.takeaways{counter-reset:takeaway;margin-bottom:24px}
.takeaway{counter-increment:takeaway;display:flex;gap:14px;padding:12px 0;border-bottom:1px solid rgba(48,54,61,.4)}
.takeaway:before{content:'0'counter(takeaway);font-size:18px;font-weight:800;color:var(--gold);opacity:.5;flex-shrink:0;min-width:28px;line-height:1.4}
.takeaway p{font-size:14px;color:var(--muted);line-height:1.7}

/* Big Number cards (ARK style) */
.bignums{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin:20px 0}
.bignum{background:rgba(22,27,34,.6);border:1px solid var(--border);border-radius:8px;padding:16px;transition:.2s}
.bignum:hover{border-color:var(--blue);transform:translateY(-1px)}
.bignum .bn-val{font-size:20px;font-weight:800;color:var(--blue);line-height:1.2;margin-bottom:4px}
.bignum .bn-desc{font-size:11px;color:var(--muted);line-height:1.5}

/* Why it matters (Morning Brew style) */
.why{background:linear-gradient(135deg,rgba(88,166,255,.06),rgba(139,92,246,.04));border:1px solid rgba(88,166,255,.2);border-radius:10px;padding:18px 22px;margin:20px 0}
.why .w-label{font-size:10px;color:var(--blue);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.why li{font-size:13px;color:var(--muted);margin:3px 0 3px 16px;line-height:1.7}

/* Discussion / Strategy blocks */
.block{margin:18px 0;padding:0}
.block h4{font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;font-weight:600}
.block.hn h4{color:#ff6620}.block.hn{background:rgba(255,102,0,.03);border-left:2px solid rgba(255,102,0,.3);padding:14px 18px;border-radius:0 8px 8px 0}
.block.sig h4{color:var(--gold)}.block.sig{background:rgba(212,168,83,.03);border-left:2px solid rgba(212,168,83,.3);padding:14px 18px;border-radius:0 8px 8px 0}
.block p,.block li{font-size:13px;color:var(--muted);line-height:1.8}
.block li{margin:2px 0 2px 16px}

/* ── QUICK READS ── */
.qs{margin:32px 0;max-width:var(--reading)}
.qs h3{font-size:16px;font-weight:700;color:var(--orange);margin-bottom:14px}
.qgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.qcard{background:rgba(22,27,34,.6);border:1px solid var(--border);border-radius:8px;padding:16px;transition:.2s}
.qcard:hover{border-color:var(--orange)}
.qcard h4{font-size:13px;font-weight:600;color:var(--orange);margin-bottom:8px}
.qcard li{font-size:12px;color:var(--muted);margin:2px 0 2px 14px;line-height:1.7}

/* ── JUDGMENT ── */
.jdg{max-width:var(--reading);margin:40px 0;background:linear-gradient(135deg,rgba(212,168,83,.06),rgba(248,81,73,.03));border:1px solid rgba(212,168,83,.25);border-radius:12px;padding:24px 28px}
.jdg .j-label{font-size:10px;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.jdg .j-core{font-size:17px;font-weight:800;color:var(--gold);line-height:1.6;margin-bottom:14px}
.jdg p,.jdg li{font-size:13px;color:var(--muted);line-height:1.8}
.jdg strong{color:var(--text)}

/* ── SOURCES FOOTER ── */
.src{max-width:var(--reading);font-size:11px;color:var(--muted);padding-top:16px;margin-top:32px;border-top:1px solid var(--border)}

/* ── PREV / NEXT NAV ── */
.post-nav{display:flex;justify-content:space-between;gap:16px;margin-top:32px;padding-top:20px;border-top:1px solid var(--border)}
.post-nav a{flex:1;padding:14px 18px;background:rgba(22,27,34,.4);border:1px solid var(--border);border-radius:10px;text-decoration:none;color:var(--muted);font-size:12px;transition:.2s;display:flex;flex-direction:column;gap:4px}
.post-nav a:hover{border-color:var(--blue);color:var(--text);background:rgba(88,166,255,.04)}
.post-nav a .nav-label{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
.post-nav a .nav-title{font-size:13px;font-weight:600;color:var(--text)}
.post-nav a.next{text-align:right}
.post-nav a.disabled{opacity:.25;pointer-events:none}

/* ── EMPTY ── */
.empty{text-align:center;padding:120px 20px;color:var(--muted)}

/* ── FOOTER ── */
.ft{text-align:center;padding:60px 20px;border-top:1px solid var(--border);color:var(--muted);font-size:12px;clear:both}
.ft a{color:var(--gold);text-decoration:none}

/* ── RESPONSIVE ── */
@media(max-width:800px){
  .wrap{flex-direction:column}.side{width:100%;height:auto;position:static;border-right:none;border-bottom:1px solid var(--border);padding:14px}
  .main{padding:24px 16px 60px;max-width:100%}
  .hero h1{font-size:28px}.dr-num{font-size:48px;margin-bottom:-18px}.dr h2{font-size:20px}
  .bignums{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}.qgrid{grid-template-columns:1fr}
  .blog-post{padding:20px 16px}.blog-date{margin:-20px -16px 20px -16px;padding:20px 16px 16px 16px}
  .blog-date .tags-row{margin-left:0;margin-top:8px;width:100%}
  .post-nav{flex-direction:column}
  .blog-date{position:relative;top:0}
}
</style>
</head>

function estimateReadingTime(briefing) {
  // Rough estimate: ~400 chars per minute for Chinese+English mixed text
  let text = '';
  (briefing.deep_reads || []).forEach(dr => {
    text += (dr.title || '') + (dr.one_liner || '');
    (dr.key_numbers || []).forEach(kn => text += kn);
    if (dr.sections) Object.values(dr.sections).forEach(v => text += (v || ''));
  });
  (briefing.quick_reads || []).forEach(qr => {
    text += (qr.title || '') + (qr.items || []).join('');
  });
  text += (briefing.judgment || '');
  const chars = text.length;
  const mins = Math.max(1, Math.round(chars / 400));
  return mins;
}

const ALL_BRIEFINGS = BRIEFINGS; // keep ref for prev/next

function renderPrevNext(currentIdx, filteredList) {
  // filteredList is reversed (newest first); find actual positions
  const total = ALL_BRIEFINGS.length;
  const currentDate = filteredList[currentIdx].date;
  const globalIdx = ALL_BRIEFINGS.findIndex(b => b.date === currentDate);
  
  let prevHtml = '', nextHtml = '';
  
  // Prev = older (higher index in ALL_BRIEFINGS, since ALL_BRIEFINGS is oldest-first)
  if (globalIdx < total - 1) {
    const prev = ALL_BRIEFINGS[globalIdx + 1];
    prevHtml = `<a href="#i-${prev.date}" onclick="document.getElementById('i-${prev.date}').scrollIntoView({behavior:'smooth'});return false"><span class="nav-label">← 上一篇</span><span class="nav-title">${prev.date} · ${prev.deep_count}篇精读</span></a>`;
  } else {
    prevHtml = `<span class="disabled"><span class="nav-label">← 上一篇</span><span class="nav-title">—</span></span>`;
  }
  
  // Next = newer (lower index in ALL_BRIEFINGS)
  if (globalIdx > 0) {
    const next = ALL_BRIEFINGS[globalIdx - 1];
    nextHtml = `<a href="#i-${next.date}" class="next" onclick="document.getElementById('i-${next.date}').scrollIntoView({behavior:'smooth'});return false"><span class="nav-label">下一篇 →</span><span class="nav-title">${next.date} · ${next.deep_count}篇精读</span></a>`;
  } else {
    nextHtml = `<span class="disabled next"><span class="nav-label">下一篇 →</span><span class="nav-title">—</span></span>`;
  }
  
  return `<div class="post-nav">${prevHtml}${nextHtml}</div>`;
}

          }else{content=lines.map(l=>`<p>${l.trim()}</p>`).join('');}
        }
        const label=k.includes('连接')?'🔗 Why This Matters':k.includes('讨论')?'💬 HN Discussion':k.includes('战略')?'🎯 Strategic Signals':k;
        h+=`<div class="${cls}"><h4>${label}</h4>${content}</div>`;
      }
      h+=`</div>`;
    });
    // Quick reads
    if(b.quick_reads&&b.quick_reads.length){h+=`<div class="qs"><h3>🥈 速览</h3><div class="qgrid">`;b.quick_reads.forEach(qr=>{h+=`<div class="qcard"><h4>${qr.title}</h4><ul>${qr.items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`});h+=`</div></div>`}
    // Judgment
    if(b.judgment){const p=b.judgment.split(/具体行动|行动建议/);h+=`<div class="jdg"><div class="j-label">🧭 The Call</div><div class="j-core">${p[0]}</div>`;if(p[1])h+=`${p[1].replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>')}`;h+=`</div>`}
    if(b.sources)h+=`<div class="src">📡 ${b.sources}</div>`;
    
    // Previous / Next navigation
    h += renderPrevNext(idx, filtered);
    
    h+=`</div>`; // close blog-post
  });
  document.getElementById('m').innerHTML=h;
}
R();
</script>
</body>
</html>
