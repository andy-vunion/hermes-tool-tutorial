<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Intelligence Dashboard — 半导体客户情报扫描</title>
<style>
/* ===== Reset & Base ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:#f5f6f8;color:#111827;line-height:1.6;overflow:hidden;height:100vh}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#9ca3af}

/* ===== Top Navigation Bar ===== */
.top-bar{background:#ffffff;border-bottom:1px solid #e5e7eb;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;z-index:100;position:relative}
.top-bar .logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:16px;color:#111827}
.top-bar .logo .icon{width:32px;height:32px;background:linear-gradient(135deg,#2563eb,#7c3aed);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px}
.top-bar .actions{display:flex;align-items:center;gap:12px}
.top-bar .last-updated{font-size:12px;color:#6b7280}
.top-bar .refresh-btn{background:#f0f1f3;border:1px solid #e5e7eb;padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer;color:#374151;transition:all .15s}
.top-bar .refresh-btn:hover{background:#e5e7eb}

/* ===== KPI Bar ===== */
.kpi-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;padding:20px 24px}
.kpi-card{background:#ffffff;border-radius:12px;padding:20px 24px;border:1px solid #e5e7eb;transition:box-shadow .2s;cursor:default}
.kpi-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.06)}
.kpi-card .kpi-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.kpi-card .kpi-label{font-size:13px;color:#6b7280;font-weight:500}
.kpi-card .kpi-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.kpi-card .kpi-value{font-size:28px;font-weight:700;color:#111827;margin-bottom:4px}
.kpi-card .kpi-sub{font-size:12px;color:#6b7280}
.kpi-icon.blue{background:#eff6ff;color:#2563eb}
.kpi-icon.green{background:#ecfdf5;color:#059669}
.kpi-icon.orange{background:#fffbeb;color:#d97706}
.kpi-icon.purple{background:#f5f3ff;color:#7c3aed}

/* ===== Main Layout ===== */
.main-container{display:flex;height:calc(100vh - 56px - 124px);padding:0 24px 24px;gap:16px}
.column-left{width:260px;min-width:260px;background:#ffffff;border-radius:12px;border:1px solid #e5e7eb;display:flex;flex-direction:column;overflow:hidden}
.column-center{flex:1;background:#ffffff;border-radius:12px;border:1px solid #e5e7eb;overflow-y:auto;overflow-x:hidden}
.column-right{width:320px;min-width:320px;display:flex;flex-direction:column;gap:16px;overflow-y:auto;overflow-x:hidden}

/* ===== Left Column — Customer List ===== */
.list-header{padding:16px;border-bottom:1px solid #e5e7eb}
.list-header .search-box{position:relative}
.list-header .search-box input{width:100%;padding:9px 12px 9px 34px;border:1px solid #e5e7eb;border-radius:8px;font-size:13px;outline:none;background:#f9fafb;transition:border-color .15s}
.list-header .search-box input:focus{border-color:#2563eb;background:#fff}
.list-header .search-box .search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#9ca3af;font-size:14px}
.filter-pills{display:flex;gap:6px;padding:10px 16px;flex-wrap:wrap;border-bottom:1px solid #f0f1f3}
.filter-pill{padding:5px 12px;border-radius:16px;font-size:12px;cursor:pointer;border:1px solid #e5e7eb;background:#fff;color:#6b7280;transition:all .15s;white-space:nowrap}
.filter-pill:hover{border-color:#2563eb;color:#2563eb}
.filter-pill.active{background:#2563eb;border-color:#2563eb;color:#fff}
.customer-list-scroll{flex:1;overflow-y:auto}
.customer-item{padding:12px 16px;border-bottom:1px solid #f0f1f3;cursor:pointer;transition:background .12s;display:flex;align-items:center;gap:10px}
.customer-item:hover{background:#f9fafb}
.customer-item.selected{background:#eff6ff;border-left:3px solid #2563eb;padding-left:13px}
.customer-item .avatar{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.customer-item .cust-info{flex:1;min-width:0}
.customer-item .cust-name{font-size:13px;font-weight:600;color:#111827;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.customer-item .cust-industry{font-size:11px;color:#6b7280;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.customer-item .cust-badge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600;flex-shrink:0}
.badge-opportunity{background:#ecfdf5;color:#059669}
.badge-risk{background:#fef2f2;color:#dc2626}
.badge-dynamic{background:#eff6ff;color:#2563eb}
.badge-none{background:#f3f4f6;color:#6b7280}

/* ===== Center Column — Customer Detail ===== */
.detail-empty{display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;color:#d1d5db;gap:12px}
.detail-empty .empty-icon{font-size:48px}
.detail-empty .empty-text{font-size:14px;color:#9ca3af}
.detail-content{padding:20px 24px}
.detail-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid #f0f1f3}
.detail-header .cust-title{flex:1}
.detail-header .cust-name-lg{font-size:20px;font-weight:700;color:#111827;margin-bottom:4px}
.detail-header .cust-meta{font-size:13px;color:#6b7280}
.detail-header .strat-score{display:flex;align-items:center;gap:6px;background:#f5f3ff;padding:8px 14px;border-radius:8px}
.detail-header .score-num{font-size:22px;font-weight:700;color:#7c3aed}
.detail-header .score-label{font-size:11px;color:#6b7280}

/* Opportunity Card */
.opportunity-card{background:linear-gradient(135deg,#fffbeb,#fff7ed);border:2px solid #d97706;border-radius:12px;padding:16px 20px;margin-bottom:20px}
.opportunity-card .opp-title{font-size:14px;font-weight:700;color:#92400e;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.opportunity-card .opp-body{font-size:13px;color:#78350f;line-height:1.7}

/* Info Grid */
.info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px}
.info-cell{background:#f9fafb;border:1px solid #f0f1f3;border-radius:8px;padding:12px 14px}
.info-cell .info-label{font-size:11px;color:#6b7280;text-transform:uppercase;font-weight:600;margin-bottom:4px;letter-spacing:.3px}
.info-cell .info-value{font-size:13px;color:#111827;line-height:1.5}

/* Timeline */
.timeline-section{margin-top:8px}
.timeline-title{font-size:15px;font-weight:700;color:#111827;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.timeline-title .dot{width:8px;height:8px;background:#2563eb;border-radius:50%}
.timeline-item{display:flex;gap:14px;padding-bottom:16px;position:relative}
.timeline-item::before{content:'';position:absolute;left:7px;top:24px;bottom:0;width:2px;background:#e5e7eb}
.timeline-item:last-child::before{display:none}
.timeline-item .tl-dot{width:16px;height:16px;border-radius:50%;flex-shrink:0;margin-top:2px;position:relative;z-index:1}
.timeline-item .tl-dot.opportunity{background:#ecfdf5;border:2px solid #059669}
.timeline-item .tl-dot.risk{background:#fef2f2;border:2px solid #dc2626}
.timeline-item .tl-dot.dynamic{background:#eff6ff;border:2px solid #2563eb}
.timeline-item .tl-dot.none{background:#f3f4f6;border:2px solid #d1d5db}
.timeline-item .tl-content{flex:1}
.timeline-item .tl-date{font-size:11px;color:#6b7280;margin-bottom:2px}
.timeline-item .tl-summary{font-size:13px;color:#111827;line-height:1.5}
.timeline-item .tl-source{font-size:11px;color:#2563eb;margin-top:2px}
.timeline-item .tl-badge{display:inline-block;font-size:10px;padding:1px 7px;border-radius:8px;margin-left:6px;font-weight:600}
.tl-badge.opportunity{background:#ecfdf5;color:#059669}
.tl-badge.risk{background:#fef2f2;color:#dc2626}
.tl-badge.dynamic{background:#eff6ff;color:#2563eb}
.tl-badge.none{background:#f3f4f6;color:#6b7280}

/* Signal distribution bars */
.dist-bar{margin-bottom:8px}
.dist-bar .dist-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px}
.dist-bar .dist-label span:first-child{color:#6b7280}
.dist-bar .dist-label span:last-child{font-weight:600;color:#111827}
.dist-bar .dist-track{height:6px;background:#f0f1f3;border-radius:3px;overflow:hidden}
.dist-bar .dist-fill{height:100%;border-radius:3px;transition:width .4s}
.dist-fill.opportunity{background:#059669}
.dist-fill.risk{background:#dc2626}
.dist-fill.dynamic{background:#2563eb}
.dist-fill.none{background:#d1d5db}

/* ===== Right Column Cards ===== */
.side-card{background:#ffffff;border-radius:12px;border:1px solid #e5e7eb;padding:16px}
.side-card-title{font-size:14px;font-weight:700;color:#111827;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.top-cust-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f0f1f3}
.top-cust-item:last-child{border-bottom:none}
.top-cust-item .tc-rank{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.tc-rank.gold{background:#d97706}
.tc-rank.silver{background:#6b7280}
.tc-rank.bronze{background:#92400e}
.tc-rank.normal{background:#d1d5db}
.top-cust-item .tc-name{font-size:12px;font-weight:600;flex:1}
.top-cust-item .tc-count{font-size:11px;color:#6b7280}

.recent-signal-item{padding:8px 0;border-bottom:1px solid #f0f1f3}
.recent-signal-item:last-child{border-bottom:none}
.recent-signal-item .rs-cust{font-size:12px;font-weight:600;color:#111827}
.recent-signal-item .rs-summary{font-size:11px;color:#6b7280;margin-top:2px}
.recent-signal-item .rs-meta{font-size:10px;color:#9ca3af;margin-top:2px}

/* AI Assistant */
.ai-assistant{border:2px solid #7c3aed;border-radius:12px;overflow:hidden}
.ai-header{background:linear-gradient(135deg,#7c3aed,#2563eb);padding:12px 16px;display:flex;align-items:center;gap:8px}
.ai-header .ai-title{color:#fff;font-size:14px;font-weight:700}
.ai-header .ai-status{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.ai-status.online{background:rgba(255,255,255,.2);color:#fff}
.ai-status.offline{background:rgba(255,255,255,.2);color:#fca5a5}
.ai-body{padding:12px 16px}
.ai-msg{font-size:12px;color:#6b7280;line-height:1.6;max-height:120px;overflow-y:auto;margin-bottom:10px}
.ai-input-row{display:flex;gap:8px}
.ai-input-row input{flex:1;padding:7px 10px;border:1px solid #e5e7eb;border-radius:6px;font-size:12px;outline:none}
.ai-input-row input:focus{border-color:#7c3aed}
.ai-input-row button{background:linear-gradient(135deg,#7c3aed,#2563eb);color:#fff;border:none;padding:7px 14px;border-radius:6px;font-size:12px;cursor:pointer;font-weight:600;white-space:nowrap}
.ai-input-row button:hover{opacity:.9}
.ai-input-row button:disabled{opacity:.5;cursor:not-allowed}
.ai-mock-badge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:4px;background:#fef3c7;color:#92400e;margin-left:4px}

/* Trend arrows */
.trend-up{color:#059669;font-weight:700}
.trend-down{color:#dc2626;font-weight:700}
.trend-flat{color:#6b7280}

/* Responsive scroll prevention */
.column-center::-webkit-scrollbar{width:6px}
.column-right::-webkit-scrollbar{width:6px}
</style>
</head>
<body>

<!-- Top Bar -->
<div class="top-bar">
  <div class="logo">
    <div class="icon">⚡</div>
    <span>Customer Intelligence</span>
  </div>
  <div class="actions">
    <span class="last-updated" id="last-updated">数据加载中...</span>
    <button class="refresh-btn" onclick="refreshData()">⟳ 刷新</button>
  </div>
</div>

<!-- KPI Bar -->
<div class="kpi-bar">
  <div class="kpi-card">
    <div class="kpi-header"><span class="kpi-label">客户总数</span><div class="kpi-icon blue">👥</div></div>
    <div class="kpi-value" id="kpi-customers">0</div>
    <div class="kpi-sub">A类 0 · B类 0 · C类 0</div>
  </div>
  <div class="kpi-card">
    <div class="kpi-header"><span class="kpi-label">追踪信号</span><div class="kpi-icon green">📡</div></div>
    <div class="kpi-value" id="kpi-signals">0</div>
    <div class="kpi-sub">近4周数据</div>
  </div>
  <div class="kpi-card">
    <div class="kpi-header"><span class="kpi-label">商机信号</span><div class="kpi-icon orange">💡</div></div>
    <div class="kpi-value" id="kpi-opportunities">0</div>
    <div class="kpi-sub">可跟进机会</div>
  </div>
  <div class="kpi-card">
    <div class="kpi-header"><span class="kpi-label">紧急预警</span><div class="kpi-icon purple">🔔</div></div>
    <div class="kpi-value" id="kpi-alerts">0</div>
    <div class="kpi-sub">需立即关注</div>
  </div>
</div>

<!-- Main 3-Column Layout -->
<div class="main-container">
  <!-- Left: Customer List -->
  <div class="column-left">
    <div class="list-header">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="搜索客户 / 行业..." oninput="filterCustomers()">
      </div>
    </div>
    <div class="filter-pills">
      <span class="filter-pill active" data-filter="all" onclick="setFilter('all',this)">全部</span>
      <span class="filter-pill" data-filter="opportunity" onclick="setFilter('opportunity',this)">💡 机会</span>
      <span class="filter-pill" data-filter="risk" onclick="setFilter('risk',this)">⚠️ 风险</span>
      <span class="filter-pill" data-filter="dynamic" onclick="setFilter('dynamic',this)">📊 动态</span>
    </div>
    <div class="customer-list-scroll" id="customer-list"></div>
  </div>

  <!-- Center: Customer Detail -->
  <div class="column-center" id="detail-panel">
    <div class="detail-empty" id="detail-empty">
      <div class="empty-icon">📋</div>
      <div class="empty-text">← 选择左侧客户查看情报详情</div>
    </div>
    <div class="detail-content" id="detail-content" style="display:none"></div>
  </div>

  <!-- Right: Panels -->
  <div class="column-right">
    <!-- Signal Distribution -->
    <div class="side-card">
      <div class="side-card-title">📊 信号分布</div>
      <div id="signal-distribution"></div>
    </div>

    <!-- Top 5 Active Customers -->
    <div class="side-card">
      <div class="side-card-title">🏆 活跃客户 Top 5</div>
      <div id="top-customers"></div>
    </div>

    <!-- Recent Signals -->
    <div class="side-card">
      <div class="side-card-title">🕐 最新信号</div>
      <div id="recent-signals"></div>
    </div>

    <!-- AI Sales Assistant -->
    <div class="side-card ai-assistant">
      <div class="ai-header">
        <span style="font-size:18px">🤖</span>
        <span class="ai-title">AI 销售助手</span>
        <span class="ai-status offline" id="ai-status">检测中</span>
      </div>
      <div class="ai-body">
        <div class="ai-msg" id="ai-messages">正在连接 DeepSeek v4-flash...</div>
        <div class="ai-input-row">
          <input type="text" id="ai-input" placeholder="询问客户策略建议..." onkeydown="if(event.key==='Enter')askAI()">
          <button id="ai-send-btn" onclick="askAI()" disabled>发送</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
/* ===== Global State ===== */
var allCustomers = [];
var allTracking = [];
var currentCustomerId = null;
var currentFilter = 'all';
var searchQuery = '';
var apiKey = 'sk-9cd2150c397f4294934ef02d7cb15822';
var aiOnline = false;
var selectedCustomerForAI = null;

/* ===== Avatar Colors ===== */
var avatarColors = ['#2563eb','#7c3aed','#059669','#d97706','#dc2626','#0891b2','#4f46e5','#9333ea','#0d9488','#b45309','#be123c','#1d4ed8','#6d28d9','#047857','#b91c1c','#0e7490','#4338ca','#7e22ce','#115e59','#854d0e','#9f1239','#1e40af'];

function getAvatarColor(index) {
  return avatarColors[index % avatarColors.length];
}

function getInitials(name) {
  if (!name) return '?';
  return name.charAt(0);
}

/* ===== Initialization ===== */
function initDashboard() {
  var dataEl = document.getElementById('customer-data');
  var raw = dataEl.textContent || dataEl.innerText || '';
  try {
    var data = JSON.parse(raw);
    allCustomers = data.customers || [];
    allTracking = data.tracking || [];
  } catch(e) {
    console.error('Failed to parse customer data:', e);
    allCustomers = [];
    allTracking = [];
  }

  updateKPIs();
  renderCustomerList();
  renderRightPanels();
  document.getElementById('last-updated').textContent = '数据更新: ' + new Date().toLocaleString('zh-CN');

  // Health check DeepSeek
  healthCheckDeepSeek();
}

/* ===== KPI Updates ===== */
function updateKPIs() {
  document.getElementById('kpi-customers').textContent = allCustomers.length;

  document.getElementById('kpi-signals').textContent = allTracking.length;

  var oppCount = 0;
  var riskCount = 0;
  for (var i = 0; i < allTracking.length; i++) {
    if (allTracking[i].signal_type === 'opportunity') oppCount++;
    if (allTracking[i].signal_type === 'risk') riskCount++;
  }
  document.getElementById('kpi-opportunities').textContent = oppCount;

  var alertCount = 0;
  for (var i = 0; i < allTracking.length; i++) {
    if (allTracking[i].alert) alertCount++;
  }
  document.getElementById('kpi-alerts').textContent = alertCount;

  // Group tags
  var tags = {A:0, B:0, C:0};
  for (var i = 0; i < allCustomers.length; i++) {
    var t = allCustomers[i].group_tag;
    if (tags[t] !== undefined) tags[t]++;
  }
  var kpiSub = document.querySelector('#kpi-customers').parentElement.querySelector('.kpi-sub');
  if (kpiSub) kpiSub.textContent = 'A类 ' + tags.A + ' · B类 ' + tags.B + ' · C类 ' + tags.C;
}

/* ===== Customer List ===== */
function getCustomerSignals(customerName) {
  var result = [];
  for (var i = 0; i < allTracking.length; i++) {
    if (allTracking[i].customer_name === customerName) {
      result.push(allTracking[i]);
    }
  }
  return result;
}

function getCustomerSignalTypes(customerName) {
  var signals = getCustomerSignals(customerName);
  var types = {};
  for (var i = 0; i < signals.length; i++) {
    types[signals[i].signal_type] = true;
  }
  return types;
}

function getPrimarySignalBadge(customerName) {
  var types = getCustomerSignalTypes(customerName);
  if (types.risk) return '<span class="cust-badge badge-risk">风险</span>';
  if (types.opportunity) return '<span class="cust-badge badge-opportunity">机会</span>';
  if (types.dynamic) return '<span class="cust-badge badge-dynamic">动态</span>';
  return '<span class="cust-badge badge-none">-</span>';
}

function filterCustomers() {
  searchQuery = document.getElementById('search-input').value.toLowerCase();
  renderCustomerList();
}

function setFilter(filterType, el) {
  currentFilter = filterType;
  var pills = document.querySelectorAll('.filter-pill');
  for (var i = 0; i < pills.length; i++) {
    pills[i].classList.remove('active');
  }
  el.classList.add('active');
  renderCustomerList();
}

function customerMatchesFilter(customer) {
  if (currentFilter === 'all') return true;
  var types = getCustomerSignalTypes(customer.name);
  return types[currentFilter] === true;
}

function customerMatchesSearch(customer) {
  if (!searchQuery) return true;
  var name = (customer.name || '').toLowerCase();
  var industry = (customer.industry || '').toLowerCase();
  return name.indexOf(searchQuery) !== -1 || industry.indexOf(searchQuery) !== -1;
}

function renderCustomerList() {
  var container = document.getElementById('customer-list');
  var html = '';
  for (var i = 0; i < allCustomers.length; i++) {
    var c = allCustomers[i];
    if (!customerMatchesFilter(c)) continue;
    if (!customerMatchesSearch(c)) continue;

    var selectedClass = (currentCustomerId === c.id) ? ' selected' : '';
    var badge = getPrimarySignalBadge(c.name);
    var initial = getInitials(c.name);
    var color = getAvatarColor(i);

    html += '<div class="customer-item' + selectedClass + '" onclick="selectCustomer(' + c.id + ')" data-customer-id="' + c.id + '">';
    html += '<div class="avatar" style="background:' + color + '">' + initial + '</div>';
    html += '<div class="cust-info">';
    html += '<div class="cust-name">' + escapeHtml(c.name) + '</div>';
    html += '<div class="cust-industry">' + escapeHtml(c.industry || '') + '</div>';
    html += '</div>';
    html += badge;
    html += '</div>';
  }
  container.innerHTML = html;
}

/* ===== Customer Detail (Center Column) ===== */
function selectCustomer(customerId) {
  currentCustomerId = customerId;
  selectedCustomerForAI = customerId;

  // Update list selection
  var items = document.querySelectorAll('.customer-item');
  for (var i = 0; i < items.length; i++) {
    items[i].classList.remove('selected');
  }
  var activeItem = document.querySelector('.customer-item[data-customer-id="' + customerId + '"]');
  if (activeItem) activeItem.classList.add('selected');

  // Find customer
  var customer = null;
  for (var i = 0; i < allCustomers.length; i++) {
    if (allCustomers[i].id === customerId) {
      customer = allCustomers[i];
      break;
    }
  }
  if (!customer) return;

  renderCustomerDetail(customer);
}

function renderCustomerDetail(customer) {
  document.getElementById('detail-empty').style.display = 'none';
  var content = document.getElementById('detail-content');
  content.style.display = 'block';

  var signals = getCustomerSignals(customer.name);
  // Sort by date desc
  signals.sort(function(a, b) {
    if (a.created_at > b.created_at) return -1;
    if (a.created_at < b.created_at) return 1;
    return 0;
  });

  var oppCount = 0;
  var riskCount = 0;
  for (var i = 0; i < signals.length; i++) {
    if (signals[i].signal_type === 'opportunity') oppCount++;
    if (signals[i].signal_type === 'risk') riskCount++;
  }

  var html = '';

  // Header
  html += '<div class="detail-header">';
  html += '<div class="cust-title">';
  html += '<div class="cust-name-lg">' + escapeHtml(customer.name) + '</div>';
  html += '<div class="cust-meta">' + escapeHtml(customer.industry || '') + ' · ' + escapeHtml(customer.group_tag || '') + '类客户</div>';
  html += '</div>';
  html += '<div class="strat-score"><span class="score-num">' + (customer.strat_score || 0) + '</span><span class="score-label">战略评分</span></div>';
  html += '</div>';

  // Opportunity Insight Card
  html += '<div class="opportunity-card">';
  html += '<div class="opp-title">💡 商机突破口</div>';
  html += '<div class="opp-body">';
  if (customer.notes) {
    html += escapeHtml(customer.notes).replace(/\[/g, '').replace(/\]/g, '');
  } else {
    html += '暂无商机分析数据，请使用AI助手获取策略建议。';
  }
  html += '</div>';
  html += '</div>';

  // Info Grid (8 cells)
  html += '<div class="info-grid">';
  html += buildInfoCell('公司简介', customer.company_profile);
  html += buildInfoCell('主营产品', customer.main_products);
  html += buildInfoCell('市场地位', customer.market_position);
  html += buildInfoCell('供应链/芯片需求', customer.supply_chain);
  html += buildInfoCell('合作历史', customer.coop_history);
  html += buildInfoCell('关键人员', customer.org_key_people);
  html += buildInfoCell('竞争对手', customer.competitors);
  html += buildInfoCell('监控关键词', customer.monitor_keywords);
  html += '</div>';

  // Signal Timeline
  html += '<div class="timeline-section">';
  html += '<div class="timeline-title"><span class="dot"></span>信号时间线 <span style="font-weight:400;font-size:12px;color:#6b7280;margin-left:4px">(' + signals.length + '条)</span></div>';

  if (signals.length === 0) {
    html += '<div style="color:#9ca3af;font-size:13px;padding:12px 0">暂无追踪信号</div>';
  }

  for (var i = 0; i < signals.length; i++) {
    var s = signals[i];
    var dotClass = s.signal_type || 'none';
    var badgeClass = s.signal_type || 'none';
    var badgeLabels = {opportunity:'机会', risk:'风险', dynamic:'动态', none:'常规'};
    var badgeLabel = badgeLabels[badgeClass] || '常规';
    var trendHtml = '';
    if (s.trend_flag === '↑') trendHtml = ' <span class="trend-up">↑</span>';
    else if (s.trend_flag === '↓') trendHtml = ' <span class="trend-down">↓</span>';
    else trendHtml = ' <span class="trend-flat">→</span>';

    html += '<div class="timeline-item">';
    html += '<div class="tl-dot ' + dotClass + '"></div>';
    html += '<div class="tl-content">';
    html += '<div class="tl-date">' + escapeHtml(s.week_start || '') + trendHtml;
    html += '<span class="tl-badge ' + badgeClass + '">' + badgeLabel + '</span>';
    if (s.alert) html += ' <span style="color:#dc2626;font-size:11px">' + escapeHtml(s.alert) + '</span>';
    html += '</div>';
    html += '<div class="tl-summary">' + escapeHtml(s.signal_summary || '') + '</div>';
    if (s.source) html += '<div class="tl-source">📎 ' + escapeHtml(s.source) + '</div>';
    html += '</div>';
    html += '</div>';
  }

  html += '</div>';

  content.innerHTML = html;
}

function buildInfoCell(label, value) {
  var display = value || '暂无数据';
  var truncated = display.length > 120 ? display.substring(0, 117) + '...' : display;
  return '<div class="info-cell"><div class="info-label">' + escapeHtml(label) + '</div><div class="info-value">' + escapeHtml(truncated) + '</div></div>';
}

/* ===== Right Panels ===== */
function renderRightPanels() {
  renderSignalDistribution();
  renderTopCustomers();
  renderRecentSignals();
}

function renderSignalDistribution() {
  var container = document.getElementById('signal-distribution');
  var counts = {opportunity:0, risk:0, dynamic:0, none:0};
  for (var i = 0; i < allTracking.length; i++) {
    var t = allTracking[i].signal_type;
    if (counts[t] !== undefined) counts[t]++;
  }
  var total = allTracking.length || 1;
  var labels = {opportunity:'💡 商机', risk:'⚠️ 风险', dynamic:'📊 动态', none:'📋 常规'};
  var html = '';
  var keys = ['opportunity','risk','dynamic','none'];
  for (var i = 0; i < keys.length; i++) {
    var k = keys[i];
    var pct = Math.round((counts[k] / total) * 100);
    html += '<div class="dist-bar">';
    html += '<div class="dist-label"><span>' + labels[k] + '</span><span>' + counts[k] + ' (' + pct + '%)</span></div>';
    html += '<div class="dist-track"><div class="dist-fill ' + k + '" style="width:' + pct + '%"></div></div>';
    html += '</div>';
  }
  container.innerHTML = html;
}

function renderTopCustomers() {
  var container = document.getElementById('top-customers');
  // Count signals per customer, excluding 'none' type
  var custSignalCount = {};
  for (var i = 0; i < allTracking.length; i++) {
    var t = allTracking[i];
    if (t.signal_type === 'none') continue;
    var name = t.customer_name;
    custSignalCount[name] = (custSignalCount[name] || 0) + 1;
  }
  // Sort
  var sorted = [];
  for (var name in custSignalCount) {
    if (custSignalCount.hasOwnProperty(name)) {
      sorted.push({name: name, count: custSignalCount[name]});
    }
  }
  sorted.sort(function(a, b) { return b.count - a.count; });
  var top5 = sorted.slice(0, 5);

  var rankClasses = ['gold','silver','bronze','normal','normal'];
  var html = '';
  for (var i = 0; i < top5.length; i++) {
    html += '<div class="top-cust-item">';
    html += '<div class="tc-rank ' + rankClasses[i] + '">' + (i + 1) + '</div>';
    html += '<div class="tc-name">' + escapeHtml(top5[i].name.length > 10 ? top5[i].name.substring(0, 10) + '...' : top5[i].name) + '</div>';
    html += '<div class="tc-count">' + top5[i].count + ' 信号</div>';
    html += '</div>';
  }
  if (top5.length === 0) {
    html += '<div style="color:#9ca3af;font-size:12px;padding:8px 0">暂无活跃信号</div>';
  }
  container.innerHTML = html;
}

function renderRecentSignals() {
  var container = document.getElementById('recent-signals');
  // Sort tracking by created_at desc
  var sorted = allTracking.slice().sort(function(a, b) {
    if (a.created_at > b.created_at) return -1;
    if (a.created_at < b.created_at) return 1;
    return 0;
  });
  var recent = sorted.slice(0, 5);

  var html = '';
  for (var i = 0; i < recent.length; i++) {
    var s = recent[i];
    var icon = {opportunity:'💡', risk:'⚠️', dynamic:'📊', none:'📋'}[s.signal_type] || '📋';
    html += '<div class="recent-signal-item">';
    html += '<div class="rs-cust">' + icon + ' ' + escapeHtml(s.customer_name.length > 12 ? s.customer_name.substring(0, 12) + '...' : s.customer_name) + '</div>';
    html += '<div class="rs-summary">' + escapeHtml((s.signal_summary || '').substring(0, 40)) + '</div>';
    html += '<div class="rs-meta">' + escapeHtml(s.week_start || '') + '</div>';
    html += '</div>';
  }
  if (recent.length === 0) {
    html += '<div style="color:#9ca3af;font-size:12px;padding:8px 0">暂无信号</div>';
  }
  container.innerHTML = html;
}

/* ===== DeepSeek AI Assistant ===== */
function healthCheckDeepSeek() {
  var statusEl = document.getElementById('ai-status');
  var msgEl = document.getElementById('ai-messages');
  var btn = document.getElementById('ai-send-btn');

  statusEl.textContent = '检测中';
  statusEl.className = 'ai-status offline';

  var controller = new AbortController();
  var timeoutId = setTimeout(function() { controller.abort(); }, 5000);

  fetch('https://api.deepseek.com/v1/models', {
    method: 'GET',
    headers: {
      'Authorization': 'Bearer ' + apiKey
    },
    signal: controller.signal
  })
  .then(function(resp) {
    clearTimeout(timeoutId);
    if (resp.ok) {
      aiOnline = true;
      statusEl.textContent = '在线';
      statusEl.className = 'ai-status online';
      msgEl.innerHTML = '✅ DeepSeek v4-flash 已就绪<br><span style="color:#6b7280;font-size:11px">我可以分析客户数据，提供销售策略建议。请选择一个客户后提问。</span>';
      btn.disabled = false;
    } else {
      throw new Error('Status: ' + resp.status);
    }
  })
  .catch(function(err) {
    clearTimeout(timeoutId);
    aiOnline = false;
    statusEl.textContent = '离线';
    statusEl.className = 'ai-status offline';
    msgEl.innerHTML = '⚠️ AI 服务暂不可用 <span class="ai-mock-badge">MOCK</span><br><span style="color:#6b7280;font-size:11px">将使用本地策略库提供建议。</span>';
    btn.disabled = false; // Allow mock responses
  });
}

function askAI() {
  var input = document.getElementById('ai-input');
  var msgEl = document.getElementById('ai-messages');
  var btn = document.getElementById('ai-send-btn');
  var query = input.value.trim();

  if (!query) return;

  input.value = '';
  btn.disabled = true;
  msgEl.innerHTML = '🤔 思考中...';

  // Build context from selected customer
  var contextStr = 'No customer selected.';
  if (selectedCustomerForAI) {
    var cust = null;
    for (var i = 0; i < allCustomers.length; i++) {
      if (allCustomers[i].id === selectedCustomerForAI) { cust = allCustomers[i]; break; }
    }
    if (cust) {
      var signals = getCustomerSignals(cust.name);
      var signalSummary = '';
      for (var i = 0; i < Math.min(signals.length, 3); i++) {
        signalSummary += signals[i].signal_type + ': ' + (signals[i].signal_summary || '') + '; ';
      }
      contextStr = '客户: ' + cust.name + ' | 行业: ' + (cust.industry || '') +
        ' | 战略评分: ' + (cust.strat_score || 0) +
        ' | 芯片需求: ' + ((cust.supply_chain || '').substring(0, 80)) +
        ' | 近期信号: ' + signalSummary +
        ' | 备注: ' + ((cust.notes || '').substring(0, 120));
    }
  }

  if (!aiOnline) {
    // Mock response
    mockAIResponse(query, msgEl, btn);
    return;
  }

  // Real API call
  var systemPrompt = '你是半导体行业销售助手。基于客户情报数据，为销售团队提供简洁、可执行的策略建议。用中文回答，不超过200字。当前客户上下文: ' + contextStr;

  fetch('https://api.deepseek.com/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + apiKey
    },
    body: JSON.stringify({
      model: 'deepseek-chat',
      messages: [
        {role: 'system', content: systemPrompt},
        {role: 'user', content: query}
      ],
      max_tokens: 300,
      temperature: 0.7
    })
  })
  .then(function(resp) { return resp.json(); })
  .then(function(data) {
    btn.disabled = false;
    if (data.choices && data.choices[0] && data.choices[0].message) {
      msgEl.innerHTML = escapeHtml(data.choices[0].message.content);
    } else if (data.error) {
      msgEl.innerHTML = '❌ API错误: ' + escapeHtml(data.error.message || 'Unknown');
    } else {
      msgEl.innerHTML = '❌ 未知响应格式，请重试。';
    }
  })
  .catch(function(err) {
    btn.disabled = false;
    console.error('AI API error:', err);
    mockAIResponse(query, msgEl, btn);
  });
}

function mockAIResponse(query, msgEl, btn) {
  // Provide context-aware mock responses
  var custName = '';
  if (selectedCustomerForAI) {
    for (var i = 0; i < allCustomers.length; i++) {
      if (allCustomers[i].id === selectedCustomerForAI) {
        custName = allCustomers[i].name;
        break;
      }
    }
  }

  var mockResponses = [
    '基于当前信号分析，建议本周优先跟进' + (custName || '目标客户') + '的供应链需求。近期市场数据显示该客户产能扩张趋势明显，存储芯片采购需求可能增加30%以上。',
    '该客户近期无负面信号，合作关系稳定。建议维持现有供应节奏，同时关注竞对代理商动态，防止份额流失。',
    '数据分析显示' + (custName || '该客户') + '处于高增长阶段。建议主动提供技术支持和样品测试，争取扩大料号覆盖，从单一DRAM向NAND Flash+MCU方案扩展。',
    '根据行业趋势和客户采购周期，下季度可能迎来新一轮备货需求。建议提前准备库存，确保供应能力领先竞对。'
  ];

  var idx = Math.floor(Math.random() * mockResponses.length);
  msgEl.innerHTML = escapeHtml(mockResponses[idx]) + ' <span class="ai-mock-badge">MOCK</span>';
  btn.disabled = false;
}

function refreshData() {
  currentCustomerId = null;
  selectedCustomerForAI = null;
  document.getElementById('detail-empty').style.display = 'flex';
  document.getElementById('detail-content').style.display = 'none';
  document.getElementById('search-input').value = '';
  searchQuery = '';
  currentFilter = 'all';
  var pills = document.querySelectorAll('.filter-pill');
  for (var i = 0; i < pills.length; i++) {
    pills[i].classList.remove('active');
    if (pills[i].getAttribute('data-filter') === 'all') pills[i].classList.add('active');
  }
  updateKPIs();
  renderCustomerList();
  renderRightPanels();
  document.getElementById('last-updated').textContent = '数据更新: ' + new Date().toLocaleString('zh-CN');
}

/* ===== Utility ===== */
function escapeHtml(str) {
  if (!str) return '';
  str = String(str);
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(str));
  return div.innerHTML;
}

/* ===== Boot ===== */
window.addEventListener('DOMContentLoaded', function() {
  initDashboard();
});
