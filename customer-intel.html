<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客户情报扫描 — 曼尼投研工具箱</title>
<style>
:root{--bg:#0a0e1a;--card:#111827;--card2:#1a2035;--border:#1e293b;--text:#e2e8f0;--muted:#94a3b8;--blue:#3b82f6;--green:#10b981;--red:#ef4444;--orange:#f59e0b;--purple:#8b5cf6;--cyan:#06b6d4}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
.top{position:sticky;top:0;z-index:100;background:rgba(10,14,26,.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:16px}
.top a{color:var(--muted);text-decoration:none;font-size:14px;transition:.2s}
.top a:hover{color:var(--text)}
.top h1{font-size:18px;font-weight:700;background:linear-gradient(135deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.top .stat{font-size:12px;color:var(--muted);margin-left:auto}
.top .stat b{color:var(--text)}
.wrap{display:flex;height:calc(100vh - 52px)}
.side{width:280px;flex-shrink:0;border-right:1px solid var(--border);overflow-y:auto;padding:12px;background:var(--card)}
.side input{width:100%;padding:8px 12px;background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;outline:none;margin-bottom:8px}
.side input:focus{border-color:var(--blue)}
.cl-item{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-radius:8px;cursor:pointer;transition:.15s;margin-bottom:2px}
.cl-item:hover,.cl-item.active{background:var(--card2);color:var(--text)}
.cl-item.active{border-left:3px solid var(--blue)}
.cl-name{font-size:14px;font-weight:500}
.cl-industry{font-size:11px;color:var(--muted)}
.main{flex:1;overflow-y:auto;padding:32px 40px}
.main .placeholder{text-align:center;padding:80px 20px;color:var(--muted);font-size:16px}
.cd-header h2{font-size:26px;margin-bottom:8px;font-weight:700}
.cd-badges{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
.cd-badge{background:var(--card2);border:1px solid var(--border);padding:3px 12px;border-radius:12px;font-size:12px;color:var(--cyan)}
.cd-score{font-size:16px}
.cd-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;margin-bottom:24px}
.cd-field{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px}
.cd-field label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px}
.cd-field p{font-size:14px;line-height:1.6}
.cd-field code{background:var(--card2);padding:2px 8px;border-radius:4px;font-size:12px;color:var(--blue)}
.cd-signals{margin-top:16px}
.cd-signals h3{font-size:16px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.signal-row{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;font-size:13px}
.sig-date{color:var(--muted);font-size:11px;min-width:90px}
.sig-icon{font-size:16px;min-width:24px;text-align:center}
.sig-type{color:var(--blue);font-weight:600;min-width:100px}
.sig-summary{flex:1;color:var(--muted)}
.sig-source{font-size:11px;color:var(--muted);min-width:80px;text-align:right}
/* ── Right Panel ── */
.right-panel{width:310px;flex-shrink:0;border-left:1px solid var(--border);overflow-y:auto;padding:16px;background:var(--card);position:sticky;top:0;align-self:flex-start;max-height:calc(100vh - 52px)}
.right-panel h3{font-size:14px;font-weight:700;margin-bottom:12px;color:var(--text);display:flex;align-items:center;gap:6px}
.rp-section{margin-bottom:20px}
.rp-section:last-child{margin-bottom:0}
/* Signal distribution stats */
.rp-dist-row{display:flex;align-items:center;gap:10px;padding:6px 0;font-size:12px}
.rp-dist-icon{font-size:14px;min-width:20px;text-align:center}
.rp-dist-label{min-width:36px;color:var(--muted)}
.rp-dist-count{min-width:36px;text-align:right;font-weight:600;color:var(--text)}
.rp-dist-bar{flex:1;height:6px;background:var(--card2);border-radius:3px;overflow:hidden}
.rp-dist-bar-fill{height:100%;border-radius:3px;transition:width .4s}
.rp-dist-bar-fill.opp{background:var(--green)}
.rp-dist-bar-fill.risk{background:var(--red)}
.rp-dist-bar-fill.dyn{background:var(--orange)}
/* Signal list items in right panel */
.rp-sig-item{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:.15s;margin-bottom:3px;font-size:12px;border:1px solid transparent}
.rp-sig-item:hover{background:var(--card2);border-color:var(--border)}
.rp-sig-date{color:var(--muted);font-size:10px;min-width:56px;line-height:1.4;white-space:nowrap}
.rp-sig-icon{font-size:13px;min-width:18px;text-align:center;line-height:1.4}
.rp-sig-body{flex:1;min-width:0}
.rp-sig-cust{color:var(--blue);font-weight:500;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rp-sig-summary{color:var(--muted);font-size:11px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
/* Top customers list */
.rp-cust-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;cursor:pointer;transition:.15s;margin-bottom:2px;font-size:12px;border:1px solid transparent}
.rp-cust-row:hover{background:var(--card2);border-color:var(--border)}
.rp-cust-rank{min-width:18px;text-align:center;font-weight:700;font-size:12px;color:var(--muted)}
.rp-cust-rank.top3{color:var(--orange)}
.rp-cust-name{flex:1;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rp-cust-count{color:var(--blue);font-weight:600;font-size:13px;min-width:32px;text-align:right}
.rp-divider{border:none;border-top:1px solid var(--border);margin:14px 0}
.ft{text-align:center;padding:40px;border-top:1px solid var(--border);color:var(--muted);font-size:12px}
.ft a{color:var(--blue);text-decoration:none}
@media(max-width:768px){
  .wrap{flex-direction:column}
  .side{width:100%;height:auto;border-right:none;border-bottom:1px solid var(--border)}
  .main{padding:20px}
  .cd-grid{grid-template-columns:1fr}
  .right-panel{display:none}
}
</style>
</head>

  <a href="index.html">← 返回工具箱</a>

  <div class="main" id="main">
    <div class="placeholder">👈 选择左侧客户查看详情</div>

  <div class="right-panel" id="rightPanel">
    <h3>📊 情报总览</h3>
    <div class="rp-section" id="rpDist"></div>
    <hr class="rp-divider">
    <div class="rp-section">
      <div style="font-size:12px;color:var(--muted);margin-bottom:8px">📡 最新信号</div>
      <div id="rpSignals"></div>
    </div>
    <hr class="rp-divider">
    <div class="rp-section">
      <div style="font-size:12px;color:var(--muted);margin-bottom:8px">🔥 活跃客户 Top 5</div>
      <div id="rpTopCusts"></div>

  </div>
</div>

var trackingByCust = {};
customerData.tracking.forEach(function(t) {
  var cn = t.customer_name || '';
  if (!trackingByCust[cn]) trackingByCust[cn] = [];
  trackingByCust[cn].push(t);
});

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function renderList(filter) {
  var q = (filter||'').toLowerCase();
  var h = '';
  customerData.customers.forEach(function(c) {
    var name = c.name || '';
    var ind = c.industry || '';
    if (q && name.toLowerCase().indexOf(q) < 0 && ind.toLowerCase().indexOf(q) < 0) return;
    h += '<div class="cl-item" data-id="' + c.id + '" onclick="selectCustomer(' + c.id + ')"><span class="cl-name">' + esc(name) + '</span><span class="cl-industry">' + esc(ind) + '</span></div>';
  });
  document.getElementById('custlist').innerHTML = h;
  document.getElementById('topstat').innerHTML = '<b>' + customerData.customers.length + '</b>家客户 · <b>' + customerData.tracking.length + '</b>条追踪';
}

function selectCustomer(id) {
  var c = customerData.customers.find(function(x) { return x.id === id; });
  if (!c) return;
  document.querySelectorAll('.cl-item').forEach(function(el) { el.classList.remove('active'); });
  var el = document.querySelector('.cl-item[data-id="' + id + '"]');
  if (el) el.classList.add('active');
  
  var tracks = trackingByCust[c.name] || [];
  var trackHtml = '';
  tracks.forEach(function(t) {
    var icon = '📡';
    if (t.trend_flag && t.trend_flag.toLowerCase().indexOf('up') >= 0) icon = '📈';
    if (t.alert) icon = '⚠️';
    trackHtml += '<div class="signal-row"><span class="sig-date">' + esc(t.week_start||'') + '</span><span class="sig-icon">' + icon + '</span><span class="sig-type">' + esc(t.signal_type||'') + '</span><span class="sig-summary">' + esc(t.signal_summary||'') + '</span><span class="sig-source">' + esc(t.source||'') + '</span></div>';
  });
  
  var ss = c.strat_score || 0;
  var stars = ss > 0 ? (Array(ss+1).join('★') + Array(6-ss).join('☆')) : '暂无评分';
  var sc = '#f59e0b'; if (ss < 4) sc = '#3b82f6'; if (ss < 2) sc = '#64748b';
  
  var scChain = esc(c.supply_chain||'-');
  if (c.competitors) scChain += ' | 竞对: ' + esc(c.competitors);
  
  var gb = c.group_tag ? '<span class="cd-badge">' + esc(c.group_tag) + '</span>' : '';
  
  var h = '<div class="cd-panel"><div class="cd-header"><h2>' + esc(c.name) + '</h2><div class="cd-badges"><span class="cd-badge">' + esc(c.industry||'') + '</span>' + gb + '<span class="cd-score" style="color:' + sc + '">' + stars + '</span></div></div>';
  h += '<div class="cd-grid">';
  h += '<div class="cd-field"><label>公司概况</label><p>' + esc(c.company_profile||'-') + '</p></div>';
  h += '<div class="cd-field"><label>主营产品</label><p>' + esc(c.main_products||'-') + '</p></div>';
  h += '<div class="cd-field"><label>市场地位</label><p>' + esc(c.market_position||'-') + '</p></div>';
  h += '<div class="cd-field"><label>供应链/竞对</label><p>' + scChain + '</p></div>';
  h += '<div class="cd-field"><label>合作历史</label><p>' + esc(c.coop_history||'-') + '</p></div>';
  h += '<div class="cd-field"><label>关键联系人</label><p>' + esc(c.org_key_people||'-') + '</p></div>';
  h += '<div class="cd-field"><label>监控关键词</label><p><code>' + esc(c.monitor_keywords||'-') + '</code></p></div>';
  h += '</div>';
  h += '<div class="cd-signals"><h3>📡 外部信号追踪 (' + tracks.length + '条)</h3>' + (trackHtml || '<p style="color:var(--muted)">暂无追踪记录</p>') + '</div></div>';
  
  document.getElementById('detail').innerHTML = h;
  var ph = document.querySelector('.placeholder');
  if (ph) ph.style.display = 'none';
  if (window.innerWidth < 768) document.getElementById('main').scrollIntoView({behavior:'smooth'});
}

    distCounts[st] = (distCounts[st] || 0) + 1;
  });
  var total = tracking.length;
  var maxCount = Math.max(distCounts.opportunity || 0, distCounts.risk || 0, distCounts.dynamic || 0, 1);
  
  var distHtml = '';
  var distItems = [
    {key: 'opportunity', icon: '🟢', label: '机会', cls: 'opp'},
    {key: 'risk',        icon: '🔴', label: '风险', cls: 'risk'},
    {key: 'dynamic',     icon: '🟡', label: '动态', cls: 'dyn'}
  ];
  distItems.forEach(function(d) {
    var cnt = distCounts[d.key] || 0;
    var pct = total > 0 ? Math.round(cnt / total * 100) : 0;
    var barW = maxCount > 0 ? Math.round(cnt / maxCount * 100) : 0;
    distHtml += '<div class="rp-dist-row">' +
      '<span class="rp-dist-icon">' + d.icon + '</span>' +
      '<span class="rp-dist-label">' + d.label + '</span>' +
      '<div class="rp-dist-bar"><div class="rp-dist-bar-fill ' + d.cls + '" style="width:' + barW + '%"></div></div>' +
      '<span class="rp-dist-count">' + cnt + '</span>' +
      '</div>';
  });
  document.getElementById('rpDist').innerHTML = distHtml;
  
  // Part 2: Latest signals (all customers, time-ordered DESC, max 20)
  var sorted = tracking.slice().sort(function(a, b) {
    return (b.week_start || '').localeCompare(a.week_start || '');
  });
  var top20 = sorted.slice(0, 20);
  
  var sigHtml = '';
  top20.forEach(function(t) {
    var cid = nameToId[t.customer_name];
    var icon = '📡';
    var st = t.signal_type || 'none';
    if (st === 'opportunity') icon = '💡';
    else if (st === 'risk') icon = '⚠️';
    else if (st === 'dynamic') icon = '📊';
    
    sigHtml += '<div class="rp-sig-item" onclick="selectCustomer(' + (cid || 0) + ')" title="' + esc(t.customer_name||'') + '">' +
      '<span class="rp-sig-date">' + esc(t.week_start||'') + '</span>' +
      '<span class="rp-sig-icon">' + icon + '</span>' +
      '<div class="rp-sig-body">' +
        '<div class="rp-sig-cust">' + esc(t.customer_name||'') + '</div>' +
        '<div class="rp-sig-summary">' + esc(t.signal_summary||'') + '</div>' +
      '</div>' +
      '</div>';
  });
  document.getElementById('rpSignals').innerHTML = sigHtml || '<p style="color:var(--muted);font-size:12px">暂无信号</p>';
  
  // Part 3: Top 5 active customers by signal count
  var custCounts = {};
  tracking.forEach(function(t) {
    var cn = t.customer_name;
    custCounts[cn] = (custCounts[cn] || 0) + 1;
  });
  var ranked = Object.keys(custCounts).map(function(name) {
    return {name: name, count: custCounts[name]};
  }).sort(function(a, b) { return b.count - a.count; }).slice(0, 5);
  
  var topHtml = '';
  ranked.forEach(function(r, i) {
    var cid = nameToId[r.name];
    var rankCls = i < 3 ? ' top3' : '';
    topHtml += '<div class="rp-cust-row" onclick="selectCustomer(' + (cid || 0) + ')">' +
      '<span class="rp-cust-rank' + rankCls + '">' + (i + 1) + '</span>' +
      '<span class="rp-cust-name">' + esc(r.name) + '</span>' +
      '<span class="rp-cust-count">' + r.count + '</span>' +
      '</div>';
  });
  document.getElementById('rpTopCusts').innerHTML = topHtml || '<p style="color:var(--muted);font-size:12px">暂无数据</p>';
}

renderList();
renderRightPanel();
</script>
</body>
</html>
