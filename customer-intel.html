<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客户情报扫描 — 曼尼投研工具箱</title>
<style>
:root{--bg:#0a0e1a;--surface:#111827;--surface2:#1a2035;--border:#1e293b;--text:#e2e8f0;--muted:#94a3b8;--accent:#3b82f6;--green:#10b981;--red:#ef4444;--orange:#f59e0b;--purple:#8b5cf6;--gold:#fbbf24;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;overflow:hidden;height:100vh}
a{color:var(--accent);text-decoration:none}

/* ── KPI Bar ── */
.kpi-bar{display:flex;gap:16px;padding:16px 24px;border-bottom:1px solid var(--border);background:var(--surface)}
.kpi-card{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;display:flex;align-items:center;gap:14px;transition:.2s}
.kpi-card:hover{border-color:var(--accent);transform:translateY(-1px)}
.kpi-icon{font-size:28px;width:48px;height:48px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.kpi-icon.customers{background:rgba(59,130,246,.15);color:var(--accent)}
.kpi-icon.signals{background:rgba(139,92,246,.15);color:var(--purple)}
.kpi-icon.opportunities{background:rgba(16,185,129,.15);color:var(--green)}
.kpi-icon.urgent{background:rgba(239,68,68,.15);color:var(--red);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.kpi-info{min-width:0}
.kpi-value{font-size:26px;font-weight:700;line-height:1.1}
.kpi-label{font-size:12px;color:var(--muted);margin-top:2px}

/* ── Main Layout ── */
.layout{display:flex;height:calc(100vh - 113px)}
.sidebar{width:260px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--surface)}
.sidebar-header{padding:16px;border-bottom:1px solid var(--border)}
.sidebar-header h2{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px}
.sidebar-search{padding:12px 16px}
.sidebar-search input{width:100%;padding:8px 12px 8px 32px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;outline:none;transition:.2s}
.sidebar-search input:focus{border-color:var(--accent)}
.sidebar-search{position:relative}
.sidebar-search::before{content:'🔍';position:absolute;left:24px;top:50%;transform:translateY(-50%);font-size:12px;pointer-events:none}
.filter-pills{display:flex;gap:6px;padding:0 16px 12px;flex-wrap:wrap}
.filter-pills button{background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:4px 12px;border-radius:14px;cursor:pointer;font-size:12px;transition:.2s;font-family:inherit}
.filter-pills button:hover,.filter-pills button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.cust-list{flex:1;overflow-y:auto;padding:0 8px 8px}
.cust-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;transition:.15s;margin-bottom:1px;position:relative}
.cust-item:hover{background:var(--surface2)}
.cust-item.active{background:var(--surface2);border-left:3px solid var(--accent);padding-left:9px}
.cust-item .cust-score{font-size:11px;color:var(--gold);min-width:40px;text-align:center}
.cust-item .cust-info{flex:1;min-width:0}
.cust-item .cust-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cust-item .cust-industry{font-size:11px;color:var(--muted)}
.cust-item .cust-badge{background:var(--accent);color:#fff;font-size:10px;padding:1px 7px;border-radius:8px;min-width:22px;text-align:center;font-weight:600}
.cust-item .cust-badge.urgent{background:var(--red);animation:pulse 2s infinite}

/* ── Main Content ── */
.main{flex:1;overflow-y:auto;padding:24px;min-width:0}
.placeholder{text-align:center;padding:80px 20px;color:var(--muted)}
.placeholder h3{font-size:20px;margin-bottom:8px;color:var(--text)}
.placeholder p{font-size:14px}

/* Detail Panel */
.detail-panel{}
.detail-header{margin-bottom:24px}
.detail-header h2{font-size:24px;font-weight:700;margin-bottom:8px}
.detail-badges{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:4px}
.badge{font-size:11px;padding:3px 10px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--muted)}
.badge.industry{color:var(--accent);border-color:rgba(59,130,246,.3)}
.badge.group{color:var(--purple)}
.stars{font-size:15px;margin-top:4px}

/* Breakthrough card */
.bt-card{background:linear-gradient(135deg,rgba(251,191,36,.1),rgba(251,191,36,.03));border:1px solid rgba(251,191,36,.35);border-radius:var(--radius);padding:16px 20px;margin-bottom:24px}
.bt-title{font-size:14px;font-weight:700;color:var(--gold);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.bt-text{font-size:14px;line-height:1.7;color:var(--text)}

/* Info Grid */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px}
.info-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.info-card label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px}
.info-card .val{font-size:13px;line-height:1.6}
.info-card code{background:var(--surface2);padding:2px 7px;border-radius:4px;font-size:11px;color:var(--accent);display:inline-block;margin:2px 3px 2px 0}

/* Signal Timeline */
.section-title{font-size:16px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.signal-item{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;font-size:13px;transition:.15s}
.signal-item:hover{border-color:var(--accent)}
.signal-item .sig-date{color:var(--muted);font-size:11px;min-width:80px;white-space:nowrap}
.signal-item .sig-icon{font-size:15px;min-width:22px;text-align:center}
.signal-item .sig-body{flex:1;min-width:0}
.signal-item .sig-summary{color:var(--muted);line-height:1.5}
.signal-item .sig-source{font-size:11px;color:var(--muted);margin-top:2px}

/* ── Right Panel ── */
.right-panel{width:320px;flex-shrink:0;border-left:1px solid var(--border);overflow-y:auto;padding:16px;background:var(--surface)}
.rp-section{margin-bottom:20px}
.rp-section h3{font-size:13px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.rp-dist-row{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:12px}
.rp-dist-icon{min-width:18px;text-align:center}
.rp-dist-label{min-width:30px;color:var(--muted)}
.rp-dist-count{min-width:30px;text-align:right;font-weight:600}
.rp-dist-bar{flex:1;height:5px;background:var(--surface2);border-radius:3px;overflow:hidden}
.rp-dist-fill{height:100%;border-radius:3px;transition:width .4s}
.rp-dist-fill.opp{background:var(--green)}.rp-dist-fill.risk{background:var(--red)}.rp-dist-fill.dyn{background:var(--orange)}

.rp-cust{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;cursor:pointer;font-size:12px;transition:.15s}
.rp-cust:hover{background:var(--surface2)}
.rp-cust .rc-rank{min-width:16px;text-align:center;font-weight:700;color:var(--muted);font-size:11px}
.rp-cust .rc-rank.top3{color:var(--gold)}
.rp-cust .rc-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rp-cust .rc-count{color:var(--accent);font-weight:600;font-size:12px}

.rp-sig{font-size:11px;padding:6px 8px;border-radius:6px;cursor:pointer;transition:.15s;margin-bottom:3px;display:flex;gap:6px;align-items:flex-start}
.rp-sig:hover{background:var(--surface2)}
.rp-sig .rs-date{color:var(--muted);min-width:54px;white-space:nowrap;font-size:10px}
.rp-sig .rs-text{color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.rp-divider{border:none;border-top:1px solid var(--border);margin:12px 0}

/* AI Chat */
.ai-chat{border-top:1px solid var(--border);padding-top:12px}
.ai-chat h3{font-size:13px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.status-dot.online{background:var(--green);box-shadow:0 0 6px var(--green)}
.status-dot.offline{background:var(--muted)}
.ai-messages{max-height:220px;overflow-y:auto;margin-bottom:8px;font-size:12px}
.ai-msg{padding:6px 10px;border-radius:8px;margin-bottom:6px;line-height:1.5}
.ai-msg.user{background:var(--accent);color:#fff;margin-left:16px}
.ai-msg.assistant{background:var(--surface2);color:var(--text);margin-right:16px}
.ai-input-row{display:flex;gap:6px}
.ai-input-row input{flex:1;padding:6px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;outline:none}
.ai-input-row input:focus{border-color:var(--accent)}
.ai-input-row button{background:var(--accent);color:#fff;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-family:inherit;transition:.2s}
.ai-input-row button:hover{background:#2563eb}
.ai-input-row button:disabled{opacity:.5;cursor:not-allowed}
.typing{display:flex;gap:4px;padding:6px 10px}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:typing 1.4s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes typing{0%,60%,100%{opacity:.3}30%{opacity:1}}

/* Footer */
.ft{text-align:center;padding:24px;color:var(--muted);font-size:11px;border-top:1px solid var(--border);background:var(--surface)}
.ft a{color:var(--accent)}

/* No selection */
.no-selection{text-align:center;padding:80px 20px;color:var(--muted)}

/* Responsive */
@media(max-width:768px){
  .layout{flex-direction:column}
  .sidebar{width:100%;height:auto;max-height:40vh;border-right:none;border-bottom:1px solid var(--border)}
  .right-panel{width:100%;border-left:none;border-top:1px solid var(--border)}
  .info-grid{grid-template-columns:1fr}
  .kpi-bar{flex-wrap:wrap}
  .kpi-card{min-width:calc(50% - 8px)}
}
</style>
</head>

<!-- KPI Bar -->
<div class="kpi-bar">
  <div class="kpi-card"><div class="kpi-icon customers">🏢</div><div class="kpi-info"><div class="kpi-value" id="kpiTotal">22</div><div class="kpi-label">核心客户</div></div></div>
  <div class="kpi-card"><div class="kpi-icon signals">📡</div><div class="kpi-info"><div class="kpi-value" id="kpiSignals">45</div><div class="kpi-label">追踪信号</div></div></div>
  <div class="kpi-card"><div class="kpi-icon opportunities">💡</div><div class="kpi-info"><div class="kpi-value" id="kpiOpp" style="color:var(--green)">0</div><div class="kpi-label">机会信号</div></div></div>
  <div class="kpi-card"><div class="kpi-icon urgent">🔴</div><div class="kpi-info"><div class="kpi-value" id="kpiUrgent" style="color:var(--red)">0</div><div class="kpi-label">紧急预警</div></div></div>
</div>

<!-- Three-Column Layout -->
<div class="layout">
  <!-- Left: Customer List -->
  <div class="sidebar">
    <div class="sidebar-header"><h2><a href="index.html" style="color:var(--muted);font-size:14px">←</a> 🎯 客户情报</h2></div>
    <div class="sidebar-search"><input type="text" id="searchBox" placeholder="搜索客户或行业..." oninput="filterAll()"></div>

      <button class="active" data-filter="all">全部</button>
      <button data-filter="opportunity">💡 机会</button>
      <button data-filter="risk">⚠️ 风险</button>
      <button data-filter="dynamic">📊 动态</button>
    </div>
    <div class="cust-list" id="custList"></div>
  </div>

  <!-- Middle: Detail -->
  <div class="main" id="mainContent">
    <div class="no-selection" id="noSelection">
      <h3 style="font-size:18px;color:var(--text);margin-bottom:8px">👈 选择客户查看详情</h3>
      <p>22家核心客户 · 45条追踪信号 · 持续监控中</p>
    </div>
    <div class="detail-panel" id="detailPanel" style="display:none"></div>
  </div>

  <!-- Right: Intelligence + AI -->
  <div class="right-panel">
    <div class="rp-section"><h3>📊 信号分布</h3><div id="rpDist"></div></div>
    <hr class="rp-divider">
    <div class="rp-section"><h3>🔥 活跃客户 Top5</h3><div id="rpTopCusts"></div></div>
    <hr class="rp-divider">
    <div class="rp-section"><h3>📡 最新信号</h3><div id="rpLatestSignals"></div></div>
    <div class="ai-chat">
      <h3>🤖 AI 销售助手 <span class="status-dot" id="aiStatusDot"></span> <span style="font-size:10px;color:var(--muted)" id="aiStatusText">检测中...</span></h3>
      <div class="ai-messages" id="aiMessages">
        <div class="ai-msg assistant">👋 你好！我是AI销售助手，可以帮你分析客户信号、寻找商机突破口。</div>
      </div>
      <div class="ai-input-row">
        <input type="text" id="aiInput" placeholder="输入问题..." onkeydown="if(event.key==='Enter')sendMsg()">
        <button id="aiSendBtn" onclick="sendMsg()">发送</button>
      </div>
    </div>
  </div>
</div>

<footer class="ft"><p>客户情报扫描 · <a href="index.html">曼尼投研工具箱</a> · 数据来源: Metaso每周外部信号扫描 · <span id="ftUpdate"></span></p></footer>

<script>
// ── Wait for data injection ──
document.addEventListener('DOMContentLoaded', function(){
  var dataEl = document.getElementById('customer-data');
  if (!dataEl || !dataEl.textContent.trim()) {
    console.error('No customer data found');
    return;
  }
  var raw = dataEl.textContent.trim();
  try {
    window.CUST_DATA = JSON.parse(raw);
    init();
  } catch(e) {
    console.error('Data parse error:', e, raw.substring(0,200));
  }
});

function init(){
var C = window.CUST_DATA;
var customers = C.customers || [];
var tracking = C.tracking || [];

// Build lookup
var custMap = {};
customers.forEach(function(c){ custMap[c.name] = c; });

// Stats
var oppCount = tracking.filter(function(t){return t.signal_type==='opportunity';}).length;
var riskCount = tracking.filter(function(t){return t.signal_type==='risk';}).length;
var dynCount = tracking.filter(function(t){return t.signal_type==='dynamic';}).length;
var urgentCount = tracking.filter(function(t){return t.alert;}).length;
document.getElementById('kpiOpp').textContent = oppCount;
document.getElementById('kpiUrgent').textContent = urgentCount;
document.getElementById('kpiSignals').textContent = tracking.length;
document.getElementById('kpiTotal').textContent = customers.length;
document.getElementById('ftUpdate').textContent = tracking.length > 0 ? '最新: ' + tracking.sort(function(a,b){return (b.week_start||'').localeCompare(a.week_start||'');})[0].week_start : '';

var currentFilter = 'all';
var selectedCust = null;

// Helpers
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function sigIcon(st){if(st==='opportunity')return'💡';if(st==='risk')return'⚠️';if(st==='dynamic')return'📊';return'📡';}

// ── Customer List ──
function renderCustList(){
  var q = (document.getElementById('searchBox').value||'').toLowerCase();
  var custCounts = {};
  tracking.forEach(function(t){ custCounts[t.customer_name] = (custCounts[t.customer_name]||0)+1; });
  
  var html = '';
  customers.forEach(function(c){
    if (q && c.name.toLowerCase().indexOf(q) < 0 && (c.industry||'').toLowerCase().indexOf(q) < 0) return;
    var cnt = custCounts[c.name] || 0;
    if (currentFilter !== 'all') {
      var hasType = tracking.some(function(t){ return t.customer_name === c.name && t.signal_type === currentFilter; });
      if (!hasType) return;
    }
    var stars = '';
    for (var i=1;i<=5;i++) stars += i <= (c.strat_score||0) ? '★' : '☆';
    var isUrgent = tracking.some(function(t){ return t.customer_name === c.name && t.alert; });
    html += '<div class="cust-item'+(selectedCust&&selectedCust.id===c.id?' active':'')+'" onclick="selectCust('+c.id+')">';
    html += '<span class="cust-score">'+stars+'</span>';
    html += '<span class="cust-info"><span class="cust-name">'+esc(c.name)+'</span><span class="cust-industry">'+esc(c.industry||'')+'</span></span>';
    html += '<span class="cust-badge'+(isUrgent?' urgent':'')+'">'+cnt+'</span>';
    html += '</div>';
  });
  document.getElementById('custList').innerHTML = html || '<div style="padding:16px;color:var(--muted);font-size:13px">无匹配客户</div>';
}

// ── Select Customer ──
function selectCust(id){
  selectedCust = customers.find(function(c){ return c.id === id; });
  if (!selectedCust) return;
  document.getElementById('noSelection').style.display = 'none';
  var panel = document.getElementById('detailPanel');
  panel.style.display = 'block';
  
  var c = selectedCust;
  var tracks = tracking.filter(function(t){ return t.customer_name === c.name; }).sort(function(a,b){ return (b.week_start||'').localeCompare(a.week_start||''); });
  
  var stars = '';
  for (var i=1;i<=5;i++) stars += i <= (c.strat_score||0) ? '★' : '☆';
  var sc = c.strat_score >= 4 ? 'var(--gold)' : c.strat_score >= 2 ? 'var(--accent)' : 'var(--muted)';
  
  var html = '';
  // Header
  html += '<div class="detail-header"><h2>'+esc(c.name)+'</h2>';
  html += '<div class="detail-badges">';
  if (c.industry) html += '<span class="badge industry">'+esc(c.industry)+'</span>';
  if (c.group_tag) html += '<span class="badge group">'+esc(c.group_tag)+'类</span>';
  html += '</div><div class="stars" style="color:'+sc+'">'+stars+' ('+(c.strat_score||0)+'/5)</div></div>';
  
  // Breakthrough
  if (c.notes) {
    html += '<div class="bt-card"><div class="bt-title">🎯 联系突破口 / 商机突破点</div><div class="bt-text">'+esc(c.notes).replace(/\[$/,'')+'</div></div>';
  }
  
  // Info Grid
  html += '<div class="info-grid">';
  html += '<div class="info-card"><label>公司概况</label><div class="val">'+esc(c.company_profile||'-')+'</div></div>';
  html += '<div class="info-card"><label>主营产品</label><div class="val">'+esc(c.main_products||'-')+'</div></div>';
  html += '<div class="info-card"><label>市场地位</label><div class="val">'+esc(c.market_position||'-')+'</div></div>';
  html += '<div class="info-card"><label>供应链</label><div class="val">'+esc(c.supply_chain||'-')+'</div></div>';
  html += '<div class="info-card"><label>合作历史</label><div class="val">'+esc(c.coop_history||'-')+'</div></div>';
  html += '<div class="info-card"><label>竞争对手</label><div class="val">'+esc(c.competitors||'-')+'</div></div>';
  html += '<div class="info-card"><label>关键联系人</label><div class="val">'+esc(c.org_key_people||'-')+'</div></div>';
  html += '<div class="info-card"><label>监控关键词</label><div class="val">';
  (c.monitor_keywords||'').split(/\s+/).forEach(function(kw){ if(kw) html += '<code>'+esc(kw)+'</code> '; });
  html += '</div></div></div>';
  
  // Signal Timeline
  html += '<div class="section-title">📡 信号追踪 ('+tracks.length+'条)</div>';
  if (tracks.length === 0) {
    html += '<div style="color:var(--muted);font-size:13px">暂无追踪信号</div>';
  } else {
    tracks.forEach(function(t){
      var st = t.signal_type || 'none';
      html += '<div class="signal-item"><span class="sig-date">'+esc(t.week_start||'')+'</span><span class="sig-icon">'+sigIcon(st)+'</span><div class="sig-body"><div class="sig-summary">'+esc(t.signal_summary||'')+'</div>'+(t.source?'<div class="sig-source">📡 '+esc(t.source)+'</div>':'')+'</div></div>';
    });
  }
  
  panel.innerHTML = html;
  document.getElementById('mainContent').scrollTop = 0;
  renderCustList();
}

// ── Right Panel ──
function renderRightPanel(){
  // Distribution
  var counts = {opportunity:0, risk:0, dynamic:0};
  tracking.forEach(function(t){ var st = t.signal_type||''; if (counts[st] !== undefined) counts[st]++; });
  var total = tracking.length;
  var maxC = Math.max(counts.opportunity, counts.risk, counts.dynamic, 1);
  var items = [
    {key:'opportunity',icon:'💡',label:'机会',cls:'opp'},
    {key:'risk',icon:'⚠️',label:'风险',cls:'risk'},
    {key:'dynamic',icon:'📊',label:'动态',cls:'dyn'}
  ];
  var html = '';
  items.forEach(function(d){
    var cnt = counts[d.key];
    var pct = total>0 ? Math.round(cnt/total*100) : 0;
    var barW = maxC>0 ? Math.round(cnt/maxC*100) : 0;
    html += '<div class="rp-dist-row"><span class="rp-dist-icon">'+d.icon+'</span><span class="rp-dist-label">'+d.label+'</span><div class="rp-dist-bar"><div class="rp-dist-fill '+d.cls+'" style="width:'+barW+'%"></div></div><span class="rp-dist-count">'+cnt+' <span style="font-size:10px;color:var(--muted)">'+pct+'%</span></span></div>';
  });
  document.getElementById('rpDist').innerHTML = html;
  
  // Top 5
  var custCounts = {};
  tracking.forEach(function(t){ custCounts[t.customer_name] = (custCounts[t.customer_name]||0)+1; });
  var ranked = Object.keys(custCounts).map(function(n){ return {name:n, count:custCounts[n]}; }).sort(function(a,b){ return b.count-a.count; }).slice(0,5);
  var topHtml = '';
  ranked.forEach(function(r,i){
    var cid = customers.find(function(c){ return c.name === r.name; });
    topHtml += '<div class="rp-cust" onclick="selectCust('+(cid?cid.id:0)+')"><span class="rc-rank'+(i<3?' top3':'')+'">'+(i+1)+'</span><span class="rc-name">'+esc(r.name)+'</span><span class="rc-count">'+r.count+'</span></div>';
  });
  document.getElementById('rpTopCusts').innerHTML = topHtml;
  
  // Latest signals
  var latest = tracking.slice().sort(function(a,b){ return (b.week_start||'').localeCompare(a.week_start||''); }).slice(0,10);
  var sigHtml = '';
  latest.forEach(function(t){
    var cid = customers.find(function(c){ return c.name === t.customer_name; });
    sigHtml += '<div class="rp-sig" onclick="selectCust('+(cid?cid.id:0)+')"><span class="rs-date">'+esc(t.week_start||'')+'</span><span class="rs-text">'+sigIcon(t.signal_type)+' '+esc(t.signal_summary||'').substring(0,40)+'</span></div>';
  });
  document.getElementById('rpLatestSignals').innerHTML = sigHtml;
}

// ── AI Chat ──
var API_KEY = 'sk-9cd2150c397f4294934ef02d7cb15822';  // Will be injected
var apiOnline = false;

function initAI(key){
  API_KEY = key;
  fetch('https://api.deepseek.com/v1/models', {
    headers: {'Authorization': 'Bearer ' + API_KEY},
    signal: AbortSignal.timeout(5000)
  })
  .then(function(r){
    if (r.ok) { apiOnline = true; setAIStatus(true); }
    else { setAIStatus(false); }
  })
  .catch(function(){ setAIStatus(false); });
}

function setAIStatus(online){
  var dot = document.getElementById('aiStatusDot');
  var txt = document.getElementById('aiStatusText');
  if (online) { dot.className = 'status-dot online'; txt.textContent = 'DeepSeek 在线'; }
  else { dot.className = 'status-dot offline'; txt.textContent = '离线'; }
}

function addMsg(role, content){
  var d = document.createElement('div');
  d.className = 'ai-msg ' + role;
  d.innerHTML = content;
  var c = document.getElementById('aiMessages');
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
}

function addTyping(){
  var d = document.createElement('div');
  d.className = 'ai-msg assistant';
  d.id = 'typingInd';
  d.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  document.getElementById('aiMessages').appendChild(d);
}

function rmTyping(){
  var el = document.getElementById('typingInd');
  if (el) el.remove();
}

function simpleMD(text){
  return (text||'')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\n/g,'<br>')
    .replace(/^- (.+)/gm,'• $1');
}

function getMock(q){
  q = (q||'').toLowerCase();
  if (/杉川|机器人/.test(q)) return '**杉川机器人** 2026年爆发增长（1-4月=2025全年8.4倍），高毛利30%，全球高端扫地机器人市占率30%。💡 建议：优先保障康盈供应，拓展普冉交叉销售。';
  if (/紧急|风险/.test(q)) return '当前有 <strong>'+urgentCount+'条</strong>紧急信号：南昌同兴达（亏损4258万）、杭州觅睿（净利降55%）。⚠️ 建议优先联系这两家了解情况。';
  if (/机会|商机/.test(q)) return '当前有 <strong>'+oppCount+'条</strong>机会信号。韶音科技发布新品（Shokz Day）、广和通收购航盛电子、舜宇IoT布局加速。💡 筛选「机会」标签查看详情。';
  return '我可以帮你：\n• 分析客户信号动态\n• 识别商机突破点\n• 评估合作风险\n• 制定联系策略\n\n请告诉我你想了解哪个客户或哪类信号？';
}

function sendMsg(){
  var inp = document.getElementById('aiInput');
  var btn = document.getElementById('aiSendBtn');
  var q = inp.value.trim();
  if (!q) return;
  inp.value = ''; inp.disabled = true; btn.disabled = true;
  addMsg('user', esc(q));
  addTyping();
  
  if (!apiOnline) {
    setTimeout(function(){
      rmTyping();
      addMsg('assistant', simpleMD(getMock(q)));
      inp.disabled = false; btn.disabled = false; inp.focus();
    }, 600 + Math.random()*400);
    return;
  }
  
  var sysCtx = '你是客户情报AI助手。';
  if (selectedCust) {
    sysCtx += '当前选中客户：'+selectedCust.name+'，行业：'+(selectedCust.industry||'')+'，评分：'+(selectedCust.strat_score||0)+'/5。';
    sysCtx += '概况：'+(selectedCust.company_profile||'')+'。供应链：'+(selectedCust.supply_chain||'')+'。备注：'+(selectedCust.notes||'');
  }
  sysCtx += '\n客户总数：'+customers.length+'，信号总数：'+tracking.length+'，紧急：'+urgentCount+'，机会：'+oppCount+'。请用中文简洁回答。';
  
  fetch('https://api.deepseek.com/v1/chat/completions', {
    method: 'POST',
    headers: {'Content-Type':'application/json','Authorization':'Bearer '+API_KEY},
    body: JSON.stringify({model:'deepseek-v4-flash',messages:[{role:'system',content:sysCtx},{role:'user',content:q}],max_tokens:600,temperature:0.7}),
    signal: AbortSignal.timeout(30000)
  })
  .then(function(r){ return r.json(); })
  .then(function(d){
    rmTyping();
    var content = (d.choices&&d.choices[0]&&d.choices[0].message&&d.choices[0].message.content) || '抱歉，未获取到回复。';
    addMsg('assistant', simpleMD(content));
  })
  .catch(function(e){
    rmTyping();
    console.error('AI error:', e);
    addMsg('assistant', simpleMD(getMock(q)));
  })
  .finally(function(){
    inp.disabled = false; btn.disabled = false; inp.focus();
  });
}

// ── Render ──
renderCustList();
renderRightPanel();
  initAI(API_KEY);
}

      window.CUST_DATA = JSON.parse(dataEl.textContent.trim());
      init();

  }
}
