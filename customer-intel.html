<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客户商机雷达 — 曼尼投研工具箱</title>
<style>
:root{--bg:#0a0e1a;--card:#111827;--card2:#1a2035;--border:#1e293b;--text:#e2e8f0;--muted:#94a3b8;--blue:#3b82f6;--green:#10b981;--red:#ef4444;--orange:#f59e0b;--purple:#8b5cf6;--cyan:#06b6d4;--gold:#fbbf24}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;overflow:hidden}
/* ── Top Bar ── */
.top{position:sticky;top:0;z-index:200;background:rgba(10,14,26,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:16px}
.top a{color:var(--muted);text-decoration:none;font-size:14px;transition:.2s}
.top a:hover{color:var(--text)}
.top h1{font-size:18px;font-weight:700;background:linear-gradient(135deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.top .stat{font-size:12px;color:var(--muted);margin-left:auto}
.top .stat b{color:var(--text)}
.top .stat .urgent{color:var(--red);font-weight:700}
.top .stat .opp{color:var(--green);font-weight:700}
/* ── Main Grid ── */
.wrap{display:flex;height:calc(100vh - 52px);position:relative}
/* Signal Feed */
.feed{flex:1;overflow-y:auto;padding:20px 24px;min-width:0}
.feed-header{margin-bottom:16px}
/* Filter pills */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.filters button{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:7px 16px;border-radius:20px;cursor:pointer;font-size:13px;transition:.2s;font-family:inherit}
.filters button:hover{border-color:var(--blue);color:var(--text)}
.filters button.active{background:var(--blue);color:#fff;border-color:var(--blue)}
/* Signal Cards */
.signal-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px;transition:.2s;cursor:default;position:relative;overflow:hidden;display:flex;gap:12px}
.signal-card:hover{border-color:var(--blue);transform:translateY(-1px);box-shadow:0 4px 20px rgba(59,130,246,.1)}
.signal-card .urgency-bar{width:4px;border-radius:2px;flex-shrink:0}
.signal-card .urgency-bar.opportunity{background:var(--green)}
.signal-card .urgency-bar.risk{background:var(--red)}
.signal-card .urgency-bar.dynamic{background:var(--orange)}
.signal-card .urgency-bar.none{background:var(--blue)}
.signal-card .card-body{flex:1;min-width:0}
.signal-card .card-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.signal-card .sig-icon{font-size:16px}
.signal-card .cust-name{font-weight:600;font-size:15px;color:var(--text)}
.signal-card .industry-badge{font-size:11px;background:var(--card2);border:1px solid var(--border);padding:2px 8px;border-radius:10px;color:var(--cyan)}
.signal-card .alert-badge{font-size:11px;background:rgba(239,68,68,.15);color:var(--red);padding:2px 8px;border-radius:10px;font-weight:600}
.signal-card .sig-summary{color:var(--muted);font-size:13px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:8px}
.signal-card .notes-hint{font-size:12px;background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.3);border-radius:6px;padding:4px 10px;color:var(--gold);margin-bottom:8px;display:inline-block}
.signal-card .sig-meta{display:flex;align-items:center;gap:12px;font-size:11px;color:var(--muted)}
.signal-card .sig-meta span{display:inline-flex;align-items:center;gap:4px}
.signal-card .btn-detail{margin-top:10px;background:var(--card2);border:1px solid var(--border);color:var(--blue);padding:6px 14px;border-radius:8px;cursor:pointer;font-size:12px;transition:.2s;font-family:inherit}
.signal-card .btn-detail:hover{background:var(--blue);color:#fff;border-color:var(--blue)}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);font-size:15px}
/* ── Right Panel ── */
.right-panel{width:340px;flex-shrink:0;border-left:1px solid var(--border);overflow-y:auto;padding:16px;background:var(--card);display:flex;flex-direction:column;gap:16px}
.right-panel .search-box{width:100%;padding:10px 14px;background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;outline:none;font-family:inherit}
.right-panel .search-box:focus{border-color:var(--blue)}
.right-panel .section-title{font-size:12px;color:var(--muted);margin-bottom:8px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
/* Quick customer list */
.quick-cust{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:.15s;border:1px solid transparent;font-size:13px}
.quick-cust:hover{background:var(--card2);border-color:var(--border)}
.quick-cust.active{background:var(--card2);border-color:var(--blue)}
.quick-cust .qc-name{flex:1;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.quick-cust .qc-count{color:var(--blue);font-weight:600;font-size:12px;background:var(--bg);padding:2px 8px;border-radius:10px;min-width:24px;text-align:center}
/* Distribution bar */
.dist-row{display:flex;align-items:center;gap:10px;padding:5px 0;font-size:12px}
.dist-row .dist-icon{font-size:14px;min-width:22px;text-align:center}
.dist-row .dist-label{min-width:30px;color:var(--muted)}
.dist-row .dist-count{min-width:30px;text-align:right;font-weight:600;color:var(--text)}
.dist-row .dist-bar{flex:1;height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
.dist-row .dist-bar-fill{height:100%;border-radius:3px;transition:width .4s}
.dist-row .dist-bar-fill.opp{background:var(--green)}
.dist-row .dist-bar-fill.risk{background:var(--red)}
.dist-row .dist-bar-fill.dyn{background:var(--orange)}
.divider{border:none;border-top:1px solid var(--border)}
/* ── AI Chat ── */
.ai-chat{border-top:1px solid var(--border);padding-top:12px;display:flex;flex-direction:column;flex-shrink:0}
.ai-chat .chat-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.ai-chat .chat-title{font-size:13px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:6px}
.ai-chat .status-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.ai-chat .status-dot.online{background:var(--green);box-shadow:0 0 6px var(--green)}
.ai-chat .status-dot.offline{background:var(--muted)}
.ai-chat .status-text{font-size:11px;color:var(--muted)}
.ai-chat .chat-msgs{max-height:280px;overflow-y:auto;margin-bottom:8px;display:flex;flex-direction:column;gap:8px}
.ai-chat .msg{font-size:12px;padding:8px 12px;border-radius:10px;line-height:1.5;max-width:95%}
.ai-chat .msg.user{background:var(--blue);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.ai-chat .msg.assistant{background:var(--card2);color:var(--text);align-self:flex-start;border-bottom-left-radius:4px}
.ai-chat .msg.assistant p{margin-bottom:4px}
.ai-chat .msg.assistant p:last-child{margin-bottom:0}
.ai-chat .msg.assistant code{background:rgba(255,255,255,.1);padding:1px 5px;border-radius:3px;font-size:11px}
.ai-chat .msg.assistant strong{color:var(--green)}
.ai-chat .msg .typing{display:flex;gap:4px;padding:4px 0}
.ai-chat .msg .typing span{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:typingBounce 1.4s infinite ease-in-out}
.ai-chat .msg .typing span:nth-child(2){animation-delay:.15s}
.ai-chat .msg .typing span:nth-child(3){animation-delay:.3s}
@keyframes typingBounce{0%,60%,100%{transform:translateY(0);opacity:.3}30%{transform:translateY(-8px);opacity:1}}
.ai-chat .chat-input-row{display:flex;gap:8px}
.ai-chat .chat-input{flex:1;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;outline:none;font-family:inherit}
.ai-chat .chat-input:focus{border-color:var(--blue)}
.ai-chat .chat-send{background:var(--blue);color:#fff;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;transition:.2s;font-family:inherit;white-space:nowrap}
.ai-chat .chat-send:hover{opacity:.9}
.ai-chat .chat-send:disabled{opacity:.5;cursor:not-allowed}
/* ── Slide-out Panel ── */
.slide-panel{position:fixed;top:0;right:-500px;width:480px;max-width:100vw;height:100vh;z-index:300;background:var(--bg);border-left:1px solid var(--border);transition:right .35s cubic-bezier(.4,0,.2,1);overflow-y:auto;box-shadow:-8px 0 30px rgba(0,0,0,.5)}
.slide-panel.open{right:0}
.slide-panel .panel-inner{padding:24px}
.slide-panel .panel-close{position:sticky;top:16px;float:right;z-index:10;width:36px;height:36px;border-radius:50%;background:var(--card);border:1px solid var(--border);color:var(--muted);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
.slide-panel .panel-close:hover{background:var(--red);color:#fff;border-color:var(--red)}
.slide-panel .panel-header{margin-bottom:20px}
.slide-panel .panel-header h2{font-size:22px;font-weight:700;margin-bottom:8px}
.slide-panel .panel-badges{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.slide-panel .score{font-size:16px;margin-top:4px}
.slide-panel .breakthrough{background:linear-gradient(135deg,rgba(251,191,36,.12),rgba(251,191,36,.04));border:1px solid rgba(251,191,36,.4);border-radius:12px;padding:14px 16px;margin-bottom:20px}
.slide-panel .breakthrough .bt-title{font-size:13px;font-weight:700;color:var(--gold);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.slide-panel .breakthrough .bt-content{font-size:14px;color:var(--text);line-height:1.6}
.slide-panel .info-section{margin-bottom:14px}
.slide-panel .info-section label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px}
.slide-panel .info-section .info-value{font-size:14px;line-height:1.6;color:var(--text)}
.slide-panel .info-section code,.slide-panel .keywords{background:var(--card2);padding:2px 8px;border-radius:4px;font-size:12px;color:var(--blue);display:inline-block;margin:2px 4px 2px 0}
.slide-panel .cust-signals{margin-top:16px}
.slide-panel .cust-signals h3{font-size:15px;font-weight:700;margin-bottom:10px}
.slide-panel .mini-signal{font-size:12px;padding:8px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;display:flex;gap:8px;align-items:flex-start}
.slide-panel .mini-signal .ms-date{color:var(--muted);min-width:75px;font-size:11px}
.slide-panel .mini-signal .ms-icon{font-size:14px}
.slide-panel .mini-signal .ms-body{flex:1;color:var(--muted)}
/* ── Overlay ── */
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:250;opacity:0;pointer-events:none;transition:opacity .3s}
.overlay.show{opacity:1;pointer-events:auto}
/* ── Scrollbar ── */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:var(--muted)}
/* ── Responsive ── */
@media(max-width:768px){
    .right-panel{display:none}
    .feed{padding:16px}
    .slide-panel{width:100vw;right:-100vw}
    .top{padding:12px 16px}
    .top h1{font-size:15px}
    .top .stat{display:none}
}
</style>
</head>

<div class="top">

    <h1>🎯 客户商机雷达</h1>

</div>
<div class="wrap">

    <div class="feed" id="feed">
        <div class="feed-header">
            <div class="filters" id="filters">

                <button data-filter="opportunity">💡 机会</button>
                <button data-filter="risk">⚠️ 风险</button>
                <button data-filter="dynamic">📊 动态</button>
            </div>
        </div>
        <div id="signalList"></div>
    </div>
    <!-- Right Panel -->
    <div class="right-panel" id="rightPanel">
        <input type="text" class="search-box" id="searchBox" placeholder="🔍 搜索客户或信号...">
        <div>

            <div id="quickCustList" style="max-height:200px;overflow-y:auto"></div>
        </div>
        <hr class="divider">
        <div>
            <div class="section-title">📊 信号分布</div>
            <div id="distStats"></div>
        </div>
        <hr class="divider">
        <!-- AI Chat -->
        <div class="ai-chat" id="aiChat">
            <div class="chat-header">
                <div class="chat-title">🤖 AI 销售助手</div>
                <div style="display:flex;align-items:center;gap:6px">
                    <span class="status-dot" id="aiStatusDot"></span>
                    <span class="status-text" id="aiStatusText">检测中...</span>

            </div>
            <div class="chat-msgs" id="chatMessages">

            </div>
            <div class="chat-input-row">
                <input type="text" class="chat-input" id="chatInput" placeholder="输入问题..." onkeydown="if(event.key==='Enter')sendMessage()">
                <button class="chat-send" id="chatSendBtn" onclick="sendMessage()">发送</button>
            </div>
        </div>
    </div>
</div>
<!-- Slide-out Customer Detail Panel -->
<div class="overlay" id="overlay" onclick="closePanel()"></div>
<div class="slide-panel" id="slidePanel">
    <button class="panel-close" onclick="closePanel()" title="关闭">✕</button>
    <div class="panel-inner" id="panelContent"></div>
</div>

<script>
// ── Load Data ──
var DATA = JSON.parse(document.getElementById('customer-data').textContent);
var customers = DATA.customers || [];
var tracking = DATA.tracking || [];
console.log('Customers:', customers.length, 'Signals:', tracking.length);

// ── Helper ──
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// Build customer lookup
var custByName = {};
customers.forEach(function(c){custByName[c.name] = c;});

// ── Filter state ──
var currentFilter = 'all';
var selectedCustId = null;

// ── Top Bar Stats ──
var urgentCount = tracking.filter(function(t){return t.alert;}).length;
var oppCount = tracking.filter(function(t){return t.signal_type === 'opportunity';}).length;
document.getElementById('topstat').innerHTML = '<b>'+customers.length+'</b>家客户 · <b>'+tracking.length+'</b>条信号 · <span class="urgent">🔴'+urgentCount+'紧急</span> · <span class="opp">💡'+oppCount+'机会</span>';

// ── Get signal icon ──
function sigIcon(st){if(st==='opportunity')return'💡';if(st==='risk')return'⚠️';if(st==='dynamic')return'📊';return'📡';}
function sigColor(st){if(st==='opportunity')return'var(--green)';if(st==='risk')return'var(--red)';if(st==='dynamic')return'var(--orange)';return'var(--blue)';}
function sigCls(st){if(st==='opportunity')return'opportunity';if(st==='risk')return'risk';if(st==='dynamic')return'dynamic';return'none';}

// ── Check notes for opportunity keywords ──
function hasOppNotes(c){
    if(!c||!c.notes)return null;
    var n=c.notes;var hints=[];
    if(/增长|爆发|突破|翻倍|高速|8\.4|放量|起飞/.test(n))hints.push('📈 高速增长');
    if(/高毛利|利润率|盈利/.test(n))hints.push('💰 高毛利');
    if(/建议/.test(n)){var m=n.match(/建议[：:](.+?)(?:[。，\[]|$)/);if(m)hints.push('💡 '+m[1].trim());else hints.push('💡 有突破建议');}
    if(hints.length===0)return null;
    return hints.join(' · ');
}

// ── Render Signal Feed ──
function renderSignals(){
    var q = (document.getElementById('searchBox').value||'').toLowerCase();
    var sorted = tracking.slice().sort(function(a,b){
        return (b.week_start||'').localeCompare(a.week_start||'');
    });
    var html='';
    var count=0;
    sorted.forEach(function(t){
        if(currentFilter!=='all' && t.signal_type!==currentFilter)return;
        if(q && (t.customer_name||'').toLowerCase().indexOf(q)<0 && (t.signal_summary||'').toLowerCase().indexOf(q)<0)return;
        count++;
        var st=t.signal_type||'none';
        var c=custByName[t.customer_name];
        var notesHint=hasOppNotes(c);
        html+='<div class="signal-card">';
        html+='<div class="urgency-bar '+sigCls(st)+'"></div>';
        html+='<div class="card-body">';
        html+='<div class="card-header">';
        html+='<span class="sig-icon">'+sigIcon(st)+'</span>';
        if(t.alert)html+='<span class="alert-badge">🔴 紧急</span>';
        html+='<span class="cust-name">'+esc(t.customer_name||'')+'</span>';
        if(c&&c.industry)html+='<span class="industry-badge">'+esc(c.industry)+'</span>';
        html+='</div>';
        html+='<div class="sig-summary">'+esc(t.signal_summary||'')+'</div>';
        if(notesHint)html+='<div class="notes-hint">💼 '+notesHint+'</div>';
        html+='<div class="sig-meta">';
        html+='<span>📅 '+esc(t.week_start||'')+'</span>';
        if(t.source)html+='<span>📡 '+esc(t.source)+'</span>';
        html+='</div>';
        if(c)html+='<button class="btn-detail" onclick="openPanel('+c.id+')">查看详情 →</button>';
        html+='</div></div>';
    });
    if(count===0)html='<div class="empty-state">📭 暂无匹配信号</div>';
    document.getElementById('signalList').innerHTML=html;
}

// ── Filter Pills ──
document.getElementById('filters').addEventListener('click',function(e){
    if(e.target.tagName==='BUTTON'){
        document.querySelectorAll('#filters button').forEach(function(b){b.classList.remove('active');});
        e.target.classList.add('active');
        currentFilter=e.target.dataset.filter;
        renderSignals();
        renderQuickList();
    }
});

// ── Search ──
document.getElementById('searchBox').addEventListener('input',function(){
    renderSignals();
    renderQuickList();
});

// ── Quick Customer List ──
function renderQuickList(){
    var q=(document.getElementById('searchBox').value||'').toLowerCase();
    var custCounts={};
    tracking.forEach(function(t){custCounts[t.customer_name]=(custCounts[t.customer_name]||0)+1;});
    // Show only customers with signals, sorted by count desc
    var ranked=customers.map(function(c){return{id:c.id,name:c.name,industry:c.industry,count:custCounts[c.name]||0};});
    if(q)ranked=ranked.filter(function(r){return r.name.toLowerCase().indexOf(q)>=0||(r.industry||'').toLowerCase().indexOf(q)>=0;});
    ranked.sort(function(a,b){return b.count-a.count;});
    var html='';
    ranked.forEach(function(r){
        html+='<div class="quick-cust'+(r.id===selectedCustId?' active':'')+'" onclick="openPanel('+r.id+')">';
        html+='<span class="qc-name">'+esc(r.name)+'</span>';
        html+='<span class="qc-count">'+r.count+'</span>';
        html+='</div>';
    });
    if(!html)html='<div style="font-size:12px;color:var(--muted);padding:8px">无匹配客户</div>';
    document.getElementById('quickCustList').innerHTML=html;
}

// ── Distribution Stats ──
function renderDist(){
    var counts={opportunity:0,risk:0,dynamic:0,none:0};
    tracking.forEach(function(t){var st=t.signal_type||'none';counts[st]=(counts[st]||0)+1;});
    var total=tracking.length;
    var maxC=Math.max(counts.opportunity||0,counts.risk||0,counts.dynamic||0,1);
    var items=[
        {key:'opportunity',icon:'💡',label:'机会',cls:'opp'},
        {key:'risk',icon:'⚠️',label:'风险',cls:'risk'},
        {key:'dynamic',icon:'📊',label:'动态',cls:'dyn'}
    ];
    var html='';
    items.forEach(function(d){
        var cnt=counts[d.key]||0;
        var pct=total>0?Math.round(cnt/total*100):0;
        var barW=maxC>0?Math.round(cnt/maxC*100):0;
        html+='<div class="dist-row"><span class="dist-icon">'+d.icon+'</span><span class="dist-label">'+d.label+'</span><div class="dist-bar"><div class="dist-bar-fill '+d.cls+'" style="width:'+barW+'%"></div></div><span class="dist-count">'+cnt+' <span style="font-size:10px;color:var(--muted)">'+pct+'%</span></span></div>';
    });
    document.getElementById('distStats').innerHTML=html;
}

// ── Slide-out Customer Detail Panel ──
function openPanel(id){
    var c=customers.find(function(x){return x.id===id;});
    if(!c)return;
    selectedCustId=id;
    var tracks=tracking.filter(function(t){return t.customer_name===c.name;}).sort(function(a,b){return(b.week_start||'').localeCompare(a.week_start||'');});
    var ss=c.strat_score||0;
    var stars='';
    for(var i=1;i<=5;i++)stars+=i<=ss?'★':'☆';
    var sc='#f59e0b';if(ss<4)sc='#3b82f6';if(ss<2)sc='#64748b';

    // Extract breakthrough from notes
    var notesHint=hasOppNotes(c);
    var notesText=c.notes||'';

    var html='';
    html+='<div class="panel-header"><h2>'+esc(c.name)+'</h2>';
    html+='<div class="panel-badges">';
    if(c.industry)html+='<span class="industry-badge">'+esc(c.industry)+'</span>';
    if(c.group_tag)html+='<span class="industry-badge">'+esc(c.group_tag)+'</span>';
    html+='</div>';
    html+='<div class="score" style="color:'+sc+'">'+stars+' ('+ss+'/5)</div>';
    html+='</div>';

    // Breakthrough callout
    if(notesText){
        html+='<div class="breakthrough"><div class="bt-title">🎯 联系突破口 / 商机突破点</div><div class="bt-content">'+esc(notesText).replace(/\[$/,'')+'</div></div>';
    }

    html+='<div class="info-section"><label>公司概况</label><div class="info-value">'+esc(c.company_profile||'-')+'</div></div>';
    html+='<div class="info-section"><label>主营产品</label><div class="info-value">'+esc(c.main_products||'-')+'</div></div>';
    html+='<div class="info-section"><label>市场地位</label><div class="info-value">'+esc(c.market_position||'-')+'</div></div>';
    html+='<div class="info-section"><label>供应链</label><div class="info-value">'+esc(c.supply_chain||'-')+'</div></div>';
    html+='<div class="info-section"><label>合作历史</label><div class="info-value">'+esc(c.coop_history||'-')+'</div></div>';
    html+='<div class="info-section"><label>竞争对手</label><div class="info-value">'+esc(c.competitors||'-')+'</div></div>';
    html+='<div class="info-section"><label>关键联系人</label><div class="info-value">'+esc(c.org_key_people||'-')+'</div></div>';
    html+='<div class="info-section"><label>监控关键词</label><div>';
    (c.monitor_keywords||'').split(/\s+/).forEach(function(kw){if(kw)html+='<code>'+esc(kw)+'</code> ';});
    html+='</div></div>';

    // Customer signals in panel
    html+='<div class="cust-signals"><h3>📡 该客户全部信号 ('+tracks.length+'条)</h3>';
    if(tracks.length===0){
        html+='<div style="color:var(--muted);font-size:13px">暂无追踪信号</div>';
    }else{
        tracks.forEach(function(t){
            var st=t.signal_type||'none';
            html+='<div class="mini-signal"><span class="ms-date">'+esc(t.week_start||'')+'</span><span class="ms-icon">'+sigIcon(st)+'</span><span class="ms-body">'+esc(t.signal_summary||'')+(t.source?' <span style="color:var(--muted)">· '+esc(t.source)+'</span>':'')+'</span></div>';
        });
    }
    html+='</div>';

    document.getElementById('panelContent').innerHTML=html;
    document.getElementById('slidePanel').classList.add('open');
    document.getElementById('overlay').classList.add('show');
    document.body.style.overflow='hidden';
    renderQuickList();
}

function closePanel(){
    document.getElementById('slidePanel').classList.remove('open');
    document.getElementById('overlay').classList.remove('show');
    document.body.style.overflow='';
    selectedCustId=null;
    renderQuickList();
}

function setAIStatus(online){
    var dot=document.getElementById('aiStatusDot');
    var txt=document.getElementById('aiStatusText');
    if(online){dot.className='status-dot online';txt.textContent='DeepSeek 在线';}
    else{dot.className='status-dot offline';txt.textContent='AI助手离线';}
}

function buildSystemPrompt(){
    var ctx='你是客户商机雷达的AI销售助手。以下是当前上下文数据：\n';
    if(selectedCustId){
        var c=customers.find(function(x){return x.id===selectedCustId;});
        if(c){
            ctx+='\n当前选中客户：'+c.name;
            ctx+='\n行业：'+(c.industry||'未知');
            ctx+='\n公司概况：'+(c.company_profile||'无');
            ctx+='\n主营产品：'+(c.main_products||'无');
            ctx+='\n供应链：'+(c.supply_chain||'无');
            ctx+='\n合作历史：'+(c.coop_history||'无');
            ctx+='\n战略评分：'+(c.strat_score||0)+'/5';
            ctx+='\n商机备注：'+(c.notes||'无');
            var ct=tracking.filter(function(t){return t.customer_name===c.name;});
            ctx+='\n该客户信号数：'+ct.length;
            if(ct.length>0){
                ctx+='\n最近信号：';
                var sorted=ct.slice().sort(function(a,b){return(b.week_start||'').localeCompare(a.week_start||'');});
                sorted.slice(0,5).forEach(function(t,i){
                    ctx+='\n  '+(i+1)+'. ['+t.signal_type+'] '+t.signal_summary+' ('+t.week_start+')';
                });
            }
        }
    }
    var f=currentFilter;
    if(f&&f!=='all'){
        var ft=tracking.filter(function(t){return t.signal_type===f;});
        ctx+='\n当前筛选信号类型：'+f+'（共'+ft.length+'条）';
    }
    ctx+='\n全部客户数：'+customers.length+'，全部信号数：'+tracking.length;
    ctx+='\n紧急信号数：'+tracking.filter(function(t){return t.alert;}).length;
    ctx+='\n机会信号数：'+tracking.filter(function(t){return t.signal_type==='opportunity';}).length;
    ctx+='\n风险信号数：'+tracking.filter(function(t){return t.signal_type==='risk';}).length;
    ctx+='\n\n请帮助销售人员分析客户信号、识别商机、提供联系客户的突破建议。';
    ctx+='回答简洁有力，用中文。使用Markdown格式（**粗体**、`代码`、列表）。';
    return ctx;
}

function addMsg(role,content){
    var div=document.createElement('div');
    div.className='msg '+role;
    div.innerHTML=content;
    var container=document.getElementById('chatMessages');
    container.appendChild(div);
    container.scrollTop=container.scrollHeight;
}

function addTyping(){
    var div=document.createElement('div');
    div.className='msg assistant';
    div.innerHTML='<div class="typing"><span></span><span></span><span></span></div>';
    div.id='typingIndicator';
    var container=document.getElementById('chatMessages');
    container.appendChild(div);
    container.scrollTop=container.scrollHeight;
}

function removeTyping(){
    var el=document.getElementById('typingIndicator');
    if(el)el.remove();
}

function simpleMarkdown(text){
    if(!text)return'';
    return text
        .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
        .replace(/`([^`]+)`/g,'<code>$1</code>')
        .replace(/\n/g,'<br>')
        .replace(/^- (.+)/gm,'• $1');
}

function getMockResponse(question){
    var q=(question||'').toLowerCase();
    if(/杉川|机器人|增长/.test(q)){
        return '**杉川机器人** 2026年表现极为亮眼：\n\n• 2026年1-4月业绩已达2025全年的**8.4倍**\n• 高毛利（30%），康盈芯片为主供应商\n• 全球高端扫地机器人市占率**30%**\n• 年产能超850万台\n\n💡 **商机突破建议**：优先保障康盈DRAM/NAND供应，探索普冉NOR Flash交叉销售机会。杉川放量确定性强，建议密切关注其产能扩充节奏。';
    }
    if(/紧急|风险|alert/.test(q)){
        var urgent=tracking.filter(function(t){return t.alert;});
        if(urgent.length===0)return '当前**无紧急信号**，所有客户信号正常。建议持续关注监控关键词变化。';
        var names=urgent.map(function(t){return t.customer_name;}).filter(function(v,i,a){return a.indexOf(v)===i;});
        return '当前有**'+urgent.length+'条紧急信号**，涉及以下客户：\n\n'+names.map(function(n){return'• **'+n+'**';}).join('\n')+'\n\n⚠️ 建议优先联系这些客户，了解最新动态并评估合作风险。';
    }
    if(/机会|商机|突破/.test(q)){
        var opp=tracking.filter(function(t){return t.signal_type==='opportunity';});
        var top=opp.slice().sort(function(a,b){return(b.week_start||'').localeCompare(a.week_start||'');}).slice(0,5);
        var resp='当前共有 **'+opp.length+'条机会信号**。最近的商机包括：\n\n';
        top.forEach(function(t){resp+='• ['+t.week_start+'] **'+esc(t.customer_name||'')+'**：'+esc(t.signal_summary||'').substring(0,60)+'...\n';});
        resp+='\n💡 筛选"💡 机会"标签可查看全部机会信号。';
        return resp;
    }
    if(/高创|京东方|BOE/.test(q)){
        return '**高创(苏州)电子** 是京东方全资子公司，2025-2026年合作从无到爆发增长：\n\n• 纯康盈线，高毛利（**42%**）\n• 年营收80亿+，存储芯片采购需求大\n• 需确认：增长可持续性、排他协议、京东方采购决策链\n\n💡 **建议**：巩固康盈优势地位，了解京东方集团层面采购机制，争取更多份额。';
    }
    return '感谢你的提问！我可以帮你分析：\n\n• **客户信号动态**：了解任何客户的追踪信号\n• **商机识别**：发现高价值突破点\n• **风险评估**：关注紧急和风险信号\n• **策略建议**：基于数据的联系建议\n\n请告诉我你想了解哪个客户或哪种类型的信号？';
}

function sendMessage(){
    var input=document.getElementById('chatInput');
    var btn=document.getElementById('chatSendBtn');
    var question=input.value.trim();
    if(!question)return;
    input.value='';
    input.disabled=true;
    btn.disabled=true;
    addMsg('user',esc(question));
    addTyping();

    if(!apiOnline){
        setTimeout(function(){
            removeTyping();
            var resp=getMockResponse(question);
            addMsg('assistant',simpleMarkdown(resp));
            input.disabled=false;
            btn.disabled=false;
            input.focus();
        },800+Math.random()*600);
        return;
    }

    var sysPrompt=buildSystemPrompt();
    var messages=[
        {role:'system',content:sysPrompt},
        {role:'user',content:question}
    ];

    fetch(API_BASE+'/v1/chat/completions',{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+API_KEY},
        body:JSON.stringify({model:API_MODEL,messages:messages,max_tokens:800,temperature:0.7}),
        signal:AbortSignal.timeout(30000)
    })
    .then(function(r){return r.json();})
    .then(function(data){
        removeTyping();
        var content=(data.choices&&data.choices[0]&&data.choices[0].message&&data.choices[0].message.content)||'抱歉，未获取到回复。';
        addMsg('assistant',simpleMarkdown(content));
    })
    .catch(function(err){
        removeTyping();
        console.error('AI error:',err);
        var resp=getMockResponse(question);
        addMsg('assistant',simpleMarkdown(resp));
    })
    .finally(function(){
        input.disabled=false;
        btn.disabled=false;
        input.focus();
    });
}
