<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客户情报扫描中心</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:#f5f6f8;color:#1f2937;font-size:14px;line-height:1.5}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}
::-webkit-scrollbar-track{background:transparent}

.topbar{height:56px;background:#fff;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:50}
.topbar .brand{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:700;color:#111827}
.topbar .brand .dot{width:8px;height:8px;border-radius:50%;background:#2563eb}
.topbar .actions{display:flex;align-items:center;gap:12px}
.btn{padding:6px 14px;border-radius:6px;border:1px solid #e5e7eb;background:#fff;color:#374151;font-size:13px;cursor:pointer;transition:all .15s}
.btn:hover{border-color:#d1d5db;background:#f9fafb}
.btn-primary{background:#2563eb;color:#fff;border-color:#2563eb}
.btn-primary:hover{background:#1d4ed8}

.news-ticker{display:flex;align-items:center;height:42px;background:linear-gradient(90deg,#0f172a 0%,#1e293b 50%,#0f172a 100%);overflow:hidden;border-bottom:1px solid #334155}
.ticker-label{flex-shrink:0;background:#dc2626;color:#fff;padding:0 16px;height:100%;display:flex;align-items:center;font-size:12px;font-weight:700;gap:5px;letter-spacing:.6px}
.ticker-scroll{flex:1;overflow:hidden;position:relative;mask-image:linear-gradient(90deg,transparent 0,#000 20px,#000 calc(100% - 20px),transparent 100%)}
.ticker-track{display:flex;gap:0;white-space:nowrap;animation:ticker-scroll 120s linear infinite}
.ticker-track:hover{animation-play-state:paused}
.ticker-item{display:inline-flex;align-items:center;gap:6px;padding:0 18px;color:#cbd5e1;font-size:12px;cursor:pointer;flex-shrink:0}
.ticker-item:hover{color:#fff}
.ticker-sep{color:#475569;margin:0 4px;font-size:8px;opacity:.5}
.ticker-cat{font-size:10px;padding:1px 6px;border-radius:3px;font-weight:600;flex-shrink:0}
.ticker-cat-opportunity{background:rgba(34,197,94,.18);color:#4ade80}
.ticker-cat-risk{background:rgba(239,68,68,.18);color:#f87171}
.ticker-cat-dynamic{background:rgba(59,130,246,.18);color:#60a5fa}
.ticker-cat-alert{background:rgba(245,158,11,.2);color:#fbbf24}
.ticker-cust{color:#94a3b8;font-weight:600;flex-shrink:0}
.ticker-summary{color:#e2e8f0}
.ticker-link{color:#64748b;text-decoration:none;font-size:11px;flex-shrink:0;transition:color .15s}
.ticker-link:hover{color:#fbbf24}
@keyframes ticker-scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

.kpi-bar{display:flex;gap:16px;padding:16px 24px;background:#fff;border-bottom:1px solid #e5e7eb;overflow-x:auto}
.kpi-card{flex:1;min-width:140px;padding:14px 18px;border-radius:10px;background:#f8fafc;border:1px solid #e2e8f0;display:flex;flex-direction:column;gap:4px}
.kpi-card .label{font-size:12px;color:#64748b;text-transform:uppercase;letter-spacing:.4px}
.kpi-card .value{font-size:24px;font-weight:700;color:#0f172a}
.kpi-card .sub{font-size:12px;color:#94a3b8}
.kpi-card.accent-blue{border-color:#bfdbfe;background:#eff6ff}
.kpi-card.accent-blue .value{color:#2563eb}
.kpi-card.accent-green{border-color:#bbf7d0;background:#f0fdf4}
.kpi-card.accent-green .value{color:#16a34a}
.kpi-card.accent-amber{border-color:#fde68a;background:#fffbeb}
.kpi-card.accent-amber .value{color:#d97706}
.kpi-card.accent-rose{border-color:#fecdd3;background:#fff1f2}
.kpi-card.accent-rose .value{color:#e11d48}

.layout{display:flex;height:calc(100vh - 56px - 42px - 73px);overflow:hidden}

.sidebar{width:260px;background:#fff;border-right:1px solid #e5e7eb;display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:16px;border-bottom:1px solid #f3f4f6}
.search-box{width:100%;padding:8px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:13px;outline:none;transition:border .15s}
.search-box:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.08)}
.filter-pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.pill{padding:4px 10px;border-radius:999px;border:1px solid #e5e7eb;font-size:12px;color:#4b5563;cursor:pointer;transition:all .15s;background:#fff}
.pill:hover{border-color:#d1d5db}
.pill.active{background:#2563eb;color:#fff;border-color:#2563eb}
.pill .count{margin-left:4px;font-size:11px;opacity:.8}
.customer-list{flex:1;overflow-y:auto;padding:8px}
.customer-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;transition:background .12s;margin-bottom:2px}
.customer-item:hover{background:#f3f4f6}
.customer-item.active{background:#eff6ff}
.customer-item .avatar{width:32px;height:32px;border-radius:8px;background:#e0e7ff;color:#2563eb;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.customer-item .info{min-width:0}
.customer-item .name{font-size:13px;font-weight:600;color:#111827;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.customer-item .meta{font-size:11px;color:#6b7280;margin-top:1px}
.customer-item .badge{padding:1px 6px;border-radius:4px;font-size:10px;font-weight:600;margin-left:auto;flex-shrink:0}
.badge-A{background:#fecaca;color:#991b1b}
.badge-B{background:#fed7aa;color:#9a3412}
.badge-C{background:#bfdbfe;color:#1e3a8a}
.badge-D{background:#e5e7eb;color:#374151}

.main{flex:1;overflow-y:auto;padding:20px 24px;background:#f5f6f8;min-width:0}
.main-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.main-header h2{font-size:16px;font-weight:700;color:#111827}
.back-btn{display:none;align-items:center;gap:6px;color:#2563eb;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:12px}
.back-btn:hover{text-decoration:underline}

.signal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.signal-card{background:#fff;border-radius:12px;border:1px solid #e5e7eb;overflow:hidden;cursor:pointer;transition:box-shadow .15s,transform .15s}
.signal-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.06);transform:translateY(-1px)}
.signal-card .bar{height:3px}
.signal-card .body{padding:14px 16px}
.signal-card .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.signal-card .customer{font-size:13px;font-weight:700;color:#111827}
.signal-card .industry{font-size:11px;color:#6b7280;background:#f3f4f6;padding:2px 8px;border-radius:4px}
.signal-card .summary{font-size:13px;color:#374151;line-height:1.6;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.signal-card .foot{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:#9ca3af}
.signal-card .source{display:flex;align-items:center;gap:4px}
.signal-card .date{font-size:11px}
.signal-card .trend{font-size:13px;font-weight:700}

.type-none .bar{background:#9ca3af}
.type-opportunity .bar{background:#22c55e}
.type-dynamic .bar{background:#2563eb}
.type-risk .bar{background:#ef4444}
.type-alert .bar{background:#f59e0b}

.detail-header{background:#fff;border-radius:12px;border:1px solid #e5e7eb;padding:20px;margin-bottom:16px}
.detail-header .row{display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
.detail-header .title{font-size:18px;font-weight:700;color:#111827}
.detail-header .subtitle{font-size:13px;color:#6b7280;margin-top:4px}
.detail-header .tags{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.tag{padding:3px 10px;border-radius:6px;font-size:12px;font-weight:500}
.tag-blue{background:#dbeafe;color:#1e40af}
.tag-green{background:#d1fae5;color:#065f46}
.tag-purple{background:#ede9fe;color:#5b21b6}

.opportunity-card{background:linear-gradient(135deg,#eff6ff 0%,#fff 100%);border:1px solid #bfdbfe;border-radius:12px;padding:16px;margin-bottom:16px}
.opportunity-card h3{font-size:14px;font-weight:700;color:#1e40af;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.opportunity-card p{font-size:13px;color:#334155;line-height:1.6}

.info-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.info-cell{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:14px}
.info-cell .label{font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.info-cell .value{font-size:13px;color:#111827;font-weight:500;line-height:1.5}

.timeline{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:16px}
.timeline h3{font-size:14px;font-weight:700;color:#111827;margin-bottom:12px}
.timeline-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid #f3f4f6}
.timeline-item:last-child{border-bottom:none}
.timeline-dot{width:8px;height:8px;border-radius:50%;margin-top:6px;flex-shrink:0}
.timeline-content{flex:1}
.timeline-content .text{font-size:13px;color:#374151;line-height:1.5}
.timeline-content .time{font-size:11px;color:#9ca3af;margin-top:2px}

.right{width:320px;background:#fff;border-left:1px solid #e5e7eb;display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
.right-section{padding:16px;border-bottom:1px solid #f3f4f6}
.right-section h3{font-size:13px;font-weight:700;color:#111827;margin-bottom:12px;text-transform:uppercase;letter-spacing:.4px}

.chart-flex{display:flex;align-items:center;gap:16px}
.donut{width:80px;height:80px;border-radius:50%;position:relative;flex-shrink:0}
.donut-inner{position:absolute;inset:12px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#111827}
.legend{display:flex;flex-direction:column;gap:6px}
.legend-item{display:flex;align-items:center;gap:8px;font-size:12px;color:#4b5563}
.legend-dot{width:8px;height:8px;border-radius:2px}

.top5-list{display:flex;flex-direction:column;gap:8px}
.top5-row{display:flex;align-items:center;gap:10px}
.top5-rank{width:18px;text-align:center;font-size:11px;font-weight:700;color:#6b7280}
.top5-name{flex:1;font-size:12px;color:#111827;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top5-bar{flex:1;height:6px;background:#f3f4f6;border-radius:3px;overflow:hidden;max-width:80px}
.top5-fill{height:100%;background:#2563eb;border-radius:3px}
.top5-val{font-size:11px;color:#6b7280;width:20px;text-align:right}

.mini-signal{padding:8px;border-radius:8px;background:#f9fafb;margin-bottom:6px}
.mini-signal .text{font-size:12px;color:#374151;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.mini-signal .meta{font-size:11px;color:#9ca3af;margin-top:4px}

.ai-panel{display:flex;flex-direction:column;height:320px}
.ai-messages{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
.ai-msg{max-width:92%;padding:8px 12px;border-radius:10px;font-size:12px;line-height:1.5;word-break:break-word}
.ai-msg.user{align-self:flex-end;background:#2563eb;color:#fff}
.ai-msg.bot{align-self:flex-start;background:#f3f4f6;color:#1f2937;border:1px solid #e5e7eb}
.ai-input{display:flex;gap:8px}
.ai-input input{flex:1;padding:8px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:13px;outline:none}
.ai-input input:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.08)}
.ai-status{font-size:11px;color:#6b7280;margin-bottom:6px;display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none}
.status-dot{width:6px;height:6px;border-radius:50%;background:#9ca3af}
.status-dot.ok{background:#22c55e}
.status-dot.fail{background:#ef4444}

.empty-state{text-align:center;padding:60px 20px;color:#9ca3af}
.empty-state svg{width:48px;height:48px;margin-bottom:12px;opacity:.5}
.empty-state p{font-size:14px}

@media(max-width:1100px){
  .right{display:none}
  .layout{height:auto;flex-direction:column}
  .sidebar{width:100%;border-right:none;border-bottom:1px solid #e5e7eb;max-height:300px}
  .main{padding:16px}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand"><div class="dot"></div>客户情报扫描中心</div>
  <div class="actions">
    <button class="btn" onclick="exportData()">导出数据</button>
    <button class="btn btn-primary" onclick="refreshData()">刷新情报</button>
  </div>
</div>

<div class="news-ticker">
  <div class="ticker-label">📰 情报快讯</div>
  <div class="ticker-scroll">
    <div class="ticker-track" id="tickerTrack"></div>
  </div>
</div>

<div class="kpi-bar" id="kpi-bar">
  <div class="kpi-card accent-blue">
    <div class="label">客户总数</div>
    <div class="value" id="kpi-customers">0</div>
    <div class="sub">覆盖A-D四级</div>
  </div>
  <div class="kpi-card">
    <div class="label">追踪信号</div>
    <div class="value" id="kpi-signals">0</div>
    <div class="sub">近3周动态</div>
  </div>
  <div class="kpi-card accent-green">
    <div class="label">机会信号</div>
    <div class="value" id="kpi-opportunities">0</div>
    <div class="sub">可跟进商机</div>
  </div>
  <div class="kpi-card accent-rose">
    <div class="label">紧急/风险</div>
    <div class="value" id="kpi-alerts">0</div>
    <div class="sub">需立即关注</div>
  </div>
</div>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <input type="text" class="search-box" id="customer-search" placeholder="搜索客户名称..." oninput="searchCustomers(this.value)">
      <div class="filter-pills" id="filter-pills">
        <span class="pill active" onclick="filterByType('all')">全部<span class="count" id="count-all">0</span></span>
        <span class="pill" onclick="filterByType('opportunity')">机会<span class="count" id="count-opp">0</span></span>
        <span class="pill" onclick="filterByType('dynamic')">动态<span class="count" id="count-dyn">0</span></span>
        <span class="pill" onclick="filterByType('risk')">风险<span class="count" id="count-risk">0</span></span>
        <span class="pill" onclick="filterByType('none')">无信号<span class="count" id="count-none">0</span></span>
      </div>
    </div>
    <div class="customer-list" id="customer-list"></div>
  </aside>

  <main class="main" id="main-area">
    <div class="main-header">
      <h2 id="main-title">信号动态流</h2>
      <span style="font-size:12px;color:#9ca3af" id="main-subtitle">按日期倒序排列</span>
    </div>
    <div id="stream-view"></div>
    <div id="detail-view" style="display:none">
      <div class="back-btn" onclick="showStream()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>返回信号流</div>
      <div id="detail-content"></div>
    </div>
  </main>

  <aside class="right">
    <div class="right-section">
      <h3>信号分布</h3>
      <div class="chart-flex">
        <div class="donut" id="donut-chart">
          <div class="donut-inner" id="donut-text">0</div>
        </div>
        <div class="legend" id="signal-legend"></div>
      </div>
    </div>

    <div class="right-section">
      <h3>活跃客户 Top 5</h3>
      <div class="top5-list" id="top5-list"></div>
    </div>

    <div class="right-section">
      <h3>最新信号</h3>
      <div id="latest-signals"></div>
    </div>

    <div class="right-section" style="flex:1;display:flex;flex-direction:column">
      <h3>AI 销售助手</h3>
      <div class="ai-status" id="ai-status" onclick="handleStatusClick()" title="点击配置 API Key"><span class="status-dot" id="ai-dot"></span><span id="ai-status-text">检查中...</span></div>
      <div class="ai-panel">
        <div class="ai-messages" id="ai-messages">
          <div class="ai-msg bot">你好，我是你的AI销售助手。可以帮你分析客户情报、生成跟进策略或回答业务问题。</div>
        </div>
        <div class="ai-input">
          <input type="text" id="ai-input" placeholder="输入问题，按回车发送..." onkeydown="if(event.key==='Enter')sendAIMessage()">
          <button class="btn btn-primary" onclick="sendAIMessage()">发送</button>
        </div>
      </div>
    </div>
  </aside>

<script>
const SF_API_URL = 'https://api.siliconflow.cn/v1/chat/completions';
const SF_MODEL = 'deepseek-ai/DeepSeek-R1-0528-Qwen3-8B';
const SF_HEALTH_URL = 'https://api.siliconflow.cn/v1/models';

function getApiKey() {
  return localStorage.getItem('sf_api_key') || '';
}

function promptForKey() {
  var key = prompt('请输入 SiliconFlow API Key（注册: siliconflow.cn）：\n密钥仅存本地浏览器。');
  if (key && key.trim()) { localStorage.setItem('sf_api_key', key.trim()); return key.trim(); }
  return null;
}

let appData
let currentFilter = 'all';
let searchQuery = '';
let selectedCustomerId = null;
let aiHealthy = false;
let aiMockMode = false;

function init() {
  const raw = document.getElementById('customer-data').textContent;
  try {
    appData = JSON.parse(raw);
  } catch (e) {
    console.error('JSON parse error', e);
    document.getElementById('stream-view').innerHTML = '<div class="empty-state"><p>数据加载失败</p></div>';
    return;
  }
  processData();
  renderKPI();
  renderNewsTicker();
  renderCustomerList();
  renderStream();
  renderRightPanel();
  checkAIHealth();
}

function processData() {
  const custMap = {};
  appData.customers.forEach(function(c) { custMap[c.name] = c; });
  appData._custMap = custMap;

  appData.tracking.forEach(function(t) {
    t._customer = custMap[t.customer_name] || null;
    t._date = t.week_start;
  });

  appData.tracking.sort(function(a, b) {
    if (a._date !== b._date) return b._date.localeCompare(a._date);
    return b.id - a.id;
  });
}

function renderKPI() {
  const customers = appData.customers.length;
  const signals = appData.tracking.length;
  const opportunities = appData.tracking.filter(function(t) { return t.signal_type === 'opportunity'; }).length;
  const alerts = appData.tracking.filter(function(t) { return t.alert; }).length;
  document.getElementById('kpi-customers').textContent = customers;
  document.getElementById('kpi-signals').textContent = signals;
  document.getElementById('kpi-opportunities').textContent = opportunities;
  document.getElementById('kpi-alerts').textContent = alerts;
}

function renderNewsTicker() {
  const track = document.getElementById('tickerTrack');
  const signals = appData.tracking.filter(function(t) {
    return t.signal_type !== 'none' && t.signal_summary !== '本周无异常外部信号';
  });
  signals.sort(function(a, b) {
    return b._date.localeCompare(a._date) || (b.id - a.id);
  });
  const top = signals.slice(0, 25);

  if (top.length === 0) {
    track.innerHTML = '<span class="ticker-item" style="color:#94a3b8">📡 暂无实质情报信号</span>';
    return;
  }

  const iconMap = {risk: '🔴', alert: '🔴', opportunity: '💡', dynamic: '📊'};
  const catLabel = {opportunity: '机会', risk: '风险', dynamic: '动态', alert: '紧急'};
  const items = top.map(function(t) {
    const icon = iconMap[t.signal_type] || '📊';
    const label = catLabel[t.signal_type] || '动态';
    const summary = t.signal_summary.length > 45 ? t.signal_summary.substring(0, 45) + '…' : t.signal_summary;
    const hasSource = t.source && t.source.startsWith('http');
    const sourceHtml = hasSource
      ? '<a class=\"ticker-link\" href=\"' + escapeHtml(t.source) + '\" target=\"_blank\" onclick=\"event.stopPropagation()\" title=\"查看原文\">🔗</a>'
      : '';
    return '<span class=\"ticker-item\" onclick=\"showCustomerDetailByName(\'' + escapeJs(t.customer_name) + '\')\" data-customer-name=\"' + escapeHtml(t.customer_name) + '\">'
      + '<span class=\"ticker-cat ticker-cat-' + t.signal_type + '\">' + label + '</span>'
      + '<span class=\"ticker-cust\">' + escapeHtml(t.customer_name) + '</span>'
      + '<span class=\"ticker-summary\">' + escapeHtml(summary) + '</span>'
      + sourceHtml
      + '</span>';
  });

  var doubled = items.concat(items);
  track.innerHTML = doubled.join('<span class=\"ticker-sep\">✦</span>');
}

function renderCustomerList() {
  const list = document.getElementById('customer-list');
  const filtered = appData.customers.filter(function(c) {
    if (!searchQuery) return true;
    return c.name.toLowerCase().includes(searchQuery.toLowerCase());
  });

  let html = '';
  filtered.forEach(function(c) {
    const activeClass = selectedCustomerId === c.id ? ' active' : '';
    html += '<div class="customer-item' + activeClass + '" onclick="showCustomerDetail(' + c.id + ')">';
    html += '<div class="avatar">' + c.name.substring(0, 1) + '</div>';
    html += '<div class="info"><div class="name">' + escapeHtml(c.name) + '</div>';
    html += '<div class="meta">' + escapeHtml(c.industry) + ' · 战略' + c.strat_score + '</div></div>';
    html += '<span class="badge badge-' + c.group_tag + '">' + c.group_tag + '</span>';
    html += '</div>';
  });
  list.innerHTML = html || '<div class="empty-state" style="padding:20px"><p>无匹配客户</p></div>';
}

function renderStream() {
  const container = document.getElementById('stream-view');
  const view = document.getElementById('detail-view');
  container.style.display = 'block';
  view.style.display = 'none';
  document.getElementById('main-title').textContent = '信号动态流';
  document.getElementById('main-subtitle').textContent = '按日期倒序排列';
  document.querySelector('.back-btn').style.display = 'none';

  let signals = appData.tracking.filter(function(t) {
    if (currentFilter === 'all') return true;
    return t.signal_type === currentFilter;
  });

  if (signals.length === 0) {
    container.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 12h6m-3-3v6m-7 4h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg><p>暂无符合条件的信号</p></div>';
    return;
  }

  let html = '<div class="signal-grid">';
  signals.forEach(function(t) {
    const typeClass = t.alert ? 'type-alert' : ('type-' + t.signal_type);
    const cust = t._customer;
    const industry = cust ? cust.industry : '未知行业';
    const trendColor = t.trend_flag === '↑' ? '#16a34a' : (t.trend_flag === '↓' ? '#ef4444' : '#9ca3af');
    const sourceText = t.source ? ('<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:#2563eb;margin-right:4px"></span>' + escapeHtml(t.source)) : '<span style="color:#9ca3af">系统录入</span>';

    html += '<div class="signal-card ' + typeClass + '" onclick="showCustomerDetailByName(\'' + escapeJs(t.customer_name) + '\')">';
    html += '<div class="bar"></div>';
    html += '<div class="body">';
    html += '<div class="top">';
    html += '<span class="customer">' + escapeHtml(t.customer_name) + '</span>';
    html += '<span class="industry">' + escapeHtml(industry) + '</span>';
    html += '</div>';
    html += '<div class="summary">' + escapeHtml(t.signal_summary) + '</div>';
    html += '<div class="foot">';
    html += '<span class="source">' + sourceText + '</span>';
    html += '<span><span class="trend" style="color:' + trendColor + '">' + t.trend_flag + '</span> <span class="date">' + t._date + '</span></span>';
    html += '</div>';
    if (t.alert) {
      html += '<div style="margin-top:8px;padding:4px 8px;background:#fffbeb;border-radius:6px;font-size:12px;color:#b45309;font-weight:600;display:inline-block">' + t.alert + ' 需关注</div>';
    }
    html += '</div></div>';
  });
  html += '</div>';
  container.innerHTML = html;
}

function showStream() {
  selectedCustomerId = null;
  renderCustomerList();
  renderStream();
}

function showCustomerDetail(id) {
  selectedCustomerId = id;
  renderCustomerList();
  const customer = appData.customers.find(function(c) { return c.id === id; });
  if (!customer) return;
  renderCustomerDetail(customer);
}

function showCustomerDetailByName(name) {
  const customer = appData._custMap[name];
  if (!customer) return;
  selectedCustomerId = customer.id;
  renderCustomerList();
  renderCustomerDetail(customer);
}

function renderCustomerDetail(customer) {
  const container = document.getElementById('stream-view');
  const view = document.getElementById('detail-view');
  container.style.display = 'none';
  view.style.display = 'block';
  document.querySelector('.back-btn').style.display = 'flex';
  document.getElementById('main-title').textContent = customer.name;
  document.getElementById('main-subtitle').textContent = customer.industry + ' · ' + customer.group_tag + '类客户 · 战略分' + customer.strat_score;

  const custSignals = appData.tracking.filter(function(t) { return t.customer_name === customer.name; }).sort(function(a, b) { return b._date.localeCompare(a._date); });
  const latestSignal = custSignals.find(function(t) { return t.signal_type !== 'none'; });

  let html = '';

  html += '<div class="detail-header">';
  html += '<div class="row">';
  html += '<div>';
  html += '<div class="title">' + escapeHtml(customer.name) + '</div>';
  html += '<div class="subtitle">' + escapeHtml(customer.industry) + ' · 战略评分 ' + customer.strat_score + '/5 · ' + customer.group_tag + '类</div>';
  html += '<div class="tags">';
  html += '<span class="tag tag-blue">' + escapeHtml(customer.group_tag) + '类客户</span>';
  html += '<span class="tag tag-green">战略 ' + customer.strat_score + '</span>';
  if (latestSignal) {
    html += '<span class="tag tag-purple">最新: ' + escapeHtml(latestSignal.signal_type) + '</span>';
  }
  html += '</div>';
  html += '</div>';
  html += '</div>';
  html += '</div>';

  if (latestSignal && latestSignal.signal_type !== 'none') {
    html += '<div class="opportunity-card">';
    html += '<h3>最新商机突破口</h3>';
    html += '<p><strong>' + escapeHtml(latestSignal.signal_type) + '</strong> · ' + escapeHtml(latestSignal.signal_summary) + '</p>';
    html += '<p style="margin-top:6px;color:#64748b;font-size:12px">来源: ' + escapeHtml(latestSignal.source || '系统') + ' · ' + latestSignal._date + ' · 趋势 ' + latestSignal.trend_flag + '</p>';
    html += '</div>';
  }

  html += '<div class="info-grid">';
  html += '<div class="info-cell"><div class="label">主营产品</div><div class="value">' + escapeHtml(customer.main_products.substring(0, 80)) + (customer.main_products.length > 80 ? '...' : '') + '</div></div>';
  html += '<div class="info-cell"><div class="label">市场地位</div><div class="value">' + escapeHtml(customer.market_position.substring(0, 80)) + (customer.market_position.length > 80 ? '...' : '') + '</div></div>';
  html += '<div class="info-cell"><div class="label">供应链</div><div class="value">' + escapeHtml(customer.supply_chain.substring(0, 80)) + (customer.supply_chain.length > 80 ? '...' : '') + '</div></div>';
  html += '<div class="info-cell"><div class="label">合作历史</div><div class="value">' + escapeHtml(customer.coop_history) + '</div></div>';
  html += '<div class="info-cell"><div class="label">关键人</div><div class="value">' + escapeHtml(customer.org_key_people) + '</div></div>';
  html += '<div class="info-cell"><div class="label">竞对</div><div class="value">' + escapeHtml(customer.competitors) + '</div></div>';
  html += '<div class="info-cell"><div class="label">监控词</div><div class="value">' + escapeHtml(customer.monitor_keywords) + '</div></div>';
  html += '<div class="info-cell"><div class="label">备注</div><div class="value">' + escapeHtml(customer.notes.substring(0, 100)) + (customer.notes.length > 100 ? '...' : '') + '</div></div>';
  html += '</div>';

  html += '<div class="timeline">';
  html += '<h3>信号时间线 (' + custSignals.length + ' 条)</h3>';
  if (custSignals.length === 0) {
    html += '<p style="color:#9ca3af;font-size:13px">暂无追踪信号</p>';
  } else {
    custSignals.forEach(function(t) {
      const dotColor = t.alert ? '#f59e0b' : (t.signal_type === 'opportunity' ? '#22c55e' : (t.signal_type === 'risk' ? '#ef4444' : (t.signal_type === 'dynamic' ? '#2563eb' : '#9ca3af')));
      html += '<div class="timeline-item">';
      html += '<div class="timeline-dot" style="background:' + dotColor + '"></div>';
      html += '<div class="timeline-content">';
      html += '<div class="text"><strong>' + escapeHtml(t.signal_type) + '</strong> · ' + escapeHtml(t.signal_summary) + '</div>';
      html += '<div class="time">' + t._date + ' · ' + (t.source || '系统') + ' ' + (t.alert ? '· ' + t.alert : '') + '</div>';
      html += '</div></div>';
    });
  }
  html += '</div>';

  document.getElementById('detail-content').innerHTML = html;
}

function renderRightPanel() {
  const counts = {none: 0, opportunity: 0, dynamic: 0, risk: 0, alert: 0};
  appData.tracking.forEach(function(t) {
    counts[t.signal_type] = (counts[t.signal_type] || 0) + 1;
    if (t.alert) counts.alert++;
  });

  const total = appData.tracking.length;
  const labels = {opportunity: '机会', dynamic: '动态', risk: '风险', none: '无信号'};
  const colors = {opportunity: '#22c55e', dynamic: '#2563eb', risk: '#ef4444', none: '#9ca3af'};

  document.getElementById('count-all').textContent = total;
  document.getElementById('count-opp').textContent = counts.opportunity || 0;
  document.getElementById('count-dyn').textContent = counts.dynamic || 0;
  document.getElementById('count-risk').textContent = counts.risk || 0;
  document.getElementById('count-none').textContent = counts.none || 0;

  const donut = document.getElementById('donut-chart');
  const pNone = total ? (counts.none / total) : 0;
  const pOpp = total ? (counts.opportunity / total) : 0;
  const pDyn = total ? (counts.dynamic / total) : 0;
  const pRisk = total ? (counts.risk / total) : 0;
  const grad = 'conic-gradient(#9ca3af 0deg ' + (pNone * 360) + 'deg, #22c55e ' + (pNone * 360) + 'deg ' + ((pNone + pOpp) * 360) + 'deg, #2563eb ' + ((pNone + pOpp) * 360) + 'deg ' + ((pNone + pOpp + pDyn) * 360) + 'deg, #ef4444 ' + ((pNone + pOpp + pDyn) * 360) + 'deg 360deg)';
  donut.style.background = grad;
  document.getElementById('donut-text').textContent = total;

  let legendHtml = '';
  ['opportunity', 'dynamic', 'risk', 'none'].forEach(function(k) {
    legendHtml += '<div class="legend-item"><div class="legend-dot" style="background:' + colors[k] + '"></div><span>' + labels[k] + ' ' + counts[k] + '</span></div>';
  });
  document.getElementById('signal-legend').innerHTML = legendHtml;

  const custSignalCounts = {};
  appData.tracking.forEach(function(t) {
    if (t.signal_type !== 'none') {
      custSignalCounts[t.customer_name] = (custSignalCounts[t.customer_name] || 0) + 1;
    }
  });
  const top5 = Object.entries(custSignalCounts).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 5);
  const maxVal = top5.length ? top5[0][1] : 1;
  let top5Html = '';
  top5.forEach(function(item, idx) {
    const pct = (item[1] / maxVal) * 100;
    top5Html += '<div class="top5-row"><div class="top5-rank">' + (idx + 1) + '</div><div class="top5-name">' + escapeHtml(item[0]) + '</div><div class="top5-bar"><div class="top5-fill" style="width:' + pct + '%"></div></div><div class="top5-val">' + item[1] + '</div></div>';
  });
  document.getElementById('top5-list').innerHTML = top5Html || '<p style="font-size:12px;color:#9ca3af">暂无活跃信号</p>';

  const latest = appData.tracking.filter(function(t) { return t.signal_type !== 'none'; }).slice(0, 3);
  let latestHtml = '';
  latest.forEach(function(t) {
    latestHtml += '<div class="mini-signal"><div class="text"><strong>' + escapeHtml(t.customer_name) + '</strong> · ' + escapeHtml(t.signal_summary) + '</div><div class="meta">' + t._date + ' · ' + escapeHtml(t.signal_type) + '</div></div>';
  });
  document.getElementById('latest-signals').innerHTML = latestHtml || '<p style="font-size:12px;color:#9ca3af">暂无最新信号</p>';
}

function filterByType(type) {
  currentFilter = type;
  document.querySelectorAll('.pill').forEach(function(el) { el.classList.remove('active'); });
  const pills = document.querySelectorAll('.pill');
  for (let i = 0; i < pills.length; i++) {
    if (pills[i].textContent.includes(type === 'all' ? '全部' : (type === 'opportunity' ? '机会' : (type === 'dynamic' ? '动态' : (type === 'risk' ? '风险' : '无信号'))))) {
      pills[i].classList.add('active');
    }
  }
  showStream();
}

function searchCustomers(query) {
  searchQuery = query;
  renderCustomerList();
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function escapeJs(str) {
  if (!str) return '';
  return str.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"').replace(/\n/g, '\\n').replace(/\r/g, '\\r');
}

function exportData() {
  alert('导出功能开发中，数据已准备: ' + appData.customers.length + ' 客户, ' + appData.tracking.length + ' 信号');
}

function refreshData() {
  location.reload();
}

async function checkAIHealth() {
  const dot = document.getElementById('ai-dot');
  const txt = document.getElementById('ai-status-text');

  const key = getApiKey();
  if (!key) {
    dot.style.background = '#ef4444';
    txt.textContent = '请配置 API Key';
    aiHealthy = false;
    aiMockMode = true;
    return;
  }

  dot.style.background = '#f59e0b';
  txt.textContent = '检查中...';

  try {
    const resp = await fetch(SF_HEALTH_URL, {
      method: 'GET',
      headers: {'Authorization': 'Bearer ' + key},
      signal: AbortSignal.timeout(5000)
    });
    if (resp.ok) {
      dot.style.background = '#22c55e';
      txt.textContent = 'SiliconFlow 在线';
      aiHealthy = true;
      aiMockMode = false;
    } else {
      throw new Error('status ' + resp.status);
    }
  } catch (e) {
    dot.style.background = '#9ca3af';
    txt.textContent = 'API 不可达，已切换Mock模式';
    aiHealthy = false;
    aiMockMode = true;
  }
}

function handleStatusClick() {
  const key = promptForKey();
  if (key) {
    document.getElementById('ai-dot').style.background = '#f59e0b';
    document.getElementById('ai-status-text').textContent = '检测中...';
    checkAIHealth();
  }
}

function getAIContext() {
  const counts = {opportunity: 0, dynamic: 0, risk: 0};
  appData.tracking.forEach(function(t) { if (counts[t.signal_type] !== undefined) counts[t.signal_type]++; });
  const topCust = appData.customers.filter(function(c) { return c.strat_score >= 4; }).map(function(c) { return c.name; }).join('、');
  return '当前客户情报上下文：共' + appData.customers.length + '家客户，' + appData.tracking.length + '条追踪信号。机会' + counts.opportunity + '条，动态' + counts.dynamic + '条，风险' + counts.risk + '条。重点客户：' + topCust + '。';
}

async function sendAIMessage() {
  const input = document.getElementById('ai-input');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';

  const container = document.getElementById('ai-messages');
  container.innerHTML += '<div class="ai-msg user">' + escapeHtml(msg) + '</div>';
  container.scrollTop = container.scrollHeight;

  if (aiMockMode || !aiHealthy) {
    setTimeout(function() {
      const mockReplies = [
        '根据当前数据，建议优先跟进战略评分5分的客户：杉川机器人、韶音科技、麦格米特。',
        '风险提醒：南昌同兴达Q1净亏损，杭州觅睿净利润降54.96%，建议关注回款风险。',
        '机会洞察：韶音科技5月发布三款新品，广和通拟收购航盛电子，可借机拓展存储芯片需求。',
        '本周无异常信号的客户占多数，建议主动触达 dormant 客户，挖掘增量需求。'
      ];
      const reply = mockReplies[Math.floor(Math.random() * mockReplies.length)];
      container.innerHTML += '<div class="ai-msg bot">[Mock模式] ' + escapeHtml(reply) + '</div>';
      container.scrollTop = container.scrollHeight;
    }, 600);
    return;
  }

  container.innerHTML += '<div class="ai-msg bot" id="ai-thinking">思考中...</div>';
  container.scrollTop = container.scrollHeight;

  try {
    const resp = await fetch(SF_API_URL, {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + getApiKey()},
      body: JSON.stringify({
        model: SF_MODEL,
        messages: [
          {role: 'system', content: '你是资深销售情报分析师，熟悉半导体/芯片代理行业。请基于提供的客户数据给出简洁、 actionable 的分析建议。'},
          {role: 'user', content: getAIContext() + '\n用户问题：' + msg}
        ],
        max_tokens: 512,
        temperature: 0.7
      })
    });
    const thinking = document.getElementById('ai-thinking');
    if (thinking) thinking.remove();

    if (!resp.ok) throw new Error('status ' + resp.status);
    const data = await resp.json();
    const reply = data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content ? data.choices[0].message.content : '无回复';
    container.innerHTML += '<div class="ai-msg bot">' + escapeHtml(reply) + '</div>';
    container.scrollTop = container.scrollHeight;
  } catch (e) {
    const thinking = document.getElementById('ai-thinking');
    if (thinking) thinking.remove();
    container.innerHTML += '<div class="ai-msg bot">请求失败，已降级到Mock模式。' + escapeHtml(e.message) + '</div>';
    container.scrollTop = container.scrollHeight;
    aiMockMode = true;
    document.getElementById('ai-dot').style.background = '#f59e0b';
    document.getElementById('ai-status-text').textContent = 'Mock模式';
  }
}
