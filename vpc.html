  document.getElementById('marketnote').innerHTML = '📊 <b>今日市场:</b> ' + esc(VPC.latest_note || '暂无评语');
  
  // Quadrant
  var quadColors = {'量价齐升↑':'#10b981','量价齐升':'#10b981','量价双杀↓↓':'#ef4444','量价双杀':'#ef4444','价涨量跌→':'#f59e0b','价涨量跌':'#f59e0b','量增价跌↓':'#8b5cf6','量增价跌':'#8b5cf6','未分类':'#64748b'};
  var qh = '';
  for (var k in VPC.quad) {
    var c = quadColors[k] || '#64748b';
    qh += '<div class="quad-cell" style="border-top:3px solid ' + c + '"><div class="quad-label">' + k + '</div><div class="quad-count">' + VPC.quad[k] + '条</div></div>';
  }
  document.getElementById('quadgrid').innerHTML = qh || '<p style="color:var(--muted)">暂无数据</p>';
  
  // Strong signals
  var sh = '';
  VPC.strong.forEach(function(s) {
    var icon = s.direction === '涨' ? '📈' : (s.direction === '跌' ? '📉' : '➡️');
    sh += '<div class="sig-card"><div class="sig-stars">' + s.stars + '</div><div class="sig-body"><div class="sig-title">' + icon + ' ' + esc(s.title) + '</div><div class="sig-cat">' + esc(s.category) + '</div><div class="sig-desc">' + esc(s.content) + (s.content && s.content.length >= 120 ? '...' : '') + '</div></div></div>';
  });
  document.getElementById('stronglist').innerHTML = sh || '<p style="color:var(--muted)">暂无强信号</p>';
  
  // Daily history
  var dh = '';
  VPC.dailies.forEach(function(d) {
    dh += '<div class="day-row"><span class="day-date">' + d.date + '</span><span class="day-count">' + d.sc + '条信号</span><span class="day-strong">🔥' + d.ssc + '强信号</span><span class="day-note">' + esc(d.note) + '</span></div>';
  });
  document.getElementById('daily-body').innerHTML = dh;
  
  // Weekly
  var wh = '';
  VPC.weeklies.forEach(function(w) {
    wh += '<div class="week-row"><span class="week-date">' + w.ws + ' ~ ' + w.we + '</span><span class="week-judgment">' + esc(w.tj) + '</span><span class="week-trends">' + esc(w.t3) + '</span></div>';
  });
  wh += '<div style="margin-top:16px;padding:16px;background:var(--card2);border:1px solid var(--border);border-radius:12px"><strong>📌 本周趋势判断:</strong> ' + esc(VPC.trend_text) + '<br><strong>🔑 三大趋势:</strong> ' + esc(VPC.top3) + '</div>';
  document.getElementById('weekly-body').innerHTML = wh;
  
  // Chart
  var chart = echarts.init(document.getElementById('trend-chart'));
  chart.setOption({
    backgroundColor: 'transparent',
    tooltip: {trigger:'axis'},
    legend: {data:['总信号','强信号'], textStyle:{color:'#94a3b8'}, top:0},
    grid: {left:'3%', right:'4%', bottom:'3%', containLabel:true},
    xAxis: {type:'category', data:VPC.chart_dates, axisLabel:{color:'#64748b'}, axisLine:{lineStyle:{color:'#1e293b'}}},
    yAxis: {type:'value', axisLabel:{color:'#64748b'}, splitLine:{lineStyle:{color:'#1e293b'}}},
    series: [
      {name:'总信号', type:'line', data:VPC.chart_counts, smooth:true, lineStyle:{color:'#3b82f6',width:2}, itemStyle:{color:'#3b82f6'}, symbol:'circle', symbolSize:6},
      {name:'强信号', type:'bar', data:VPC.chart_strongs, barWidth:'40%', itemStyle:{color:'#f59e0b', borderRadius:[4,4,0,0]}}
    ]
  });
  window.addEventListener('resize', function() { chart.resize(); });
}

function toggleCollapse(id, header) {
  var body = document.getElementById(id);
  body.classList.toggle('open');
  header.classList.toggle('open');
}

render();
</script>
</body>
</html>
