<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>量价罗盘 VPC — 曼尼投研工具箱</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
:root{--bg:#FFFFFF;--card:#FAFAFA;--card2:#F5F5F5;--border:#E5E5E5;--text:#333333;--muted:#999999;--blue:#1A73E8;--green:#10b981;--red:#C41230;--orange:#f59e0b;--purple:#8b5cf6;--cyan:#06b6d4}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
.top{position:sticky;top:0;z-index:200;background:rgba(255,255,255,.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:16px}
.top a{color:var(--muted);text-decoration:none;font-size:14px;transition:.2s}
.top a:hover{color:var(--text)}
.top h1{font-size:18px;font-weight:700;background:linear-gradient(135deg,var(--red),#C41230);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.top .stat{font-size:12px;color:var(--muted);margin-left:auto}
.top .stat b{color:var(--text)}

/* Tab bar */
.tab-bar{position:sticky;top:48px;z-index:199;background:rgba(255,255,255,.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 24px;display:flex;gap:0;overflow-x:auto}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{background:none;border:none;color:var(--muted);font-size:13px;font-weight:500;padding:12px 18px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:.2s;font-family:inherit}
.tab-btn:hover{color:var(--text);border-bottom-color:var(--orange)}
.tab-btn.active{color:var(--red);border-bottom-color:var(--red);font-weight:600}
.tab-count{font-size:11px;color:var(--muted);margin-left:4px}

/* Two-column layout */
.main-layout{max-width:1200px;margin:0 auto;padding:24px 24px 80px;display:grid;grid-template-columns:1fr 360px;gap:24px;align-items:start}
.main-left{min-width:0}
.main-right{position:sticky;top:106px}

/* Market note */
.market-note{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:20px;font-size:14px;color:var(--muted)}
.market-note b{color:var(--text)}
.market-note .quad-mini{display:flex;gap:12px;margin-top:10px;flex-wrap:wrap}
.market-note .qm-item{font-size:11px;padding:2px 8px;border-radius:10px;background:var(--card);border:1px solid var(--border)}
.market-note .qm-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;vertical-align:middle}

/* Signal cards */
.signal-feed{margin-bottom:20px}
.sig-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:8px;transition:.15s;cursor:pointer;position:relative}
.sig-card:hover{border-color:var(--red);transform:translateX(2px)}
.sig-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.sig-time{font-size:12px;color:var(--muted);min-width:50px}
.sig-stars{font-size:13px;color:var(--orange);letter-spacing:1px}
.sig-title{font-size:15px;font-weight:600;margin-bottom:6px;line-height:1.4}
.sig-cat{display:inline-block;font-size:11px;color:var(--cyan);background:rgba(6,182,212,.1);padding:1px 8px;border-radius:10px;margin-bottom:8px}
.sig-desc{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.sig-footer{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.sig-quadrant{font-size:11px;font-weight:600;padding:2px 10px;border-radius:10px;display:inline-flex;align-items:center;gap:4px}
.sig-confirmed{font-size:11px;color:var(--green);display:flex;align-items:center;gap:3px}
.sig-unconfirmed{font-size:11px;color:var(--muted)}
.sig-direction{font-size:11px;margin-left:auto}

/* Historical date groups */
.historical-section{margin-top:24px}
.hist-title{font-size:16px;font-weight:600;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.hist-title::after{content:'';flex:1;height:1px;background:var(--border)}
.date-group{margin-bottom:8px}
.date-group-header{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px;cursor:pointer;user-select:none;transition:.15s;font-size:13px}
.date-group-header:hover{border-color:var(--blue)}
.date-group-header .arrow{font-size:10px;transition:transform .3s;color:var(--muted)}
.date-group-header.open .arrow{transform:rotate(90deg)}
.date-group-date{color:var(--text);font-weight:600;min-width:100px}
.date-group-count{color:var(--blue);font-size:12px}
.date-group-body{display:none;padding-top:4px}
.date-group-body.open{display:block}

/* Right sidebar */
.sidebar-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px}
.sidebar-card h3{font-size:14px;font-weight:600;margin-bottom:12px;color:var(--text);display:flex;align-items:center;gap:6px}
.sidebar-card h3 .icon{font-size:14px}

/* Latest ticker */
.ticker-list{max-height:420px;overflow-y:auto}
.ticker-list::-webkit-scrollbar{width:4px}
.ticker-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.ticker-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(229,229,229,.8);font-size:12px;transition:.15s}
.ticker-item:hover{color:var(--text)}
.ticker-item:last-child{border-bottom:none}
.ticker-time{color:var(--muted);min-width:40px;font-size:11px}
.ticker-title{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--muted)}
.ticker-dir{font-weight:600;font-size:11px;min-width:20px;text-align:center}

/* Hot tags */
.tag-cloud{display:flex;flex-wrap:wrap;gap:6px}
.tag{font-size:11px;padding:3px 10px;border-radius:12px;background:var(--card2);border:1px solid var(--border);cursor:pointer;transition:.15s;color:var(--muted)}
.tag:hover{background:var(--border);color:var(--text)}
.tag.hot{border-color:var(--orange);color:var(--orange);background:rgba(245,158,11,.1)}

/* Quadrant stats */
.quad-list{display:flex;flex-direction:column;gap:6px}
.quad-row{display:flex;align-items:center;gap:8px;font-size:12px}
.quad-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.quad-label{flex:1;color:var(--muted)}
.quad-val{font-weight:600;color:var(--text)}
.quad-pct{font-size:11px;color:var(--muted)}

/* Weekly judgment */
.wj-text{font-size:13px;color:var(--text);line-height:1.7}
.wj-action{display:inline-block;margin-top:8px;font-size:12px;font-weight:600;padding:4px 10px;border-radius:4px}

/* Trend chart in sidebar */
.sidebar-chart{width:100%;height:240px}

/* Footer */
.ft{text-align:center;padding:40px;border-top:1px solid var(--border);color:var(--muted);font-size:12px}
.ft a{color:var(--blue);text-decoration:none}

/* No data */
.no-data{color:var(--muted);font-size:13px;text-align:center;padding:20px 0}

@media(max-width:900px){
  .main-layout{grid-template-columns:1fr;padding:16px}
  .main-right{position:static}
  .tab-btn{padding:10px 12px;font-size:12px}
}
@media(max-width:600px){
  .top{padding:10px 12px}
  .tab-bar{padding:0 12px}
  .sig-card-header{flex-direction:column;gap:4px}
}
</style>
</head>

<script>
const VPC_DATA = JSON.parse(document.getElementById('vpc-data').textContent);

/* ====== Escaping helper ====== */
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ====== Quadrant color mapping ====== */
var quadColors = {
  '量价齐升↑':'#10b981','量价齐升':'#10b981','量价齐升(↑)':'#10b981',
  '量价双杀↓↓':'#ef4444','量价双杀↓':'#ef4444','量价双杀':'#ef4444','量价双杀(↓)':'#ef4444',
  '价涨量跌→':'#f59e0b','价涨量跌':'#f59e0b','价涨量跌(→)':'#f59e0b',
  '量增价跌↓':'#8b5cf6','量增价跌':'#8b5cf6','量增价跌↘':'#8b5cf6',
  '未分类':'#999999'
};
function getQuadColor(q) {
  for (var k in quadColors) { if (q && q.indexOf(k) >= 0) return quadColors[k]; }
  if (q && q.indexOf('量价齐升') >= 0) return '#10b981';
  if (q && q.indexOf('量价双杀') >= 0) return '#ef4444';
  if (q && q.indexOf('价涨量跌') >= 0) return '#f59e0b';
  if (q && q.indexOf('量增价跌') >= 0) return '#8b5cf6';
  if (q && q.indexOf('价跌量增') >= 0) return '#8b5cf6';
  if (q && q.indexOf('价涨') >= 0) return '#f59e0b';
  return '#999999';
}

/* ====== Normalize quadrant name ====== */
function normQuad(q) {
  if (!q) return '未分类';
  if (q.indexOf('量价齐升') >= 0) return '量价齐升↑';
  if (q.indexOf('量价双杀') >= 0) return '量价双杀↓';
  if (q.indexOf('价涨量跌') >= 0) return '价涨量跌→';
  if (q.indexOf('量增价跌') >= 0) return '量增价跌↓';
  if (q.indexOf('价跌量增') >= 0) return '量增价跌↓';
  if (q.indexOf('价涨') >= 0 && q.indexOf('量待') >= 0) return '价涨量跌→';
  return q;
}

var currentTab = 'all';

/* ====== Tab switching ====== */
document.getElementById('tabbar').addEventListener('click', function(e) {
  var btn = e.target.closest('.tab-btn');
  if (!btn) return;
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  currentTab = btn.dataset.tab;
  renderSignalFeed();
});

/* ====== Date group toggle ====== */
function toggleDateGroup(header) {
  header.classList.toggle('open');
  var body = header.nextElementSibling;
  if (body) body.classList.toggle('open');
}

/* ====== Render all sections ====== */
function render() {
  var D = VPC_DATA;
  var hasDaily = D.daily && D.daily.length > 0;
  var hasSignals = D.signals && D.signals.length > 0;
  var hasWeekly = D.weekly && D.weekly.length > 0;
  var latestDaily = hasDaily ? D.daily[D.daily.length - 1] : null;
  var latestDate = latestDaily ? latestDaily.date : '---';

  // Top stat bar
  document.getElementById('topstat').innerHTML =
    '最新: <b>' + latestDate + '</b> | <b>' + (D.daily ? D.daily.length : 0) + '</b>天记录';

  // Market note
  var noteText = '暂无评语';
  if (latestDaily) {
    noteText = latestDaily.market_comment || latestDaily.note || '暂无评语';
  }
  // Build quadrant mini summary for market note
  var quadCount = {};
  if (hasSignals && latestDaily) {
    for (var i = 0; i < D.signals.length; i++) {
      var s = D.signals[i];
      if (s.date === latestDaily.date) {
        var q = normQuad(s.quadrant);
        quadCount[q] = (quadCount[q] || 0) + 1;
      }
    }
  }
  var qmHtml = '';
  var qmOrder = ['量价齐升↑','价涨量跌→','量增价跌↓','量价双杀↓'];
  for (var qi = 0; qi < qmOrder.length; qi++) {
    if (quadCount[qmOrder[qi]]) {
      var qc = getQuadColor(qmOrder[qi]);
      qmHtml += '<span class="qm-item"><span class="qm-dot" style="background:' + qc + '"></span>' + qmOrder[qi] + ' ' + quadCount[qmOrder[qi]] + '条</span>';
    }
  }
  if (!qmHtml) qmHtml = '<span class="qm-item">暂无信号</span>';
  document.getElementById('marketnote').innerHTML =

/* ====== Signal feed (filtered by tab) ====== */
function renderSignalFeed() {
  var D = VPC_DATA;
  if (!D.signals || D.signals.length === 0) {
    document.getElementById('signalfeed').innerHTML = '<div class="no-data">📭 暂无信号数据</div>';
    return;
  }

  // Sort signals by date desc, then by strength desc
  var signals = D.signals.slice().sort(function(a, b) {
    if (a.date !== b.date) return b.date.localeCompare(a.date);
    return (b.strength || 0) - (a.strength || 0);
  });

  // Filter by tab
  if (currentTab !== 'all') {
    signals = signals.filter(function(s) {
      var nq = normQuad(s.quadrant);
      return nq === currentTab || s.quadrant === currentTab;
    });
  }

  // Group by date
  var groups = {};
  var latestDate = null;
  if (VPC_DATA.daily && VPC_DATA.daily.length > 0) {
    latestDate = VPC_DATA.daily[VPC_DATA.daily.length - 1].date;
  }

  var todaySignals = [];
  var olderGroups = {};

  for (var i = 0; i < signals.length; i++) {
    var sig = signals[i];
    if (sig.date === latestDate) {
      todaySignals.push(sig);
    } else {
      if (!olderGroups[sig.date]) olderGroups[sig.date] = [];
      olderGroups[sig.date].push(sig);
    }
  }

  var html = '';

  // Today's signals (always expanded)
  if (todaySignals.length > 0) {
    html += '<div style="font-size:14px;font-weight:600;color:var(--orange);margin-bottom:10px">🔥 今日信号 (' + latestDate + ')</div>';
    for (var j = 0; j < todaySignals.length; j++) {
      html += buildSigCard(todaySignals[j]);
    }
  }

  if (Object.keys(olderGroups).length === 0 && todaySignals.length === 0) {
    html += '<div class="no-data">📭 暂无匹配信号</div>';
  }

  document.getElementById('signalfeed').innerHTML = html;
}

/* ====== Historical date groups ====== */
function renderHistorical() {
  var D = VPC_DATA;
  if (!D.signals || D.signals.length === 0) {
    document.getElementById('historical').innerHTML = '';
    return;
  }

  var latestDate = null;
  if (D.daily && D.daily.length > 0) {
    latestDate = D.daily[D.daily.length - 1].date;
  }

  var signals = D.signals.slice().sort(function(a, b) {
    if (a.date !== b.date) return b.date.localeCompare(a.date);
    return (b.strength || 0) - (a.strength || 0);
  });

  // Only older dates
  var dateMap = {};
  for (var i = 0; i < signals.length; i++) {
    var s = signals[i];
    if (s.date === latestDate) continue;
    // Apply tab filter
    if (currentTab !== 'all') {
      var nq = normQuad(s.quadrant);
      if (nq !== currentTab && s.quadrant !== currentTab) continue;
    }
    if (!dateMap[s.date]) dateMap[s.date] = [];
    dateMap[s.date].push(s);
  }

  var dates = Object.keys(dateMap).sort().reverse();
  if (dates.length === 0) {
    document.getElementById('historical').innerHTML = '';
    return;
  }

  var html = '<div class="hist-title">📅 更早的信号</div>';
  for (var d = 0; d < dates.length; d++) {
    var date = dates[d];
    var sigs = dateMap[date];
    html += '<div class="date-group">';
    html += '<div class="date-group-header" onclick="toggleDateGroup(this)">';
    html += '<span class="arrow">▶</span>';
    html += '<span class="date-group-date">' + date + '</span>';
    html += '<span class="date-group-count">' + sigs.length + '条信号</span>';
    html += '</div>';
    html += '<div class="date-group-body">';
    for (var k = 0; k < sigs.length; k++) {
      html += buildSigCard(sigs[k]);
    }
    html += '</div></div>';
  }
  document.getElementById('historical').innerHTML = html;
}

/* ====== Build single signal card HTML ====== */
function buildSigCard(s) {
  var q = normQuad(s.quadrant);
  var qc = getQuadColor(q);
  var confirmedHtml = s.confirmed ?
    '<span class="sig-confirmed">✓ 已确认</span>' :
    '<span class="sig-unconfirmed">○ 待确认</span>';
  var dirIcon = '';
  if (s.direction === '↑' || s.direction === '涨' || s.direction === 'up') dirIcon = ' <span style="color:#10b981">📈</span>';
  else if (s.direction === '↓' || s.direction === '跌' || s.direction === 'down') dirIcon = ' <span style="color:#ef4444">📉</span>';

  return '<div class="sig-card">' +
    '<div class="sig-card-header">' +
      '<span class="sig-time">' + (s.date || '') + '</span>' +
      '<span class="sig-stars">' + (s.stars || '') + '</span>' +
    '</div>' +
    '<div class="sig-title">' + esc(s.title) + dirIcon + '</div>' +
    '<span class="sig-cat">' + esc(s.category || '') + '</span>' +
    '<div class="sig-desc">' + esc(s.content || '') + '</div>' +
    '<div class="sig-footer">' +
      '<span class="sig-quadrant" style="background:rgba(' + hexToRgb(qc) + ',0.15);color:' + qc + '">' + q + '</span>' +
      confirmedHtml +
    '</div>' +
  '</div>';
}

function hexToRgb(hex) {
  var r = parseInt(hex.slice(1,3), 16);
  var g = parseInt(hex.slice(3,5), 16);
  var b = parseInt(hex.slice(5,7), 16);
  return r + ',' + g + ',' + b;
}

/* ====== Right sidebar: latest ticker ====== */
function renderTicker() {
  var D = VPC_DATA;
  if (!D.signals || D.signals.length === 0) {
    document.getElementById('ticker').innerHTML = '<div class="no-data">暂无信号</div>';
    return;
  }
  var recent = D.signals.slice().sort(function(a, b) {
    return b.date.localeCompare(a.date) || (b.strength || 0) - (a.strength || 0);
  }).slice(0, 15);

  var html = '';
  for (var i = 0; i < recent.length; i++) {
    var s = recent[i];
    var dirSymbol = '→';
    if (s.direction === '↑' || s.direction === '涨' || s.direction === 'up') dirSymbol = '<span style="color:#10b981">↑</span>';
    else if (s.direction === '↓' || s.direction === '跌' || s.direction === 'down') dirSymbol = '<span style="color:#ef4444">↓</span>';
    html += '<div class="ticker-item"><span class="ticker-time">' + s.date.slice(5) + '</span><span class="ticker-title" title="' + esc(s.title) + '">' + esc(s.title) + '</span><span class="ticker-dir">' + dirSymbol + '</span></div>';
  }
  document.getElementById('ticker').innerHTML = html;
}

/* ====== Right sidebar: hot tags ====== */
function renderHotTags() {
  var D = VPC_DATA;
  if (!D.signals || D.signals.length === 0) {
    document.getElementById('hottags').innerHTML = '<div class="no-data">暂无标签</div>';
    return;
  }
  var catCount = {};
  for (var i = 0; i < D.signals.length; i++) {
    var c = D.signals[i].category || '其他';
    // Simplify category
    if (c.indexOf('/') > 0) c = c.split('/')[0];
    catCount[c] = (catCount[c] || 0) + 1;
  }
  var cats = Object.keys(catCount).sort(function(a, b) { return catCount[b] - catCount[a]; }).slice(0, 10);
  var html = '';
  var maxCount = catCount[cats[0]] || 1;
  for (var j = 0; j < cats.length; j++) {
    var isHot = catCount[cats[j]] >= maxCount * 0.5;
    html += '<span class="tag' + (isHot ? ' hot' : '') + '">' + esc(cats[j]) + ' <small>(' + catCount[cats[j]] + ')</small></span>';
  }
  document.getElementById('hottags').innerHTML = html || '<div class="no-data">暂无标签</div>';
}

/* ====== Right sidebar: quadrant stats ====== */
function renderQuadStats() {
  var D = VPC_DATA;
  if (!D.signals || D.signals.length === 0) {
    document.getElementById('quadstats').innerHTML = '<div class="no-data">暂无数据</div>';
    return;
  }
  var quadCount = {};
  for (var i = 0; i < D.signals.length; i++) {
    var q = normQuad(D.signals[i].quadrant);
    quadCount[q] = (quadCount[q] || 0) + 1;
  }
  var total = D.signals.length;
  var order = ['量价齐升↑','价涨量跌→','量增价跌↓','量价双杀↓'];
  var html = '';
  for (var j = 0; j < order.length; j++) {
    var cnt = quadCount[order[j]] || 0;
    var pct = total > 0 ? Math.round(cnt / total * 100) : 0;
    var qc = getQuadColor(order[j]);
    html += '<div class="quad-row"><span class="quad-dot" style="background:' + qc + '"></span><span class="quad-label">' + order[j] + '</span><span class="quad-val">' + cnt + '</span><span class="quad-pct">' + pct + '%</span></div>';
  }
  // Also show "other" quadrants
  for (var k in quadCount) {
    if (order.indexOf(k) >= 0) continue;
    var cnt2 = quadCount[k];
    var pct2 = total > 0 ? Math.round(cnt2 / total * 100) : 0;
    html += '<div class="quad-row"><span class="quad-dot" style="background:' + getQuadColor(k) + '"></span><span class="quad-label">' + esc(k) + '</span><span class="quad-val">' + cnt2 + '</span><span class="quad-pct">' + pct2 + '%</span></div>';
  }
  document.getElementById('quadstats').innerHTML = html || '<div class="no-data">暂无数据</div>';
}

/* ====== Right sidebar: weekly judgment ====== */
function renderWeeklyJudgment() {
  var D = VPC_DATA;
  if (!D.weekly || D.weekly.length === 0) {
    document.getElementById('weekly-judgment').innerHTML = '<div class="no-data">暂无周报</div>';
    return;
  }
  var lw = D.weekly[0];
  var judgment = lw.trend_judgment || lw.judgment || '暂无';
  // Extract first actionable line
  var firstLine = judgment.split('\n')[0] || judgment;
  if (firstLine.length > 120) firstLine = firstLine.substring(0, 120) + '...';

  var html = '<div style="font-size:11px;color:var(--muted);margin-bottom:6px">' + lw.week_start + ' ~ ' + lw.week_end + '</div>';
  html += '<div class="wj-text">' + esc(firstLine) + '</div>';

  // Action level
  var actionStyle = '';
  if (judgment.indexOf('积极做多') >= 0 || judgment.indexOf('加仓') >= 0) {
    actionStyle = 'background:rgba(16,185,129,.15);color:#10b981';
  } else if (judgment.indexOf('回避') >= 0 || judgment.indexOf('减仓') >= 0) {
    actionStyle = 'background:rgba(239,68,68,.15);color:#ef4444';
  } else {
    actionStyle = 'background:rgba(245,158,11,.15);color:#f59e0b';
  }
  html += '<span class="wj-action" style="' + actionStyle + '">' + esc(firstLine.substring(0, 30)) + '</span>';

  // Top 3 trends
  if (lw.top3_trends) {
    html += '<div style="margin-top:8px;font-size:11px;color:var(--muted);line-height:1.5">' + esc(lw.top3_trends.substring(0, 150)) + '</div>';
  }

  document.getElementById('weekly-judgment').innerHTML = html;
}

/* ====== ECharts trend chart ====== */
function renderChart() {
  var D = VPC_DATA;
  if (!D.daily || D.daily.length === 0) {
    document.getElementById('trend-chart').innerHTML = '<p style="text-align:center;color:var(--muted);padding:40px 0;font-size:12px">暂无趋势数据</p>';
    return;
  }
  var last15 = D.daily.slice(-15);
  var chartDates = [], chartCounts = [], chartStrongs = [];
  last15.forEach(function(d) {
    chartDates.push(d.date);
    chartCounts.push(d.signal_count);
    chartStrongs.push(d.strong_count);
  });

  var chartDom = document.getElementById('trend-chart');
  var chart = echarts.init(chartDom);
  chart.setOption({
    backgroundColor: 'transparent',
    tooltip: {trigger:'axis'},
    legend: {
      data:['总信号','强信号'],
      textStyle:{color:'#999999',fontSize:10},
      top:0,
      itemWidth:12,
      itemHeight:8
    },
    grid: {left:'3%', right:'4%', top:'18%', bottom:'3%', containLabel:true},
    xAxis: {
      type:'category',
      data:chartDates,
      axisLabel:{color:'#999999',fontSize:9,rotate:30},
      axisLine:{lineStyle:{color:'#e5e5e5'}}
    },
    yAxis: {
      type:'value',
      axisLabel:{color:'#999999',fontSize:9},
      splitLine:{lineStyle:{color:'#e5e5e5'}}
    },
    series: [
      {
        name:'总信号', type:'line', data:chartCounts, smooth:true,
        lineStyle:{color:'#3b82f6',width:1.5},
        itemStyle:{color:'#3b82f6'},
        symbol:'circle', symbolSize:4
      },
      {
        name:'强信号', type:'bar', data:chartStrongs, barWidth:'40%',
        itemStyle:{color:'#f59e0b', borderRadius:[2,2,0,0]}
      }
    ]
  });
  window.addEventListener('resize', function() { chart.resize(); });
}

/* ====== Tab counts ====== */
function renderTabCounts() {
  var D = VPC_DATA;
  if (!D.signals) return;
  var counts = {all: D.signals.length};
  for (var i = 0; i < D.signals.length; i++) {
    var q = normQuad(D.signals[i].quadrant);
    counts[q] = (counts[q] || 0) + 1;
  }
  document.getElementById('cnt-all').textContent = '(' + counts.all + ')';
  document.getElementById('cnt-qjqs').textContent = '(' + (counts['量价齐升↑'] || 0) + ')';
  document.getElementById('cnt-jzld').textContent = '(' + (counts['价涨量跌→'] || 0) + ')';
  document.getElementById('cnt-lzjd').textContent = '(' + (counts['量增价跌↓'] || 0) + ')';
  document.getElementById('cnt-ljss').textContent = '(' + (counts['量价双杀↓'] || 0) + ')';
}

/* ====== Boot ====== */
render();
</script>

  }

  function scrollToBottom() {
    msgArea.scrollTop = msgArea.scrollHeight;
  }

  function setOnline(state) {
    isOnline = state;
    if (state) {
      statusDot.className = 'status-dot online';
      statusText.textContent = '在线';
      offlineNotice.classList.remove('show');
    } else {
      statusDot.className = 'status-dot offline';
      statusText.textContent = '离线';
      offlineNotice.classList.add('show');
    }
  }

  /* ====== Render messages ====== */
  function renderMessages() {
    var html = '';
    for (var i = 0; i < chatMessages.length; i++) {
      var m = chatMessages[i];
      html += '<div class="ai-chat-msg ' + m.role + '">'
        + '<div class="bubble">' + escHTML(m.content) + '</div>'
        + '<span class="time">' + (m.time || '') + '</span>'
      + '</div>';
    }
    msgArea.innerHTML = html;
    scrollToBottom();
  }

  function addMessage(role, content) {
    chatMessages.push({ role: role, content: content, time: timeLabel() });
    // Keep max 50 messages
    if (chatMessages.length > 50) chatMessages.shift();
    renderMessages();
  }

  function showTyping() {
    msgArea.innerHTML += '<div class="ai-chat-typing" id="chatTyping"><span></span><span></span><span></span></div>';
    scrollToBottom();
  }

  function hideTyping() {
    var el = document.getElementById('chatTyping');
    if (el) el.remove();
  }

  /* ====== System prompt builder ====== */
  function buildSystemPrompt() {
    try {
      var raw = document.getElementById('vpc-data').textContent;
      var D = JSON.parse(raw);
      var signals = D.signals || [];
      var dailies = D.daily || [];
      var weeklies = D.weekly || [];

      // Current tab
      var activeTab = (typeof currentTab !== 'undefined') ? currentTab : 'all';

      // Total and strong signal counts
      var totalCount = signals.length;
      var strongCount = 0;
      for (var i = 0; i < signals.length; i++) {
        if ((signals[i].strength || 0) >= 3) strongCount++;
      }

      // Latest daily
      var latestDaily = dailies.length > 0 ? dailies[dailies.length - 1] : null;
      var latestDate = latestDaily ? latestDaily.date : '未知';
      var latestNote = latestDaily ? (latestDaily.market_comment || latestDaily.note || '暂无评语') : '暂无评语';

      // Latest weekly judgment
      var weeklyJudgment = '暂无';
      if (weeklies.length > 0) {
        var lw = weeklies[0];
        weeklyJudgment = lw.trend_judgment || lw.judgment || '暂无';
      }

      return '你是量价罗盘VPC的智能助手。当前追踪 A股量价信号，数据库有 ' + totalCount + ' 条信号（其中强信号 ' + strongCount + ' 条）。\n'
        + '最新交易日：' + latestDate + '\n'
        + '最新市场评语：' + latestNote + '\n'
        + '本周趋势判断：' + weeklyJudgment + '\n'
        + '用户当前筛选：' + activeTab + '\n'
        + '请基于数据给出简洁专业的市场分析（2-4句话为宜），帮助用户理解量价信号的含义和投资参考。\n'
        + '如果用户问及具体信号、板块或趋势，请基于上述数据回答。回答简洁专业，用中文。';
    } catch(e) {
      return '你是量价罗盘VPC的智能助手。当前追踪A股量价信号。请基于数据给出简洁专业的市场分析，用中文。';
    }
  }

  /* ====== Mock fallback ====== */
  function mockReply(userText) {
    try {
      var raw = document.getElementById('vpc-data').textContent;
      var D = JSON.parse(raw);
      var signals = D.signals || [];
      var dailies = D.daily || [];
      var weeklies = D.weekly || [];

      var text = userText.toLowerCase();

      // 问"涨价"
      if (text.indexOf('涨价') >= 0 || text.indexOf('上涨') >= 0 || text.indexOf('涨幅') >= 0) {
        var upSigs = [];
        for (var i = 0; i < signals.length; i++) {
          if (signals[i].direction === '↑' || signals[i].direction === '涨') {
            upSigs.push(signals[i]);
          }
        }
        if (upSigs.length > 0) {
          var latest = upSigs[0];
          return '最新涨价信号摘要：' + latest.date + ' — ' + latest.title + '。' + (latest.content || '').substring(0, 150)
            + '\n\n当前共有 ' + upSigs.length + ' 条涨价相关信号。';
        }
        return '当前暂无明确的涨价信号数据。';
      }

      // 问"板块"
      if (text.indexOf('板块') >= 0 || text.indexOf('资金') >= 0 || text.indexOf('行业') >= 0) {
        var sectorSigs = [];
        for (var j = 0; j < signals.length; j++) {
          if ((signals[j].category || '').indexOf('板块') >= 0 || (signals[j].category || '').indexOf('资金') >= 0) {
            sectorSigs.push(signals[j]);
          }
        }
        if (sectorSigs.length > 0) {
          var top = sectorSigs.slice(0, 3);
          var lines = [];
          for (var k = 0; k < top.length; k++) {
            lines.push('• ' + top[k].title + ' (' + top[k].date + ')');
          }
          return '板块资金流向信号（最新）：\n' + lines.join('\n');
        }
        return '暂无板块资金流向信号。';
      }

      // 问"趋势"
      if (text.indexOf('趋势') >= 0 || text.indexOf('判断') >= 0 || text.indexOf('周报') >= 0) {
        if (weeklies.length > 0) {
          var lw = weeklies[0];
          return '最新周报趋势判断（' + lw.week_start + ' ~ ' + lw.week_end + '）：\n' + (lw.trend_judgment || lw.judgment || '暂无判断');
        }
        return '暂无周报趋势判断数据。';
      }

      // 问"信号"
      if (text.indexOf('信号') >= 0 || text.indexOf('最新') >= 0 || text.indexOf('数据') >= 0) {
        var quadCount = {};
        for (var q = 0; q < signals.length; q++) {
          var qn = (typeof normQuad === 'function') ? normQuad(signals[q].quadrant) : (signals[q].quadrant || '未分类');
          quadCount[qn] = (quadCount[qn] || 0) + 1;
        }
        var latestDate2 = dailies.length > 0 ? dailies[dailies.length - 1].date : '未知';
        var latestNote2 = dailies.length > 0 ? (dailies[dailies.length - 1].market_comment || '') : '';
        return 'VPC数据概览：\n• 最新交易日：' + latestDate2 + '\n• 总信号数：' + signals.length + ' 条\n• 量价齐升↑：' + (quadCount['量价齐升↑']||0)
          + ' | 价涨量跌→：' + (quadCount['价涨量跌→']||0) + ' | 量增价跌↓：' + (quadCount['量增价跌↓']||0) + ' | 量价双杀↓：' + (quadCount['量价双杀↓']||0)
          + '\n• 市场评语：' + (latestNote2 || '暂无');
      }

      // 默认
      return '您好！我是VPC量价罗盘智能助手。当前我处于离线模式，使用本地数据回答。\n\n您可以问我：\n• "最近有什么涨价信号？"\n• "板块资金流向如何？"\n• "本周趋势判断是什么？"\n• "当前信号数据概览"';
    } catch(e) {
      return '抱歉，无法读取本地数据。请稍后重试。';
    }
  }

  /* ====== API call ====== */
  function callDeepSeek(userText) {
    if (abortController) {
      abortController.abort();
    }
    abortController = new AbortController();
    var timeoutId = setTimeout(function() { abortController.abort(); }, CHAT_TIMEOUT);

    var systemPrompt = buildSystemPrompt();
    var messages = [
      { role: 'system', content: systemPrompt },
      { role: 'user', content: userText }
    ];

    return fetch(API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + API_KEY
      },
      body: JSON.stringify({
        model: MODEL,
        messages: messages,
        max_tokens: 600,
        temperature: 0.7,
        stream: false
      }),
      signal: abortController.signal
    })
    .then(function(res) {
      clearTimeout(timeoutId);
      if (!res.ok) throw new Error('API error ' + res.status);
      return res.json();
    })
    .then(function(data) {
      if (data.choices && data.choices.length > 0 && data.choices[0].message) {
        return data.choices[0].message.content;
      }
      throw new Error('Unexpected response format');
    })
    .catch(function(err) {
      clearTimeout(timeoutId);
      if (err.name === 'AbortError') {
        return '回复超时，请重试。';
      }
      throw err;
    });
  }

  /* ====== Health check ====== */
  function healthCheck() {
    var ctrl = new AbortController();
    var timeoutId = setTimeout(function() { ctrl.abort(); }, HEALTH_TIMEOUT);

    return fetch(API_BASE + '/v1/models', {
      method: 'GET',
      headers: { 'Authorization': 'Bearer ' + API_KEY },
      signal: ctrl.signal
    })
    .then(function(res) {
      clearTimeout(timeoutId);
      if (res.ok) {
        setOnline(true);
      } else {
        setOnline(false);
      }
    })
    .catch(function() {
      clearTimeout(timeoutId);
      setOnline(false);
    });
  }

  /* ====== Send message ====== */
  function sendMessage() {
    var text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = '';
    sendBtn.disabled = true;

    addMessage('user', text);
    showTyping();

    if (isOnline) {
      callDeepSeek(text)
        .then(function(reply) {
          hideTyping();
          addMessage('ai', reply);
          sendBtn.disabled = false;
        })
        .catch(function(err) {
          hideTyping();
          // Fallback to mock
          setOnline(false);
          var mockR = mockReply(text);
          addMessage('ai', mockR);
          sendBtn.disabled = false;
        });
    } else {
      // Mock mode
      setTimeout(function() {
        hideTyping();
        var reply = mockReply(text);
        addMessage('ai', reply);
        sendBtn.disabled = false;
      }, 600);
    }
  }

  /* ====== Toggle panel ====== */
  function openPanel() {
    isOpen = true;
    btn.classList.add('hidden');
    panel.classList.add('open');
    inputEl.focus();
    scrollToBottom();
  }

  function closePanel() {
    isOpen = false;
    btn.classList.remove('hidden');
    panel.classList.remove('open');
  }

  function togglePanel() {
    if (isOpen) closePanel(); else openPanel();
  }

  /* ====== Welcome message ====== */
  function showWelcome() {
    var welcomeText = '您好！我是VPC量价罗盘AI助手。\n我可以帮您分析量价信号、板块资金流向和趋势判断。请问有什么可以帮您的？';
    if (chatMessages.length === 0) {
      addMessage('ai', welcomeText);
    }
  }

  /* ====== Event listeners ====== */
  btn.addEventListener('click', function() {
    openPanel();
    if (chatMessages.length === 0) showWelcome();
  });

  closeBtn.addEventListener('click', closePanel);

  sendBtn.addEventListener('click', sendMessage);

  inputEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  /* ====== Init ====== */
  healthCheck().then(function() {
    // Show welcome if panel opens later
  });

})();
</script>

</body>
</html>
