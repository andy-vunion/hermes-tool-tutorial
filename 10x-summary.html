<style>
*{margin:0;padding:0;box-sizing:border-box}

body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.header{background:linear-gradient(135deg,#1a2332 0%,#0d1117 100%);border-bottom:1px solid var(--border);padding:20px 40px;position:sticky;top:0;z-index:10}

.header p{font-size:13px;color:var(--text2);margin-top:4px}
.tabs{display:flex;gap:0;margin-top:16px;border-bottom:1px solid var(--border)}
.tab{padding:10px 24px;cursor:pointer;font-size:14px;color:var(--text2);border-bottom:2px solid transparent;transition:all .2s;border-radius:6px 6px 0 0}
.tab:hover{color:var(--text);background:var(--bg2)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);background:var(--bg2)}
.content{padding:32px 40px;max-width:900px;margin:0 auto}
.summary-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:20px}
.summary-card h2{font-size:17px;color:var(--accent);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.summary-card h3{font-size:15px;color:var(--text);margin:16px 0 8px;padding-top:12px;border-top:1px solid var(--border)}
.summary-card p,.summary-card li{font-size:14px;line-height:1.8;color:var(--text2)}
.summary-card ul{margin:8px 0 8px 20px}
.summary-card li{margin-bottom:4px}
.summary-card strong{color:#e6edf3}
.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin:16px 0}
.metric-box{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:16px;text-align:center}
.metric-box .value{font-size:28px;font-weight:700;color:var(--accent)}
.metric-box .label{font-size:12px;color:var(--text2);margin-top:4px}

.flow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:16px 0;font-size:13px}
.flow-box{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px 14px;text-align:center;font-weight:600}
.flow-arrow{color:var(--accent);font-size:16px}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;margin-right:4px}
.tag-green{background:rgba(63,185,80,.15);color:var(--green)}
.tag-blue{background:rgba(88,166,255,.15);color:var(--accent)}
.tag-warn{background:rgba(210,153,34,.15);color:var(--warn)}
.tag-red{background:rgba(248,81,73,.15);color:var(--red)}
.highlight{border-left:3px solid var(--accent);padding:8px 16px;margin:12px 0;background:rgba(88,166,255,.05);border-radius:0 8px 8px 0;font-size:14px}
.collapsible{cursor:pointer;padding:12px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;margin:8px 0;font-size:14px;display:flex;justify-content:space-between;align-items:center;transition:all .2s}
.collapsible:hover{background:var(--bg2)}
.collapsible .arrow{transition:transform .2s;color:var(--text2)}
.collapsible.open .arrow{transform:rotate(180deg)}
.collapse-content{display:none;padding:0 16px 16px;font-size:14px;line-height:1.8;color:var(--text2)}
.collapse-content.show{display:block}
.decision-table{width:100%;border-collapse:collapse;margin:12px 0;font-size:13px}
.decision-table th,.decision-table td{border:1px solid var(--border);padding:8px 12px;text-align:left}
.decision-table th{background:var(--bg3);font-weight:600;color:var(--text)}
.decision-table td{color:var(--text2)}
.decision-table tr:hover td{background:rgba(88,166,255,.03)}
@media(max-width:768px){.header,.content{padding:16px}.arch-diagram{font-size:10px}}
</style>
</head>

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab:nth-child(${tab === 'design' ? 1 : tab === 'chain' ? 2 : 3})`).classList.add('active');
  const content = document.getElementById('content');
  if (tab === 'design') content.innerHTML = designDoc;
  else if (tab === 'chain') content.innerHTML = chainDoc;
  else content.innerHTML = integrationDoc;
}
switchTab('design');
